baseURL = 'https://blog.cpdd.fyi/'
languageCode = 'zh-cn'
title = '任博的博客'
theme = 'ProfessionalBlog'
defaultContentLanguage = 'zh-cn'

[build]
  writeStats = true

[params]
  description = "任博的个人技术博客，专注后端开发、数据库、技术选型"
  author = "任博"
  keywords = ['后端开发', '数据库', '分布式系统', '技术选型', 'PostgreSQL', 'MySQL']

[menu]
  [[menu.main]]
    name = "首页"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "文章"
    url = "/posts/"
    weight = 2
  [[menu.main]]
    name = "搜索"
    url = "/search/"
    weight = 3
  [[menu.main]]
    name = "关于"
    url = "/about/"
    weight = 4
  [[menu.main]]
    name = "标签"
    url = "/tags/"
    weight = 5

[markup]
  [markup.highlight]
    noClasses = false
    lineNos = true
    style = "github-dark"
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 3

[outputs]
  home = ["HTML", "JSON"]
  page = ["HTML"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]
