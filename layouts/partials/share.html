{{- $url := .Permalink -}}
{{- $title := .Title -}}

<div class="social-share">
  <p>如果这篇文章对你有帮助，欢迎关注我的公众号获取更多技术分享 👇</p>
  
  <div class="wechat-note">
    <h3>📱 关注公众号</h3>
    <p>公众号：任博的技术圈</p>
    <p style="font-size: 0.875rem; opacity: 0.9;">专注后端开发、数据库、技术选型</p>
  </div>
  
  <div class="share-buttons" style="margin-top: 1.5rem; text-align: center;">
    <a href="https://twitter.com/intent/tweet?url={{ $url }}&text={{ $title }}" target="_blank" rel="noopener" style="margin-right: 0.5rem;">
      分享到 X
    </a>
    <a href="https://service.weibo.com/share/share.php?url={{ $url }}&title={{ $title }}" target="_blank" rel="noopener">
      分享到微博
    </a>
  </div>
</div>

<style>
.social-share {
  margin-top: 3rem;
  padding-top: 2rem;
  border-top: 1px solid var(--border);
}

.share-buttons a {
  display: inline-block;
  padding: 0.5rem 1rem;
  border-radius: 6px;
  background: var(--primary-color);
  color: white;
  text-decoration: none;
  font-size: 0.875rem;
  transition: opacity 0.2s;
}

.share-buttons a:hover {
  opacity: 0.9;
}
</style>
