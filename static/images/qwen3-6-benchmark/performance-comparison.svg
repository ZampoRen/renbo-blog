<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="800" height="500" fill="#0D1117"/>
  
  <!-- 标题 -->
  <text x="400" y="35" fill="#C9D1D9" font-family="system-ui" font-size="18" font-weight="600" text-anchor="middle">性能对比：Tokens/秒 基准测试</text>
  
  <!-- Y 轴标签 -->
  <text x="50" y="80" fill="#8B949E" font-family="monospace" font-size="11" text-anchor="middle">Tokens/s</text>
  <text x="50" y="100" fill="#8B949E" font-family="monospace" font-size="11" text-anchor="middle">(千)</text>
  
  <!-- Y 轴刻度 -->
  <line x1="80" y1="80" x2="80" y2="380" stroke="#30363D" stroke-width="2"/>
  <line x1="70" y1="80" x2="80" y2="80" stroke="#8B949E" stroke-width="1"/>
  <text x="60" y="85" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="end">10</text>
  
  <line x1="70" y1="155" x2="80" y2="155" stroke="#8B949E" stroke-width="1"/>
  <text x="60" y="160" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="end">7.5</text>
  
  <line x1="70" y1="230" x2="80" y2="230" stroke="#8B949E" stroke-width="1"/>
  <text x="60" y="235" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="end">5</text>
  
  <line x1="70" y1="305" x2="80" y2="305" stroke="#8B949E" stroke-width="1"/>
  <text x="60" y="310" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="end">2.5</text>
  
  <line x1="70" y1="380" x2="80" y2="380" stroke="#8B949E" stroke-width="1"/>
  <text x="60" y="385" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="end">0</text>
  
  <!-- X 轴 -->
  <line x1="80" y1="380" x2="750" y2="380" stroke="#30363D" stroke-width="2"/>
  
  <!-- Qwen3.6 柱状图 -->
  <rect x="120" y="130" width="100" height="250" rx="4" fill="#FF7B72" fill-opacity="0.7" stroke="#FF7B72" stroke-width="2"/>
  <text x="170" y="120" fill="#FF7B72" font-family="monospace" font-size="12" font-weight="600" text-anchor="middle">~8.3k</text>
  <text x="170" y="405" fill="#FF7B72" font-family="monospace" font-size="11" text-anchor="middle">Qwen3.6</text>
  <text x="170" y="425" fill="#8B949E" font-family="monospace" font-size="9" text-anchor="middle">单卡 3060</text>
  
  <!-- Qwen3.5 27B 柱状图 -->
  <rect x="260" y="280" width="100" height="100" rx="4" fill="#58A6FF" fill-opacity="0.7" stroke="#58A6FF" stroke-width="2"/>
  <text x="310" y="270" fill="#58A6FF" font-family="monospace" font-size="12" font-weight="600" text-anchor="middle">~3.3k</text>
  <text x="310" y="405" fill="#58A6FF" font-family="monospace" font-size="11" text-anchor="middle">Qwen3.5 27B</text>
  <text x="310" y="425" fill="#8B949E" font-family="monospace" font-size="9" text-anchor="middle">单卡 3060</text>
  
  <!-- Gemma4 31B 柱状图 -->
  <rect x="400" y="250" width="100" height="130" rx="4" fill="#7EE787" fill-opacity="0.7" stroke="#7EE787" stroke-width="2"/>
  <text x="450" y="240" fill="#7EE787" font-family="monospace" font-size="12" font-weight="600" text-anchor="middle">~4.3k</text>
  <text x="450" y="405" fill="#7EE787" font-family="monospace" font-size="11" text-anchor="middle">Gemma4 31B</text>
  <text x="450" y="425" fill="#8B949E" font-family="monospace" font-size="9" text-anchor="middle">单卡 3060</text>
  
  <!-- Qwen3.6 双卡 -->
  <rect x="540" y="105" width="100" height="275" rx="4" fill="#D2A8FF" fill-opacity="0.7" stroke="#D2A8FF" stroke-width="2"/>
  <text x="590" y="95" fill="#D2A8FF" font-family="monospace" font-size="12" font-weight="600" text-anchor="middle">~9.2k</text>
  <text x="590" y="405" fill="#D2A8FF" font-family="monospace" font-size="11" text-anchor="middle">Qwen3.6</text>
  <text x="590" y="425" fill="#8B949E" font-family="monospace" font-size="9" text-anchor="middle">双卡 3060</text>
  
  <!-- 10000 tokens/s 标记线 -->
  <line x1="80" y1="80" x2="750" y2="80" stroke="#F0883E" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="760" y="85" fill="#F0883E" font-family="monospace" font-size="11" font-weight="600">🎯 10k tokens/s（多卡极限）</text>
  
  <!-- 底部说明 -->
  <rect x="80" y="450" width="670" height="40" rx="6" fill="#161B22" stroke="#30363D" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="415" y="475" fill="#8B949E" font-family="monospace" font-size="11" text-anchor="middle">测试条件：Q4 量化，模型完全加载到 VRAM，llama.cpp 基准测试</text>
  <text x="415" y="495" fill="#8B949E" font-family="monospace" font-size="11" text-anchor="middle">实际性能因硬件配置、量化等级、批处理大小而异</text>
</svg>
