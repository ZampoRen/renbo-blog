<svg width="800" height="550" viewBox="0 0 800 550" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="800" height="550" fill="#0D1117"/>
  
  <!-- 标题 -->
  <text x="400" y="35" fill="#C9D1D9" font-family="system-ui" font-size="18" font-weight="600" text-anchor="middle">硬件配置对比：四档方案</text>
  
  <!-- 入门级 -->
  <rect x="40" y="70" width="340" height="100" rx="8" fill="#161B22" stroke="#7EE787" stroke-width="2"/>
  <rect x="40" y="70" width="340" height="32" rx="8" fill="#238636" fill-opacity="0.3"/>
  <text x="210" y="92" fill="#7EE787" font-family="system-ui" font-size="16" font-weight="600" text-anchor="middle">🟢 入门级</text>
  <text x="210" y="120" fill="#C9D1D9" font-family="monospace" font-size="12" text-anchor="middle">2× RTX 3060 12GB</text>
  <text x="210" y="140" fill="#8B949E" font-family="monospace" font-size="11" text-anchor="middle">总 VRAM: 24GB | 成本: 6000-7000 元</text>
  <text x="210" y="160" fill="#8B949E" font-family="monospace" font-size="11" text-anchor="middle">个人学习、小规模 Agent</text>
  
  <!-- 中端 -->
  <rect x="420" y="70" width="340" height="100" rx="8" fill="#161B22" stroke="#58A6FF" stroke-width="2"/>
  <rect x="420" y="70" width="340" height="32" rx="8" fill="#1F6FEB" fill-opacity="0.3"/>
  <text x="590" y="92" fill="#58A6FF" font-family="system-ui" font-size="16" font-weight="600" text-anchor="middle">🔵 中端</text>
  <text x="590" y="120" fill="#C9D1D9" font-family="monospace" font-size="12" text-anchor="middle">1× RTX 3090 24GB</text>
  <text x="590" y="140" fill="#8B949E" font-family="monospace" font-size="11" text-anchor="middle">总 VRAM: 24GB | 成本: 8000-9000 元</text>
  <text x="590" y="160" fill="#8B949E" font-family="monospace" font-size="11" text-anchor="middle">单模型高并发、生产入门</text>
  
  <!-- 高端 -->
  <rect x="40" y="200" width="340" height="100" rx="8" fill="#161B22" stroke="#F0883E" stroke-width="2"/>
  <rect x="40" y="200" width="340" height="32" rx="8" fill="#D29922" fill-opacity="0.3"/>
  <text x="210" y="222" fill="#F0883E" font-family="system-ui" font-size="16" font-weight="600" text-anchor="middle">🟠 高端</text>
  <text x="210" y="250" fill="#C9D1D9" font-family="monospace" font-size="12" text-anchor="middle">1× RTX 4090 24GB</text>
  <text x="210" y="270" fill="#8B949E" font-family="monospace" font-size="11" text-anchor="middle">总 VRAM: 24GB | 成本: 20000-23000 元</text>
  <text x="210" y="290" fill="#8B949E" font-family="monospace" font-size="11" text-anchor="middle">生产环境、最快单卡</text>
  
  <!-- 极限 -->
  <rect x="420" y="200" width="340" height="100" rx="8" fill="#161B22" stroke="#D2A8FF" stroke-width="2"/>
  <rect x="420" y="200" width="340" height="32" rx="8" fill="#8957E5" fill-opacity="0.3"/>
  <text x="590" y="222" fill="#D2A8FF" font-family="system-ui" font-size="16" font-weight="600" text-anchor="middle">🟣 极限</text>
  <text x="590" y="250" fill="#C9D1D9" font-family="monospace" font-size="12" text-anchor="middle">多卡并行（4-8 GPU）</text>
  <text x="590" y="270" fill="#8B949E" font-family="monospace" font-size="11" text-anchor="middle">总 VRAM: 96-192GB | 成本: 2-5 万元</text>
  <text x="590" y="290" fill="#8B949E" font-family="monospace" font-size="11" text-anchor="middle">团队共享、极限吞吐量</text>
  
  <!-- 24GB VRAM 说明 -->
  <rect x="40" y="330" width="720" height="80" rx="8" fill="#161B22" stroke="#FF7B72" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="400" y="360" fill="#FF7B72" font-family="system-ui" font-size="16" font-weight="600" text-anchor="middle">⚠️ 24GB VRAM 是魔法数字</text>
  <text x="400" y="385" fill="#8B949E" font-family="monospace" font-size="12" text-anchor="middle">Q4 量化模型需要完全放入 VRAM，低于这个门槛性能会显著下降</text>
  <text x="400" y="405" fill="#8B949E" font-family="monospace" font-size="12" text-anchor="middle">部分层卸载到系统内存 → PCIe 带宽瓶颈 → 性能大幅下降</text>
  
  <!-- 关键指标对比 -->
  <rect x="40" y="440" width="720" height="100" rx="8" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
  <text x="400" y="465" fill="#C9D1D9" font-family="system-ui" font-size="14" font-weight="600" text-anchor="middle">📊 关键指标对比</text>
  
  <!-- 指标表格头部 -->
  <rect x="60" y="475" width="680" height="25" rx="4" fill="#1F2937" stroke="#30363D" stroke-width="1"/>
  <text x="150" y="492" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="middle">配置</text>
  <text x="280" y="492" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="middle">VRAM</text>
  <text x="400" y="492" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="middle">功耗</text>
  <text x="520" y="492" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="middle">成本</text>
  <text x="660" y="492" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="middle">适用场景</text>
  
  <!-- 指标行 1 -->
  <rect x="60" y="500" width="680" height="18" rx="2" fill="#161B22" stroke="#30363D" stroke-width="0.5"/>
  <text x="150" y="512" fill="#7EE787" font-family="monospace" font-size="9" text-anchor="middle">2×3060</text>
  <text x="280" y="512" fill="#C9D1D9" font-family="monospace" font-size="9" text-anchor="middle">24GB</text>
  <text x="400" y="512" fill="#C9D1D9" font-family="monospace" font-size="9" text-anchor="middle">340W</text>
  <text x="520" y="512" fill="#C9D1D9" font-family="monospace" font-size="9" text-anchor="middle">6-7k</text>
  <text x="660" y="512" fill="#C9D1D9" font-family="monospace" font-size="9" text-anchor="middle">入门</text>
  
  <!-- 指标行 2 -->
  <rect x="60" y="518" width="680" height="18" rx="2" fill="#161B22" stroke="#30363D" stroke-width="0.5"/>
  <text x="150" y="530" fill="#58A6FF" font-family="monospace" font-size="9" text-anchor="middle">1×3090</text>
  <text x="280" y="530" fill="#C9D1D9" font-family="monospace" font-size="9" text-anchor="middle">24GB</text>
  <text x="400" y="530" fill="#C9D1D9" font-family="monospace" font-size="9" text-anchor="middle">350W</text>
  <text x="520" y="530" fill="#C9D1D9" font-family="monospace" font-size="9" text-anchor="middle">8-9k</text>
  <text x="660" y="530" fill="#C9D1D9" font-family="monospace" font-size="9" text-anchor="middle">中端</text>
</svg>
