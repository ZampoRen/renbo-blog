<svg xmlns="http://www.w3.org/2000/svg" width="900" height="383" viewBox="0 0 900 383" role="img" aria-label="AI 编程规则封面图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="900" height="383" rx="0" fill="url(#bg)"/>
  <circle cx="160" cy="105" r="62" fill="#38bdf8" opacity="0.12" filter="url(#soft)"/>
  <circle cx="720" cy="275" r="90" fill="#a78bfa" opacity="0.14" filter="url(#soft)"/>

  <g opacity="0.9">
    <path d="M88 222 C145 166, 205 282, 262 220 S385 168, 438 220" fill="none" stroke="#334155" stroke-width="3"/>
    <circle cx="88" cy="222" r="9" fill="#38bdf8"/>
    <circle cx="262" cy="220" r="9" fill="#a78bfa"/>
    <circle cx="438" cy="220" r="9" fill="#38bdf8"/>
  </g>

  <g transform="translate(72 70)">
    <rect x="0" y="0" width="360" height="220" rx="28" fill="#020617" opacity="0.72" stroke="#334155"/>
    <text x="34" y="55" fill="#e2e8f0" font-size="30" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-weight="700">AI 不缺能力</text>
    <text x="34" y="98" fill="#94a3b8" font-size="22" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">缺的是行为边界</text>
    <rect x="34" y="128" width="292" height="46" rx="14" fill="url(#accent)" opacity="0.18" stroke="#38bdf8"/>
    <text x="58" y="158" fill="#e0f2fe" font-size="20" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">少猜、少绕、少乱改</text>
  </g>

  <g transform="translate(520 82)">
    <rect x="0" y="0" width="280" height="44" rx="14" fill="#0f172a" stroke="#475569"/>
    <text x="24" y="28" fill="#cbd5e1" font-size="18" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Think Before Coding</text>
    <rect x="0" y="58" width="280" height="44" rx="14" fill="#0f172a" stroke="#475569"/>
    <text x="24" y="86" fill="#cbd5e1" font-size="18" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Simplicity First</text>
    <rect x="0" y="116" width="280" height="44" rx="14" fill="#0f172a" stroke="#475569"/>
    <text x="24" y="144" fill="#cbd5e1" font-size="18" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Surgical Changes</text>
    <rect x="0" y="174" width="280" height="44" rx="14" fill="#0f172a" stroke="#475569"/>
    <text x="24" y="202" fill="#cbd5e1" font-size="18" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Goal-Driven Execution</text>
  </g>

  <text x="72" y="338" fill="#64748b" font-size="16" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">CLAUDE.md 不是神奇 prompt，而是项目里的工作规约</text>
</svg>
