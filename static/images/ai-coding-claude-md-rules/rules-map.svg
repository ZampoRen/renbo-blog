<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="CLAUDE.md 四条规则和 AI 默认坏习惯的对应关系">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1120"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="600" y="88" text-anchor="middle" fill="#e2e8f0" font-size="38" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-weight="700">四条规则，压住四种默认坏习惯</text>
  <text x="600" y="128" text-anchor="middle" fill="#94a3b8" font-size="20" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">不要把 AI 当成更自由的实习生，要把边界写进项目规约</text>

  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <g transform="translate(90 190)">
      <rect width="430" height="92" rx="22" fill="#020617" stroke="#334155"/>
      <text x="30" y="38" fill="#f8fafc" font-size="23" font-weight="700">错误假设</text>
      <text x="30" y="68" fill="#94a3b8" font-size="18">不问，直接选一个解释往下写</text>
    </g>
    <g transform="translate(680 190)">
      <rect width="430" height="92" rx="22" fill="#082f49" stroke="#38bdf8"/>
      <text x="30" y="38" fill="#e0f2fe" font-size="23" font-weight="700">Think Before Coding</text>
      <text x="30" y="68" fill="#bae6fd" font-size="18">先暴露假设、歧义和权衡</text>
    </g>

    <g transform="translate(90 315)">
      <rect width="430" height="92" rx="22" fill="#020617" stroke="#334155"/>
      <text x="30" y="38" fill="#f8fafc" font-size="23" font-weight="700">过度复杂化</text>
      <text x="30" y="68" fill="#94a3b8" font-size="18">小需求写成大架构</text>
    </g>
    <g transform="translate(680 315)">
      <rect width="430" height="92" rx="22" fill="#312e81" stroke="#a78bfa"/>
      <text x="30" y="38" fill="#ede9fe" font-size="23" font-weight="700">Simplicity First</text>
      <text x="30" y="68" fill="#ddd6fe" font-size="18">只写解决问题所需的最少代码</text>
    </g>

    <g transform="translate(90 440)">
      <rect width="430" height="92" rx="22" fill="#020617" stroke="#334155"/>
      <text x="30" y="38" fill="#f8fafc" font-size="23" font-weight="700">无关修改</text>
      <text x="30" y="68" fill="#94a3b8" font-size="18">顺手改注释、格式、相邻逻辑</text>
    </g>
    <g transform="translate(680 440)">
      <rect width="430" height="92" rx="22" fill="#082f49" stroke="#38bdf8"/>
      <text x="30" y="38" fill="#e0f2fe" font-size="23" font-weight="700">Surgical Changes</text>
      <text x="30" y="68" fill="#bae6fd" font-size="18">每一行改动都追溯到请求</text>
    </g>

    <g transform="translate(90 565)">
      <rect width="430" height="92" rx="22" fill="#020617" stroke="#334155"/>
      <text x="30" y="38" fill="#f8fafc" font-size="23" font-weight="700">看起来完成</text>
      <text x="30" y="68" fill="#94a3b8" font-size="18">没有测试、构建或可观察信号</text>
    </g>
    <g transform="translate(680 565)">
      <rect width="430" height="92" rx="22" fill="#312e81" stroke="#a78bfa"/>
      <text x="30" y="38" fill="#ede9fe" font-size="23" font-weight="700">Goal-Driven Execution</text>
      <text x="30" y="68" fill="#ddd6fe" font-size="18">用验证闭环定义“完成”</text>
    </g>
  </g>

  <g stroke="url(#line)" stroke-width="3" opacity="0.75" fill="none">
    <path d="M530 236 C585 236, 625 236, 670 236"/>
    <path d="M530 361 C585 361, 625 361, 670 361"/>
    <path d="M530 486 C585 486, 625 486, 670 486"/>
    <path d="M530 611 C585 611, 625 611, 670 611"/>
  </g>
</svg>
