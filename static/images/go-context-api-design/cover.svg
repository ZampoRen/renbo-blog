<svg xmlns="http://www.w3.org/2000/svg" width="900" height="383" viewBox="0 0 900 383" role="img" aria-label="Context API 设计：观察权与控制权分离">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="383" rx="0" fill="url(#bg)"/>
  <circle cx="168" cy="194" r="86" fill="#0b1220" stroke="#334155" stroke-width="2"/>
  <circle cx="168" cy="194" r="58" fill="none" stroke="url(#cyan)" stroke-width="4" opacity="0.85" filter="url(#glow)"/>
  <circle cx="168" cy="194" r="14" fill="#22d3ee"/>
  <path d="M168 136 C250 126 280 167 330 167" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="8 8"/>
  <path d="M168 252 C248 270 282 224 330 224" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="8 8"/>
  <rect x="322" y="126" width="180" height="82" rx="18" fill="#111827" stroke="#22d3ee" stroke-width="2"/>
  <text x="412" y="161" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22" font-weight="700" fill="#e0f2fe">Context</text>
  <text x="412" y="189" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" fill="#94a3b8">只给下游观察</text>
  <rect x="322" y="214" width="180" height="82" rx="18" fill="#111827" stroke="#f97316" stroke-width="2"/>
  <text x="412" y="249" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22" font-weight="700" fill="#fed7aa">CancelFunc</text>
  <text x="412" y="277" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" fill="#94a3b8">留给生命周期 owner</text>
  <text x="560" y="142" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="21" font-weight="700" fill="#38bdf8">观察权</text>
  <text x="560" y="181" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="21" font-weight="700" fill="#fb923c">控制权</text>
  <text x="638" y="162" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="44" font-weight="800" fill="#f8fafc">不能混在一起</text>
  <text x="560" y="224" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="26" font-weight="700" fill="#e2e8f0">Cancel 为什么不在接口里？</text>
  <text x="560" y="262" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" fill="#94a3b8">不是少写一个方法，而是守住调用树里的权责边界</text>
  <rect x="560" y="296" width="256" height="36" rx="18" fill="#0f172a" stroke="#334155"/>
  <text x="688" y="320" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" fill="#cbd5e1">Context is a signal, not a switch</text>
</svg>
