      <text x="26" y="88" fill="#fff" font-size="20" font-weight="700">Agent 团队平台</text>
      <text x="26" y="145" fill="#cbd5e1">Agent 进入 assignee</text>
      <text x="26" y="176" fill="#cbd5e1">和 issue 流程</text>
      <text x="26" y="248" fill="#4ade80">强项</text>
      <text x="26" y="282" fill="#e5e7eb">多用户协作</text>
      <text x="26" y="313" fill="#e5e7eb">团队权限模型</text>
      <text x="26" y="370" fill="#fbbf24">代价</text>
      <text x="26" y="404" fill="#e5e7eb">系统更重</text>
    </g>
    <g transform="translate(620,175)">
      <rect width="245" height="430" rx="24" fill="#26172d" stroke="#a855f7"/>
