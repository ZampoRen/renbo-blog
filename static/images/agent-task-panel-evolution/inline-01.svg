  <rect x="70" y="650" width="1070" height="58" rx="20" fill="#0f172a" stroke="#334155"/>
  <text x="605" y="686" text-anchor="middle" fill="#e2e8f0" font-family="Arial, PingFang SC" font-size="22" font-weight="700">不是选最火的，而是选最能承接你任务边界的。</text>
