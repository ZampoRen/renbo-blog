      <text x="26" y="88" fill="#fff" font-size="20" font-weight="700">通用 Agent 执行器</text>
      <text x="26" y="145" fill="#cbd5e1">少结构约束</text>
      <text x="26" y="176" fill="#cbd5e1">更多自主执行</text>
      <text x="26" y="248" fill="#c084fc">强项</text>
      <text x="26" y="282" fill="#e5e7eb">虚拟计算机</text>
      <text x="26" y="313" fill="#e5e7eb">端到端交付</text>
      <text x="26" y="370" fill="#fbbf24">代价</text>
      <text x="26" y="404" fill="#e5e7eb">外部可控性较弱</text>
    </g>
    <g transform="translate(895,175)">
      <rect width="245" height="430" rx="24" fill="#2b1f10" stroke="#f59e0b"/>
      <text x="26" y="48" fill="#fde68a" font-size="26" font-weight="800">Hermes Kanban</text>
      <text x="26" y="88" fill="#fff" font-size="20" font-weight="700">框架内编排原语</text>
      <text x="26" y="145" fill="#cbd5e1">profile 协作</text>
      <text x="26" y="176" fill="#cbd5e1">状态持久化</text>
      <text x="26" y="248" fill="#fbbf24">强项</text>
      <text x="26" y="282" fill="#e5e7eb">依赖链</text>
      <text x="26" y="313" fill="#e5e7eb">review-required</text>
      <text x="26" y="370" fill="#fbbf24">代价</text>
