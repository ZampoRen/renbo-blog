<svg xmlns="http://www.w3.org/2000/svg" width="900" height="383" viewBox="0 0 900 383">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="383" fill="url(#bg)"/>
  <circle cx="144" cy="92" r="120" fill="#38BDF8" opacity="0.08"/>
  <circle cx="760" cy="302" r="150" fill="#A78BFA" opacity="0.08"/>

  <g transform="translate(70 78)">
    <rect x="0" y="0" width="290" height="226" rx="26" fill="#0F172A" stroke="#334155" stroke-width="2"/>
    <text x="145" y="42" text-anchor="middle" font-family="PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="18" fill="#CBD5E1">selectgo</text>

    <g font-family="PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="15" fill="#E5E7EB">
      <rect x="36" y="70" width="218" height="34" rx="17" fill="#1E293B" stroke="#38BDF8" stroke-opacity="0.45"/>
      <text x="145" y="92" text-anchor="middle">poll order：先洗牌</text>

      <rect x="36" y="120" width="218" height="34" rx="17" fill="#1E293B" stroke="#A78BFA" stroke-opacity="0.45"/>
      <text x="145" y="142" text-anchor="middle">lock order：再排锁</text>

      <rect x="36" y="170" width="218" height="34" rx="17" fill="#1E293B" stroke="#F59E0B" stroke-opacity="0.45"/>
      <text x="145" y="192" text-anchor="middle">挂起后：醒来清场</text>
    </g>

    <g stroke="#64748B" stroke-width="2" fill="none" opacity="0.65">
      <path d="M145 104 L145 120"/>
      <path d="M145 154 L145 170"/>
    </g>
  </g>

  <g transform="translate(415 75)">
    <text x="0" y="48" font-family="PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="44" font-weight="700" fill="#F8FAFC">select 不是</text>
    <text x="0" y="102" font-family="PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="44" font-weight="700" fill="url(#accent)" filter="url(#glow)">O(1) 抽奖</text>
    <text x="0" y="152" font-family="PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="22" fill="#CBD5E1">case 越多，runtime 要组织的东西越多</text>

    <g transform="translate(0 188)" font-family="PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="16" fill="#CBD5E1">
      <circle cx="10" cy="10" r="5" fill="#38BDF8"/>
      <text x="28" y="16">跳过 nil channel</text>
      <circle cx="10" cy="48" r="5" fill="#A78BFA"/>
      <text x="28" y="54">按 hchan 地址排序加锁</text>
      <circle cx="10" cy="86" r="5" fill="#F59E0B"/>
      <text x="28" y="92">阻塞时注册多个 sudog</text>
    </g>
  </g>

  <path d="M367 190 C388 190 394 190 414 190" stroke="#38BDF8" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M404 180 L416 190 L404 200" stroke="#38BDF8" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
