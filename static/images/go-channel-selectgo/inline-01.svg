<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748B"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="600" y="78" text-anchor="middle" font-family="PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="34" font-weight="700" fill="#F8FAFC">selectgo 的一轮选择</text>
  <text x="600" y="118" text-anchor="middle" font-family="PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="18" fill="#94A3B8">不是抽一次奖，而是组织 case、加锁、注册、唤醒和清理</text>

  <g font-family="PingFang SC, Hiragino Sans GB, Arial, sans-serif">
    <g transform="translate(72 202)">
      <rect width="196" height="116" rx="22" fill="#111827" stroke="#334155" stroke-width="2"/>
      <text x="98" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#38BDF8">剔除 nil</text>
      <text x="98" y="76" text-anchor="middle" font-size="15" fill="#CBD5E1">没有 hchan</text>
      <text x="98" y="99" text-anchor="middle" font-size="15" fill="#CBD5E1">不进候选集合</text>
    </g>

    <g transform="translate(322 202)">
      <rect width="196" height="116" rx="22" fill="#111827" stroke="#334155" stroke-width="2"/>
      <text x="98" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#38BDF8">poll order</text>
      <text x="98" y="76" text-anchor="middle" font-size="15" fill="#CBD5E1">随机化扫描顺序</text>
      <text x="98" y="99" text-anchor="middle" font-size="15" fill="#CBD5E1">避免源码顺序偏向</text>
    </g>

    <g transform="translate(572 202)">
      <rect width="196" height="116" rx="22" fill="#111827" stroke="#334155" stroke-width="2"/>
      <text x="98" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#A78BFA">lock order</text>
      <text x="98" y="76" text-anchor="middle" font-size="15" fill="#CBD5E1">按 hchan 地址排序</text>
      <text x="98" y="99" text-anchor="middle" font-size="15" fill="#CBD5E1">避免多锁死锁</text>
    </g>

    <g transform="translate(822 202)">
      <rect width="196" height="116" rx="22" fill="#111827" stroke="#334155" stroke-width="2"/>
      <text x="98" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#F59E0B">扫描 ready</text>
      <text x="98" y="76" text-anchor="middle" font-size="15" fill="#CBD5E1">sendq / recvq</text>
      <text x="98" y="99" text-anchor="middle" font-size="15" fill="#CBD5E1">buffer / closed</text>
    </g>

    <g stroke="#64748B" stroke-width="3" fill="none" marker-end="url(#arrow)">
      <path d="M270 260 L316 260"/>
      <path d="M520 260 L566 260"/>
      <path d="M770 260 L816 260"/>
    </g>

    <g transform="translate(286 442)">
      <rect width="260" height="128" rx="24" fill="#111827" stroke="#334155" stroke-width="2"/>
      <text x="130" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#F59E0B">没有 ready</text>
      <text x="130" y="82" text-anchor="middle" font-size="16" fill="#CBD5E1">为每个 case 建 sudog</text>
      <text x="130" y="108" text-anchor="middle" font-size="16" fill="#CBD5E1">挂进 sendq / recvq</text>
    </g>

    <g transform="translate(654 442)">
      <rect width="260" height="128" rx="24" fill="#111827" stroke="#334155" stroke-width="2"/>
      <text x="130" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#22C55E">被唤醒</text>
      <text x="130" y="82" text-anchor="middle" font-size="16" fill="#CBD5E1">保留命中的 case</text>
      <text x="130" y="108" text-anchor="middle" font-size="16" fill="#CBD5E1">清掉未命中的 sudog</text>
    </g>

    <g stroke="#64748B" stroke-width="3" fill="none" marker-end="url(#arrow)">
      <path d="M920 320 C920 392 800 392 800 436"/>
      <path d="M550 506 L648 506"/>
    </g>
  </g>

  <rect x="250" y="638" width="700" height="52" rx="26" fill="#0F172A" stroke="#334155" stroke-width="2"/>
  <text x="600" y="672" text-anchor="middle" font-family="PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">随机只是表面，组织和清理才是 select 的真实成本</text>
</svg>
