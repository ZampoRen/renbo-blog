<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8e8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg2)"/>
  
  <!-- Title -->
  <text x="400" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#333333" text-anchor="middle">数据流动方式对比</text>
  
  <!-- CPU -->
  <rect x="50" y="80" width="220" height="380" rx="8" fill="#ffffff" stroke="#6366f1" stroke-width="2"/>
  <text x="160" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#6366f1" text-anchor="middle">CPU</text>
  
  <text x="70" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#666666">数据来回搬运</text>
  
  <rect x="70" y="175" width="180" height="80" rx="4" fill="#f0f0ff"/>
  <text x="160" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333" text-anchor="middle">寄存器 ←→ ALU</text>
  <text x="160" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888888" text-anchor="middle">逐个处理</text>
  
  <rect x="70" y="280" width="180" height="60" rx="4" fill="#f0f0ff"/>
  <text x="160" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333" text-anchor="middle">内存 → 寄存器</text>
  <text x="160" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888888" text-anchor="middle">频繁搬运</text>
  
  <!-- GPU -->
  <rect x="290" y="80" width="220" height="380" rx="8" fill="#ffffff" stroke="#22c55e" stroke-width="2"/>
  <text x="400" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#22c55e" text-anchor="middle">GPU</text>
  
  <text x="310" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#666666">并行处理</text>
  
  <rect x="310" y="175" width="180" height="100" rx="4" fill="#f0fff0"/>
  <text x="400" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333" text-anchor="middle">核心 1</text>
  <text x="400" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333" text-anchor="middle">核心 2</text>
  <text x="400" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333" text-anchor="middle">核心 3 ...</text>
  <text x="400" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888888" text-anchor="middle">成千上万核心</text>
  
  <rect x="310" y="300" width="180" height="60" rx="4" fill="#f0fff0"/>
  <text x="400" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333" text-anchor="middle">显存 → 核心</text>
  <text x="400" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888888" text-anchor="middle">并行搬运</text>
  
  <!-- TPU -->
  <rect x="530" y="80" width="220" height="380" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <text x="640" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#f59e0b" text-anchor="middle">TPU</text>
  
  <text x="550" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#666666">数据流动计算</text>
  
  <rect x="550" y="175" width="180" height="165" rx="4" fill="#fffaf0"/>
  <!-- Systolic Array visualization -->
  <rect x="565" y="195" width="30" height="30" fill="#fcd34d" opacity="0.6"/>
  <rect x="605" y="195" width="30" height="30" fill="#fcd34d" opacity="0.6"/>
  <rect x="645" y="195" width="30" height="30" fill="#fcd34d" opacity="0.6"/>
  <rect x="685" y="195" width="30" height="30" fill="#fcd34d" opacity="0.6"/>
  <rect x="565" y="235" width="30" height="30" fill="#fcd34d" opacity="0.6"/>
  <rect x="605" y="235" width="30" height="30" fill="#fcd34d" opacity="0.6"/>
  <rect x="645" y="235" width="30" height="30" fill="#fcd34d" opacity="0.6"/>
  <rect x="685" y="235" width="30" height="30" fill="#fcd34d" opacity="0.6"/>
  <rect x="565" y="275" width="30" height="30" fill="#fcd34d" opacity="0.6"/>
  <rect x="605" y="275" width="30" height="30" fill="#fcd34d" opacity="0.6"/>
  <rect x="645" y="275" width="30" height="30" fill="#fcd34d" opacity="0.6"/>
  <rect x="685" y="275" width="30" height="30" fill="#fcd34d" opacity="0.6"/>
  <text x="640" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888888" text-anchor="middle">脉动阵列</text>
  
  <rect x="550" y="360" width="180" height="60" rx="4" fill="#fffaf0"/>
  <text x="640" y="385" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333" text-anchor="middle">数据在阵列中流动</text>
  <text x="640" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888888" text-anchor="middle">不用来回搬运</text>
  
  <!-- Bottom note -->
  <text x="400" y="485" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#999999" text-anchor="middle">TPU：数据来找计算单元，而不是计算单元找数据</text>
</svg>
