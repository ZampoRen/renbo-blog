<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fafafa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg3)"/>
  
  <!-- Title -->
  <text x="400" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#333333" text-anchor="middle">什么时候用 TPU，什么时候用 GPU？</text>
  
  <!-- Left: GPU Zone -->
  <rect x="50" y="70" width="340" height="340" rx="8" fill="#f0fff0" stroke="#22c55e" stroke-width="2"/>
  <text x="220" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#22c55e" text-anchor="middle">→ 用 GPU</text>
  
  <line x1="80" y1="120" x2="360" y2="120" stroke="#22c55e" stroke-width="1" opacity="0.3"/>
  
  <text x="80" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#333333">✓ 小批量、频繁变更</text>
  <text x="80" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#333333">✓ 需要本地部署</text>
  <text x="80" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#333333">✓ 预算有限</text>
  <text x="80" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#333333">✓ 计算模式不固定</text>
  <text x="80" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#333333">✓ 大量非矩阵操作</text>
  
  <rect x="70" y="300" width="300" height="80" rx="4" fill="#ffffff" opacity="0.6"/>
  <text x="220" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#666666" text-anchor="middle">关键词：灵活、通用、</text>
  <text x="220" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#666666" text-anchor="middle">生态成熟</text>
  
  <!-- Right: TPU Zone -->
  <rect x="410" y="70" width="340" height="340" rx="8" fill="#fffaf0" stroke="#f59e0b" stroke-width="2"/>
  <text x="580" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#f59e0b" text-anchor="middle">→ 用 TPU</text>
  
  <line x1="440" y1="120" x2="720" y2="120" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
  
  <text x="440" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#333333">✓ 大规模训练</text>
  <text x="440" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#333333">✓ 批量推理</text>
  <text x="440" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#333333">✓ 矩阵密集型计算</text>
  <text x="440" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#333333">✓ 已在用 Google Cloud</text>
  <text x="440" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#333333">✓ 成本效益明确</text>
  
  <rect x="430" y="300" width="300" height="80" rx="4" fill="#ffffff" opacity="0.6"/>
  <text x="580" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#666666" text-anchor="middle">关键词：专用、批量、</text>
  <text x="580" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#666666" text-anchor="middle">工程优化</text>
  
  <!-- Bottom tagline -->
  <text x="400" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#888888" text-anchor="middle">TPU 不是什么神秘黑科技，而是针对特定计算模式的工程优化</text>
</svg>
