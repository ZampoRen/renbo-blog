<svg width="900" height="383" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cpuGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gpuGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tpuGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="383" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="450" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">CPU vs GPU vs TPU</text>
  <text x="450" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a0a0a0" text-anchor="middle">工程权衡的不同选择</text>
  
  <!-- CPU -->
  <rect x="60" y="120" width="240" height="200" rx="8" fill="url(#cpuGrad)" opacity="0.15"/>
  <rect x="60" y="120" width="4" height="200" rx="2" fill="#6366f1"/>
  <text x="80" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#6366f1">CPU</text>
  <text x="80" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#c0c0c0">• 通用计算</text>
  <text x="80" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#c0c0c0">• 强在灵活性</text>
  <text x="80" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#c0c0c0">• 逐个处理</text>
  <text x="80" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#808080" font-style="italic">适合：通用任务</text>
  
  <!-- GPU -->
  <rect x="330" y="120" width="240" height="200" rx="8" fill="url(#gpuGrad)" opacity="0.15"/>
  <rect x="330" y="120" width="4" height="200" rx="2" fill="#22c55e"/>
  <text x="350" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#22c55e">GPU</text>
  <text x="350" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#c0c0c0">• 并行计算</text>
  <text x="350" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#c0c0c0">• 成千上万核心</text>
  <text x="350" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#c0c0c0">• 自己决定并行</text>
  <text x="350" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#808080" font-style="italic">适合：图形/AI 训练</text>
  
  <!-- TPU -->
  <rect x="600" y="120" width="240" height="200" rx="8" fill="url(#tpuGrad)" opacity="0.15"/>
  <rect x="600" y="120" width="4" height="200" rx="2" fill="#f59e0b"/>
  <text x="620" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#f59e0b">TPU</text>
  <text x="620" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#c0c0c0">• 专用计算</text>
  <text x="620" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#c0c0c0">• 脉动阵列</text>
  <text x="620" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#c0c0c0">• 数据流动计算</text>
  <text x="620" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#808080" font-style="italic">适合：矩阵/批量推理</text>
  
  <!-- Bottom tagline -->
  <text x="450" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#606060" text-anchor="middle">不是谁先进谁落后，而是工程权衡的不同选择</text>
</svg>
