    <text x="104" y="112" text-anchor="middle" fill="#E5E7EB" font-family="Menlo, Heiti SC, Consolas, monospace" font-size="22" font-weight="700">ch &lt;- v</text>
    <text x="104" y="140" text-anchor="middle" fill="#94A3B8" font-family="Heiti SC, PingFang SC, sans-serif" font-size="15">send 入口</text>
    <g stroke-width="6" stroke-linecap="round" fill="none">
      <path d="M155 120 C230 60 285 50 358 42" stroke="#F97316"/>
      <path d="M158 120 C238 96 290 100 362 102" stroke="#22C55E"/>
      <path d="M160 120 C245 130 292 150 365 164" stroke="#38BDF8"/>
      <path d="M157 120 C235 166 285 210 360 230" stroke="#A78BFA"/>
