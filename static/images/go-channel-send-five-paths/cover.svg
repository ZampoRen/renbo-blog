    <g font-family="Heiti SC, PingFang SC, sans-serif" font-size="15" font-weight="700">
      <text x="380" y="47" fill="#FDBA74">nil：永久等</text>
      <text x="386" y="107" fill="#86EFAC">receiver：直接交付</text>
      <text x="388" y="169" fill="#7DD3FC">buffer：写进环形队列</text>
      <text x="382" y="235" fill="#DDD6FE">non-blocking：直接失败</text>
