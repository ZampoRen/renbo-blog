<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#38bdf8"/>
    </marker>
    <style>
      .title { font: 700 48px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; fill: #f8fafc; }
      .sub { font: 400 24px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; fill: #cbd5e1; }
      .label { font: 700 26px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; fill: #e2e8f0; }
      .small { font: 400 19px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; fill: #94a3b8; }
      .accent { fill: #38bdf8; }
      .warn { fill: #fb7185; }
      .ok { fill: #34d399; }
    </style>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <circle cx="965" cy="145" r="180" fill="#1e3a8a" opacity="0.22"/>
  <circle cx="210" cy="630" r="220" fill="#0e7490" opacity="0.16"/>

  <text x="70" y="105" class="title">close(ch) 不是关门</text>
  <text x="72" y="150" class="sub">它把等待队列里的 goroutine 同时叫醒</text>

  <rect x="80" y="245" width="260" height="170" rx="26" fill="url(#card)" stroke="#334155" stroke-width="2"/>
  <text x="125" y="310" class="label">recvq</text>
  <text x="125" y="348" class="small">等接收的人</text>
  <text x="125" y="382" class="small ok">醒来：零值 + ok=false</text>

  <rect x="470" y="235" width="260" height="190" rx="32" fill="#082f49" stroke="#38bdf8" stroke-width="3"/>
  <text x="545" y="310" class="label">hchan</text>
  <text x="520" y="350" class="small">closed = 1</text>
  <text x="510" y="384" class="small">buf / sendq / recvq</text>

  <rect x="860" y="245" width="260" height="170" rx="26" fill="url(#card)" stroke="#334155" stroke-width="2"/>
  <text x="905" y="310" class="label">sendq</text>
  <text x="905" y="348" class="small">等发送的人</text>
  <text x="905" y="382" class="small warn">醒来：panic</text>

  <path d="M350 330 C395 330 420 330 458 330" stroke="#38bdf8" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M742 330 C785 330 812 330 850 330" stroke="#38bdf8" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <rect x="225" y="520" width="750" height="92" rx="24" fill="#020617" stroke="#1e293b" stroke-width="2"/>
  <text x="280" y="578" class="sub">nil 是没有对象；closed 是对象进入终态</text>
  <circle cx="244" cy="565" r="8" class="accent"/>
  <circle cx="958" cy="565" r="8" class="accent"/>
</svg>
