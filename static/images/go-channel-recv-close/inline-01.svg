<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="760" rx="34" fill="url(#bg)"/>
  <text x="600" y="90" text-anchor="middle" fill="#f8fafc" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="42" font-weight="800">close(ch) 不是关门</text>
  <text x="600" y="140" text-anchor="middle" fill="#93c5fd" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="26" font-weight="600">它是一次批量唤醒：receiver 和 sender 醒来后命运不同</text>

  <rect x="430" y="220" width="340" height="120" rx="28" fill="#111827" stroke="#38bdf8" stroke-width="3" filter="url(#glow)"/>
  <text x="600" y="270" text-anchor="middle" fill="#f8fafc" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="30" font-weight="800">hchan.closed = 1</text>
  <text x="600" y="312" text-anchor="middle" fill="#cbd5e1" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22">先标记，再清队列</text>

  <path d="M430 285 C320 285 280 255 220 255" fill="none" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M770 285 C880 285 920 255 980 255" fill="none" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M515 340 C465 430 390 470 300 500" fill="none" stroke="#64748b" stroke-width="3" stroke-dasharray="8 10"/>
  <path d="M685 340 C735 430 810 470 900 500" fill="none" stroke="#64748b" stroke-width="3" stroke-dasharray="8 10"/>

  <rect x="90" y="190" width="280" height="150" rx="26" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
  <text x="230" y="242" text-anchor="middle" fill="#86efac" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="30" font-weight="800">recvq</text>
  <text x="230" y="286" text-anchor="middle" fill="#e2e8f0" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24">receiver 被唤醒</text>
  <text x="230" y="318" text-anchor="middle" fill="#94a3b8" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20">零值 · ok=false</text>

  <rect x="830" y="190" width="280" height="150" rx="26" fill="#0f172a" stroke="#fb7185" stroke-width="2"/>
  <text x="970" y="242" text-anchor="middle" fill="#fda4af" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="30" font-weight="800">sendq</text>
  <text x="970" y="286" text-anchor="middle" fill="#e2e8f0" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24">sender 被唤醒</text>
  <text x="970" y="318" text-anchor="middle" fill="#94a3b8" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20">继续执行 · panic</text>

  <rect x="160" y="505" width="880" height="96" rx="24" fill="#020617" stroke="#334155" stroke-width="2"/>
  <text x="600" y="548" text-anchor="middle" fill="#f8fafc" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="26" font-weight="800">nil channel 是没有门；closed channel 是门已经被打开过</text>
  <text x="600" y="584" text-anchor="middle" fill="#94a3b8" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20">一个没人能唤醒，一个会按关闭语义继续走</text>

  <text x="600" y="680" text-anchor="middle" fill="#64748b" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18">Go runtime/chan.go · chanrecv · closechan</text>
</svg>