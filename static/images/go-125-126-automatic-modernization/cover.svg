<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 383" width="900" height="383">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2dd4bf;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="codeglow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0.06"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="383" fill="url(#bg)" rx="12"/>

  <!-- Subtle code lines in background -->
  <g opacity="0.04" font-family="'SF Mono','Fira Code','monospace'" font-size="11" fill="#94a3b8">
    <text x="40" y="50">func fixer() { for range n { newStyle() } }</text>
    <text x="520" y="90">//go:fix inline</text>
    <text x="60" y="130">go fix ./...</text>
    <text x="480" y="170">GOEXPERIMENT=greenteagc</text>
  </g>

  <!-- Decorative gear/wheel icon area (right side) -->
  <g transform="translate(680, 140)" opacity="0.15">
    <circle cx="60" cy="60" r="50" fill="none" stroke="#22d3ee" stroke-width="2"/>
    <circle cx="60" cy="60" r="30" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
    <line x1="10" y1="60" x2="110" y2="60" stroke="#22d3ee" stroke-width="1.5"/>
    <line x1="60" y1="10" x2="60" y2="110" stroke="#22d3ee" stroke-width="1.5"/>
    <line x1="24.6" y1="24.6" x2="95.4" y2="95.4" stroke="#22d3ee" stroke-width="1.5"/>
    <line x1="95.4" y1="24.6" x2="24.6" y2="95.4" stroke="#22d3ee" stroke-width="1.5"/>
  </g>

  <!-- Main title -->
  <text x="50" y="130" font-family="'SF Pro','-apple-system','Noto Sans SC','sans-serif'" font-size="32" font-weight="700" fill="#f1f5f9">
    <tspan>你的旧 Go 代码</tspan>
  </text>

  <!-- Highlighted subtitle line -->
  <text x="50" y="175" font-family="'SF Pro','-apple-system','Noto Sans SC','sans-serif'" font-size="28" font-weight="600" fill="url(#accent)" filter="url(#glow)">
    Go 1.26 能一键救回来
  </text>

  <!-- Description -->
  <text x="50" y="225" font-family="'SF Pro','-apple-system','Noto Sans SC','sans-serif'" font-size="14" fill="#94a3b8">
    <tspan>gofix modernizers · Green Tea GC · testing/synctest</tspan>
  </text>
  <text x="50" y="248" font-family="'SF Pro','-apple-system','Noto Sans SC','sans-serif'" font-size="13" fill="#64748b">
    <tspan>零代码改动，批量现代化，从 Go 1.25 开始</tspan>
  </text>

  <!-- Divider line -->
  <line x1="50" y1="275" x2="280" y2="275" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>

  <!-- Bottom tag labels -->
  <g transform="translate(50, 310)">
    <rect x="0" y="0" width="130" height="28" rx="14" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>
    <text x="65" y="19" font-family="'SF Pro','sans-serif'" font-size="12" fill="#22d3ee" text-anchor="middle">
      # 工具链进化
    </text>
  </g>
  <g transform="translate(195, 310)">
    <rect x="0" y="0" width="130" height="28" rx="14" fill="none" stroke="#2dd4bf" stroke-width="1" opacity="0.5"/>
    <text x="65" y="19" font-family="'SF Pro','sans-serif'" font-size="12" fill="#2dd4bf" text-anchor="middle">
      # 零成本升级
    </text>
  </g>
  <g transform="translate(340, 310)">
    <rect x="0" y="0" width="130" height="28" rx="14" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.5"/>
    <text x="65" y="19" font-family="'SF Pro','sans-serif'" font-size="12" fill="#38bdf8" text-anchor="middle">
      # 自动化重构
    </text>
  </g>
</svg>
