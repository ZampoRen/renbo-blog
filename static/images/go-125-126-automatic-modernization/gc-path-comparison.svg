<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" font-family="'SF Mono','Fira Code','monospace'">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="page-a" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="page-b" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#2dd4bf;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="page-c" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="page-d" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#f472b6;stop-opacity:0.08"/>
    </linearGradient>
    <marker id="arrowhead-gray" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#64748b"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#2dd4bf"/>
    </marker>
  </defs>

  <rect width="800" height="420" fill="url(#bg-gradient)" rx="12"/>

  <!-- Title -->
  <text x="30" y="40" font-family="'SF Pro','sans-serif'" font-size="16" font-weight="600" fill="#f1f5f9">GC 标记路径对比</text>
  <text x="30" y="60" font-family="'SF Pro','sans-serif'" font-size="12" fill="#64748b">传统按对象扫描（上）vs Green Tea 按页扫描（下）</text>

  <!-- ====================== TOP: Graph flood ====================== -->
  
  <!-- Label -->
  <rect x="30" y="85" width="160" height="26" rx="6" fill="#f87171" opacity="0.2"/>
  <text x="110" y="102" font-family="'SF Pro','sans-serif'" font-size="12" fill="#f87171" text-anchor="middle" font-weight="600">传统标记-清扫</text>

  <!-- Objects on heap - graph flood view -->
  <!-- Page group labels -->
  <text x="60" y="131" font-family="'SF Pro','sans-serif'" font-size="9" fill="#38bdf8" opacity="0.6">Page A</text>
  <text x="260" y="131" font-family="'SF Pro','sans-serif'" font-size="9" fill="#2dd4bf" opacity="0.6">Page B</text>
  <text x="460" y="131" font-family="'SF Pro','sans-serif'" font-size="9" fill="#818cf8" opacity="0.6">Page C</text>
  <text x="620" y="131" font-family="'SF Pro','sans-serif'" font-size="9" fill="#f472b6" opacity="0.6">Page D</text>

  <!-- Object boxes -->
  <g stroke="#475569" stroke-width="0.5" fill="none">
    <!-- Page A objects -->
    <rect x="60" y="136" width="50" height="18" rx="3" fill="#38bdf8" opacity="0.3"/>
    <rect x="60" y="136" width="50" height="18" rx="3" fill="none" stroke="#38bdf8" stroke-width="1"/>
    <rect x="120" y="136" width="50" height="18" rx="3" fill="#38bdf8" opacity="0.15"/>
    <rect x="120" y="136" width="50" height="18" rx="3" fill="none" stroke="#38bdf8" stroke-width="1"/>
    <rect x="60" y="158" width="50" height="18" rx="3" fill="#38bdf8" opacity="0.15"/>
    <rect x="60" y="158" width="50" height="18" rx="3" fill="none" stroke="#38bdf8" stroke-width="1"/>

    <!-- Page B objects -->
    <rect x="250" y="136" width="50" height="18" rx="3" fill="#2dd4bf" opacity="0.3"/>
    <rect x="250" y="136" width="50" height="18" rx="3" fill="none" stroke="#2dd4bf" stroke-width="1"/>
    <rect x="310" y="136" width="50" height="18" rx="3" fill="#2dd4bf" opacity="0.15"/>
    <rect x="310" y="136" width="50" height="18" rx="3" fill="none" stroke="#2dd4bf" stroke-width="1"/>
    <rect x="250" y="158" width="50" height="18" rx="3" fill="#2dd4bf" opacity="0.15"/>
    <rect x="250" y="158" width="50" height="18" rx="3" fill="none" stroke="#2dd4bf" stroke-width="1"/>

    <!-- Page C objects -->
    <rect x="450" y="136" width="50" height="18" rx="3" fill="#818cf8" opacity="0.3"/>
    <rect x="450" y="136" width="50" height="18" rx="3" fill="none" stroke="#818cf8" stroke-width="1"/>
    <rect x="510" y="136" width="50" height="18" rx="3" fill="#818cf8" opacity="0.15"/>
    <rect x="510" y="136" width="50" height="18" rx="3" fill="none" stroke="#818cf8" stroke-width="1"/>

    <!-- Page D objects -->
    <rect x="610" y="136" width="50" height="18" rx="3" fill="#f472b6" opacity="0.3"/>
    <rect x="610" y="136" width="50" height="18" rx="3" fill="none" stroke="#f472b6" stroke-width="1"/>
    <rect x="670" y="136" width="50" height="18" rx="3" fill="#f472b6" opacity="0.15"/>
    <rect x="670" y="136" width="50" height="18" rx="3" fill="none" stroke="#f472b6" stroke-width="1"/>
  </g>

  <!-- Jumpy path arrows (marked as visited) -->
  <g stroke="#64748b" stroke-width="1.5" fill="none" opacity="0.5" marker-end="url(#arrowhead-gray)">
    <path d="M 85,136 L 85,120 L 275,120 L 275,136" stroke-dasharray="3,2"/>
    <path d="M 275,136 L 475,136 L 475,100 L 85,100 L 85,136" stroke-dasharray="3,2"/>
    <path d="M 85,154 L 250,136" stroke-dasharray="3,2"/>
    <path d="M 275,154 L 635,136" stroke-dasharray="3,2"/>
    <path d="M 250,158 L 85,136" stroke-dasharray="3,2"/>
  </g>

  <text x="30" y="198" font-family="'SF Pro','sans-serif'" font-size="10" fill="#64748b">
    <tspan>7 次扫描，内存跳转随机，CPU 缓存命中率低</tspan>
  </text>

  <!-- ====================== BOTTOM: Green Tea ====================== -->

  <rect x="30" y="225" width="160" height="26" rx="6" fill="#2dd4bf" opacity="0.2"/>
  <text x="110" y="242" font-family="'SF Pro','sans-serif'" font-size="12" fill="#2dd4bf" text-anchor="middle" font-weight="600">Green Tea 按页扫描</text>

  <!-- Pages as grouped blocks -->
  <g stroke="#475569" stroke-width="0.5" fill="none">
    <rect x="60" y="270" width="165" height="60" rx="6" stroke="#38bdf8" stroke-width="1" fill="url(#page-a)"/>
    <rect x="245" y="270" width="165" height="60" rx="6" stroke="#2dd4bf" stroke-width="1" fill="url(#page-b)"/>
    <rect x="430" y="270" width="165" height="60" rx="6" stroke="#818cf8" stroke-width="1" fill="url(#page-c)"/>
    <rect x="615" y="270" width="155" height="60" rx="6" stroke="#f472b6" stroke-width="1" fill="url(#page-d)"/>
  </g>

  <!-- Page labels -->
  <text x="142" y="348" font-family="'SF Pro','sans-serif'" font-size="9" fill="#38bdf8" text-anchor="middle" opacity="0.7">Page A</text>
  <text x="327" y="348" font-family="'SF Pro','sans-serif'" font-size="9" fill="#2dd4bf" text-anchor="middle" opacity="0.7">Page B</text>
  <text x="512" y="348" font-family="'SF Pro','sans-serif'" font-size="9" fill="#818cf8" text-anchor="middle" opacity="0.7">Page C</text>
  <text x="692" y="348" font-family="'SF Pro','sans-serif'" font-size="9" fill="#f472b6" text-anchor="middle" opacity="0.7">Page D</text>

  <!-- Green path - batch, straight -->
  <g stroke="#2dd4bf" stroke-width="2.5" fill="none" opacity="0.7" marker-end="url(#arrowhead-green)">
    <path d="M 142,270 L 142,260 L 327,260 L 327,270"/>
    <path d="M 327,295 L 327,305 L 692,305 L 692,270"/>
    <path d="M 142,270 L 142,295"/>
  </g>

  <!-- Object markers inside pages -->
  <g>
    <circle cx="95" cy="290" r="5" fill="#38bdf8" opacity="0.6"/>
    <circle cx="130" cy="290" r="5" fill="#38bdf8" opacity="0.3"/>
    <circle cx="165" cy="290" r="5" fill="#38bdf8" opacity="0.3"/>
    <circle cx="200" cy="290" r="5" fill="#38bdf8" opacity="0.6"/>
    
    <circle cx="280" cy="290" r="5" fill="#2dd4bf" opacity="0.6"/>
    <circle cx="315" cy="290" r="5" fill="#2dd4bf" opacity="0.3"/>
    <circle cx="350" cy="290" r="5" fill="#2dd4bf" opacity="0.6"/>
    <circle cx="385" cy="290" r="5" fill="#2dd4bf" opacity="0.3"/>

    <circle cx="465" cy="290" r="5" fill="#818cf8" opacity="0.6"/>
    <circle cx="500" cy="290" r="5" fill="#818cf8" opacity="0.3"/>
    <circle cx="535" cy="290" r="5" fill="#818cf8" opacity="0.3"/>
    <circle cx="570" cy="290" r="5" fill="#818cf8" opacity="0.6"/>

    <circle cx="650" cy="290" r="5" fill="#f472b6" opacity="0.6"/>
    <circle cx="685" cy="290" r="5" fill="#f472b6" opacity="0.3"/>
    <circle cx="720" cy="290" r="5" fill="#f472b6" opacity="0.3"/>
  </g>

  <text x="30" y="385" font-family="'SF Pro','sans-serif'" font-size="10" fill="#2dd4bf" opacity="0.8">
    <tspan>✓ 4 次批量扫描，页内连续访问，CPU 缓存友好</tspan>
  </text>
</svg>
