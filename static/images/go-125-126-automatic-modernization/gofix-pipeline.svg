<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" font-family="'SF Mono','Fira Code','monospace'">
  <defs>
    <linearGradient id="old-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="pipeline-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="new-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3443;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#134e4a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#2dd4bf;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect width="800" height="420" fill="#0f172a" rx="12"/>

  <!-- Title -->
  <text x="30" y="45" font-family="'SF Pro','sans-serif'" font-size="16" font-weight="600" fill="#f1f5f9">go fix 自动化流水线</text>
  <text x="30" y="66" font-family="'SF Pro','sans-serif'" font-size="12" fill="#64748b">一次命令，批量转换</text>

  <!-- Left: old code block -->
  <rect x="30" y="95" width="220" height="240" rx="10" fill="url(#old-bg)" stroke="#475569" stroke-width="1"/>
  <text x="50" y="125" font-family="'SF Pro','sans-serif'" font-size="12" font-weight="600" fill="#f87171">旧代码 (Go 1.18)</text>

  <text x="50" y="160" font-family="'SF Mono','monospace'" font-size="11" fill="#94a3b8">
    <tspan x="50" dy="0">for i := 0; i &lt; n; i++ {</tspan>
    <tspan x="65" dy="18">result[i] = data[i]</tspan>
    <tspan x="50" dy="18">}</tspan>
    <tspan x="50" dy="24">if x &lt; 0 { x = 0 }</tspan>
    <tspan x="50" dy="20">eq := strings.Index</tspan>
    <tspan x="65" dy="18">Byte(s, ':')</tspan>
    <tspan x="50" dy="20">var r []string</tspan>
    <tspan x="65" dy="18">for _, v := range s {</tspan>
    <tspan x="80" dy="18">r = append(r, v)</tspan>
    <tspan x="65" dy="18">}</tspan>
  </text>

  <!-- Arrow: old → pipeline -->
  <g transform="translate(255, 195)">
    <path d="M 0,0 L 30,0 L 40,15 L 30,30 L 0,30 Z" fill="url(#arrow)" opacity="0.8"/>
  </g>

  <!-- Middle: pipeline box -->
  <rect x="290" y="95" width="220" height="240" rx="10" fill="url(#pipeline-bg)" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4,3" opacity="0.9">

  </rect>
  <text x="310" y="125" font-family="'SF Pro','sans-serif'" font-size="12" font-weight="600" fill="#22d3ee">$ go fix ./...</text>

  <g font-family="'SF Mono','monospace'" font-size="10" fill="#e2e8f0">
    <rect x="305" y="142" width="190" height="24" rx="6" fill="#22d3ee" opacity="0.15"/>
    <text x="315" y="158">rangeint</text>
    <text x="315" y="158" fill="#64748b" text-anchor="end" width="175">→ for range n</text>

    <rect x="305" y="172" width="190" height="24" rx="6" fill="#2dd4bf" opacity="0.15"/>
    <text x="315" y="188">minmax</text>
    <text x="315" y="188" fill="#64748b" text-anchor="end" width="175">→ min(max(...))</text>

    <rect x="305" y="202" width="190" height="24" rx="6" fill="#38bdf8" opacity="0.15"/>
    <text x="315" y="218">stringscut</text>
    <text x="315" y="218" fill="#64748b" text-anchor="end" width="175">→ strings.Cut</text>

    <rect x="305" y="232" width="190" height="24" rx="6" fill="#818cf8" opacity="0.15"/>
    <text x="315" y="248">mapsloop</text>
    <text x="315" y="248" fill="#64748b" text-anchor="end" width="175">→ maps.Keys</text>

    <rect x="305" y="262" width="190" height="24" rx="6" fill="#f472b6" opacity="0.15"/>
    <text x="315" y="278">forvar</text>
    <text x="315" y="278" fill="#64748b" text-anchor="end" width="175">→ 删除 x := x</text>
  </g>

  <text x="310" y="318" font-family="'SF Pro','sans-serif'" font-size="10" fill="#64748b">› 20+ modernizers · 联动修复 · 跑两次更干净</text>

  <!-- Arrow: pipeline → new -->
  <g transform="translate(515, 195)">
    <path d="M 0,0 L 30,0 L 40,15 L 30,30 L 0,30 Z" fill="url(#arrow)" opacity="0.8"/>
  </g>

  <!-- Right: new code block -->
  <rect x="550" y="95" width="220" height="240" rx="10" fill="url(#new-bg)" stroke="#2dd4bf" stroke-width="1">
  </rect>
  <text x="570" y="125" font-family="'SF Pro','sans-serif'" font-size="12" font-weight="600" fill="#2dd4bf">新代码 (Go 1.26)</text>

  <text x="570" y="160" font-family="'SF Mono','monospace'" font-size="11" fill="#e2e8f0">
    <tspan x="570" dy="0">for range n {</tspan>
    <tspan x="585" dy="18">result[i] = data[i]</tspan>
    <tspan x="570" dy="18">}</tspan>
    <tspan x="570" dy="24">x = min(max(x, 0), 100)</tspan>
    <tspan x="570" dy="20">before, _, ok := </tspan>
    <tspan x="585" dy="18">strings.Cut(s, ":")</tspan>
    <tspan x="570" dy="20">r := slices.Clone(s)</tspan>
  </text>

  <!-- Bottom note -->
  <text x="30" y="385" font-family="'SF Pro','sans-serif'" font-size="11" fill="#475569">* 示意图。实际效果取决于项目代码规模和分析器版本</text>
</svg>
