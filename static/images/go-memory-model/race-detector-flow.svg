<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#101827"/><stop offset="1" stop-color="#172554"/></linearGradient>
  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#38bdf8"/><stop offset="1" stop-color="#a78bfa"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity="0.28"/></filter>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#7dd3fc"/></marker>
</defs>
<rect width="1200" height="760" rx="36" fill="url(#bg)"/>
<text x="80" y="92" fill="#f8fafc" font-family="Arial, PingFang SC, sans-serif" font-size="44" font-weight="700">race detector 是烟雾报警器</text>
<text x="82" y="136" fill="#bfdbfe" font-family="Arial, PingFang SC, sans-serif" font-size="24">它只能发现实际跑到的 data race，不能替你证明程序正确</text>
<g font-family="Arial, PingFang SC, sans-serif">
<rect x="70" y="235" width="210" height="140" rx="24" fill="#0f172a" stroke="#38bdf8" stroke-width="2" filter="url(#shadow)"/>
<text x="105" y="292" fill="#f8fafc" font-size="27" font-weight="700">-race 编译</text>
<text x="105" y="334" fill="#93c5fd" font-size="21">插桩记录访问</text>
<rect x="345" y="235" width="210" height="140" rx="24" fill="#111827" stroke="#a78bfa" stroke-width="2" filter="url(#shadow)"/>
<text x="380" y="292" fill="#f8fafc" font-size="27" font-weight="700">运行测试</text>
<text x="380" y="334" fill="#c4b5fd" font-size="21">覆盖到才看见</text>
<rect x="620" y="235" width="210" height="140" rx="24" fill="#0f172a" stroke="#fb7185" stroke-width="2" filter="url(#shadow)"/>
<text x="654" y="292" fill="#f8fafc" font-size="27" font-weight="700">冲突读写</text>
<text x="654" y="334" fill="#fecdd3" font-size="21">WARNING: DATA RACE</text>
<rect x="895" y="235" width="235" height="140" rx="24" fill="#111827" stroke="#34d399" stroke-width="2" filter="url(#shadow)"/>
<text x="930" y="292" fill="#f8fafc" font-size="27" font-weight="700">修复并回归</text>
<text x="930" y="334" fill="#bbf7d0" font-size="21">补同步链</text>
<path d="M280 305 L345 305" stroke="#7dd3fc" stroke-width="5" marker-end="url(#arrow)"/>
<path d="M555 305 L620 305" stroke="#7dd3fc" stroke-width="5" marker-end="url(#arrow)"/>
<path d="M830 305 L895 305" stroke="#7dd3fc" stroke-width="5" marker-end="url(#arrow)"/>
</g>
<rect x="155" y="500" width="890" height="110" rx="24" fill="#3f1d2a" stroke="#fb7185" stroke-opacity="0.6"/>
<text x="205" y="560" fill="#fff1f2" font-size="30" font-weight="700" font-family="Arial, PingFang SC">没报警不代表没火，可能只是路径没跑到。</text>
<text x="205" y="596" fill="#fecdd3" font-size="22" font-family="Arial, PingFang SC">先用内存模型推理，再用工具验证和回归</text>
</svg>