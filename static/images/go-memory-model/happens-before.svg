<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#101827"/><stop offset="1" stop-color="#172554"/></linearGradient>
  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#38bdf8"/><stop offset="1" stop-color="#a78bfa"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity="0.28"/></filter>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#7dd3fc"/></marker>
</defs>
<rect width="1200" height="760" rx="36" fill="url(#bg)"/>
<text x="80" y="92" fill="#f8fafc" font-family="Arial, PingFang SC, sans-serif" font-size="44" font-weight="700">happens-before 不是时间线，是可见性证明链</text>
<text x="82" y="136" fill="#bfdbfe" font-family="Arial, PingFang SC, sans-serif" font-size="24">普通读写要跨 goroutine 可靠，需要同步动作把两端接起来</text>
<rect x="78" y="205" width="320" height="190" rx="26" fill="#0f172a" stroke="#38bdf8" stroke-width="2" filter="url(#shadow)"/>
<text x="118" y="258" fill="#e0f2fe" font-size="28" font-weight="700" font-family="Arial, PingFang SC">goroutine A</text>
<text x="118" y="310" fill="#f8fafc" font-size="25" font-family="Menlo, monospace">data = payload</text>
<text x="118" y="350" fill="#93c5fd" font-size="22" font-family="Arial, PingFang SC">ordinary write</text>
<rect x="440" y="205" width="320" height="190" rx="26" fill="#111827" stroke="#a78bfa" stroke-width="2" filter="url(#shadow)"/>
<text x="480" y="258" fill="#ede9fe" font-size="28" font-weight="700" font-family="Arial, PingFang SC">同步动作</text>
<text x="480" y="310" fill="#f8fafc" font-size="25" font-family="Arial, PingFang SC">channel / mutex / once</text>
<text x="480" y="350" fill="#c4b5fd" font-size="22" font-family="Arial, PingFang SC">synchronized-before</text>
<rect x="802" y="205" width="320" height="190" rx="26" fill="#0f172a" stroke="#38bdf8" stroke-width="2" filter="url(#shadow)"/>
<text x="842" y="258" fill="#e0f2fe" font-size="28" font-weight="700" font-family="Arial, PingFang SC">goroutine B</text>
<text x="842" y="310" fill="#f8fafc" font-size="25" font-family="Menlo, monospace">use(data)</text>
<text x="842" y="350" fill="#93c5fd" font-size="22" font-family="Arial, PingFang SC">ordinary read</text>
<path d="M398 300 C420 300, 420 300, 440 300" stroke="#7dd3fc" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
<path d="M760 300 C782 300, 782 300, 802 300" stroke="#7dd3fc" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
<rect x="155" y="485" width="890" height="105" rx="24" fill="#082f49" stroke="#38bdf8" stroke-opacity="0.55"/>
<text x="205" y="545" fill="#f8fafc" font-size="30" font-weight="700" font-family="Arial, PingFang SC">ready=true 不是发布；同步才是发布。</text>
<text x="205" y="580" fill="#bae6fd" font-size="22" font-family="Arial, PingFang SC">没有这条链，看到 flag 也不等于看到数据</text>
<text x="80" y="690" fill="#64748b" font-size="20" font-family="Arial, PingFang SC">Go Memory Model · DRF-SC · happens-before</text>
</svg>