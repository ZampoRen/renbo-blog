<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#101827"/><stop offset="1" stop-color="#172554"/></linearGradient>
  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#38bdf8"/><stop offset="1" stop-color="#a78bfa"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity="0.28"/></filter>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#7dd3fc"/></marker>
</defs>
<rect width="1200" height="760" rx="36" fill="url(#bg)"/>
<text x="80" y="92" fill="#f8fafc" font-family="Arial, PingFang SC, sans-serif" font-size="44" font-weight="700">内存屏障在地基里，不在业务 API 里</text>
<text x="82" y="136" fill="#bfdbfe" font-family="Arial, PingFang SC, sans-serif" font-size="24">Go 用同步原语抽象掉平台差异，业务代码按 memory model 推理</text>
<rect x="90" y="220" width="450" height="250" rx="28" fill="#0f172a" stroke="#38bdf8" stroke-width="2" filter="url(#shadow)"/>
<text x="135" y="275" fill="#e0f2fe" font-size="30" font-weight="700" font-family="Arial, PingFang SC">你写的 Go 代码</text>
<text x="135" y="330" fill="#f8fafc" font-size="24" font-family="Arial, PingFang SC">channel / mutex / Once</text>
<text x="135" y="370" fill="#f8fafc" font-size="24" font-family="Arial, PingFang SC">WaitGroup / atomic</text>
<text x="135" y="420" fill="#93c5fd" font-size="22" font-family="Arial, PingFang SC">表达：这里需要同步</text>
<rect x="660" y="220" width="450" height="250" rx="28" fill="#111827" stroke="#a78bfa" stroke-width="2" filter="url(#shadow)"/>
<text x="705" y="275" fill="#ede9fe" font-size="30" font-weight="700" font-family="Arial, PingFang SC">实现承担的细节</text>
<text x="705" y="330" fill="#f8fafc" font-size="24" font-family="Arial, PingFang SC">CPU 重排 / 编译器优化</text>
<text x="705" y="370" fill="#f8fafc" font-size="24" font-family="Arial, PingFang SC">StoreLoad / LoadLoad ...</text>
<text x="705" y="420" fill="#c4b5fd" font-size="22" font-family="Arial, PingFang SC">落实：不同平台用合适机制</text>
<path d="M540 345 C585 345, 615 345, 660 345" stroke="#7dd3fc" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
<rect x="155" y="555" width="890" height="92" rx="24" fill="#082f49" stroke="#38bdf8" stroke-opacity="0.55"/>
<text x="205" y="612" fill="#f8fafc" font-size="30" font-weight="700" font-family="Arial, PingFang SC">不要问“要不要手写屏障”，先问“有没有同步原语”。</text>
</svg>