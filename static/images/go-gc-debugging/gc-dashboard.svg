<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720"><rect width="1200" height="720" rx="28" fill="#0f172a"/><text x="600" y="82" text-anchor="middle" fill="#f8fafc" font-size="42" font-weight="800" font-family="Arial, PingFang SC, sans-serif">GC 面板要能解释事故</text><text x="600" y="128" text-anchor="middle" fill="#94a3b8" font-size="22" font-family="Arial, PingFang SC, sans-serif">不是堆指标越多越好，而是能把问题分层</text><g transform="translate(70 170)"><rect width="330" height="180" rx="22" fill="#111827" stroke="#334155" stroke-width="2"/><text x="28" y="45" fill="#f8fafc" font-size="28" font-weight="800" font-family="Arial, PingFang SC, sans-serif">事故态势</text><text x="28" y="82" fill="#94a3b8" font-size="19" font-family="Arial, PingFang SC, sans-serif">working set / p99 / restart</text><path d="M30 135 C85 90 130 150 185 112 S270 90 300 130" fill="none" stroke="#38bdf8" stroke-width="4" stroke-linecap="round"/></g><g transform="translate(430 170)"><rect width="330" height="180" rx="22" fill="#111827" stroke="#334155" stroke-width="2"/><text x="28" y="45" fill="#f8fafc" font-size="28" font-weight="800" font-family="Arial, PingFang SC, sans-serif">Go GC</text><text x="28" y="82" fill="#94a3b8" font-size="19" font-family="Arial, PingFang SC, sans-serif">heap live / goal / CPU</text><path d="M30 135 C85 90 130 150 185 112 S270 90 300 130" fill="none" stroke="#38bdf8" stroke-width="4" stroke-linecap="round"/></g><g transform="translate(790 170)"><rect width="330" height="180" rx="22" fill="#111827" stroke="#334155" stroke-width="2"/><text x="28" y="45" fill="#f8fafc" font-size="28" font-weight="800" font-family="Arial, PingFang SC, sans-serif">内存差异</text><text x="28" y="82" fill="#94a3b8" font-size="19" font-family="Arial, PingFang SC, sans-serif">total - released / RSS</text><path d="M30 135 C85 90 130 150 185 112 S270 90 300 130" fill="none" stroke="#38bdf8" stroke-width="4" stroke-linecap="round"/></g><g transform="translate(250 420)"><rect width="3