<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="860" viewBox="0 0 1200 860"><rect width="1200" height="860" rx="28" fill="#0b1120"/><text x="600" y="70" text-anchor="middle" fill="#f8fafc" font-size="42" font-weight="800" font-family="Arial, PingFang SC, sans-serif">OOM 不是一层账</text><text x="600" y="118" text-anchor="middle" fill="#94a3b8" font-size="22" font-family="Arial, PingFang SC, sans-serif">heap、RSS、container memory 各自回答不同问题</text><g transform="translate(110 80)"><rect width="980" height="105" rx="22" fill="#111827" stroke="#1d4ed8" stroke-width="3"/><circle cx="55" cy="52" r="25" fill="#1d4ed8" opacity="0.9"/><text x="105" y="45" fill="#f8fafc" font-size="28" font-weight="800" font-family="Arial, PingFang SC, sans-serif">Go heap</text><text x="105" y="78" fill="#cbd5e1" font-size="21" font-family="Arial, PingFang SC, sans-serif">对象还活着，pprof 负责解释</text></g><g transform="translate(110 280)"><rect width="980" height="105" rx="22" fill="#111827" stroke="#0f766e" stroke-width="3"/><circle cx="55" cy="52" r="25" fill="#0f766e" opacity="0.9"/><text x="105" y="45" fill="#f8fafc" font-size="28" font-weight="800" font-family="Arial, PingFang SC, sans-serif">Go runtime</text><text x="105" y="78" fill="#cbd5e1" font-size="21" font-family="Arial, PingFang SC, sans-serif">span、metadata、stack、released</text></g><g transform="translate(110 480)"><rect width="980" height="105" rx="22" fill="#111827" stroke="#7c3aed" stroke-width="3"/><circle cx="55" cy="52" r="25" fill="#7c3aed" opacity="0.9"/><text x="105" y="45" fill="#f8fafc" font-size="28" font-weight="800" font-family="Arial, PingFang SC, sans-serif">进程 RSS</text><text x="105" y="78" fill="#cbd5e1" font-size="21" font-family="Arial, PingFang SC, sans-serif">cgo、mmap、文件映射也在账上</text></g><g transform="translate(110 680)"><rect width="980" height="105" rx="22" fill="#111827" stroke="#b91c1c" stroke-width="3"/><circle cx="55" cy="52" r="25" fill="#b91c1c" opacity="0.9"/><text x="105" y="45" fill="#f8fafc" font-size="28" font-weight="800" font-family="Arial, PingFang SC, sans-serif">容器 limit</text><text x="105" y="78" fill="#cbd5e1" font-size="21" font-family="Arial, PingFang SC, sans-serif">cgroup 硬边界，超过可能被杀</text></g><text x="600" y="820" text-anchor="middle" fill="#fca5a5" font-size="24" font-weight="700" font-family="Arial, PingFang SC, sans-serif">GOMEMLIMIT 管的是 Go runtime 软线，不是整个 RSS 的硬墙</text></svg>