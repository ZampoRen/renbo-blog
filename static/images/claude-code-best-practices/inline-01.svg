<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="600" y="88" text-anchor="middle" fill="#f8fafc" font-family="system-ui,-apple-system,sans-serif" font-size="42" font-weight="700">Claude Code 控制回路</text>
  <text x="600" y="128" text-anchor="middle" fill="#94a3b8" font-family="system-ui,-apple-system,sans-serif" font-size="20">计划、执行、验证、接管，而不是一路放飞</text>

  <g font-family="system-ui,-apple-system,sans-serif">
    <rect x="80" y="230" width="180" height="120" rx="18" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="170" y="278" text-anchor="middle" fill="#f59e0b" font-size="25" font-weight="700">规则</text>
    <text x="170" y="316" text-anchor="middle" fill="#cbd5e1" font-size="18">claude.md</text>

    <rect x="330" y="230" width="180" height="120" rx="18" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="420" y="278" text-anchor="middle" fill="#60a5fa" font-size="25" font-weight="700">计划</text>
    <text x="420" y="316" text-anchor="middle" fill="#cbd5e1" font-size="18">Plan + To-do</text>

    <rect x="580" y="230" width="180" height="120" rx="18" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="670" y="278" text-anchor="middle" fill="#22c55e" font-size="25" font-weight="700">验证</text>
    <text x="670" y="316" text-anchor="middle" fill="#cbd5e1" font-size="18">test / lint</text>

    <rect x="830" y="230" width="180" height="120" rx="18" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="920" y="278" text-anchor="middle" fill="#f87171" font-size="25" font-weight="700">接管</text>
    <text x="920" y="316" text-anchor="middle" fill="#cbd5e1" font-size="18">Esc / rollback</text>

    <path d="M260 290 L320 290" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M510 290 L570 290" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M760 290 L820 290" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

    <path d="M920 365 C920 500, 170 500, 170 365" fill="none" stroke="#475569" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrow)"/>

    <rect x="180" y="555" width="840" height="88" rx="18" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <text x="600" y="606" text-anchor="middle" fill="#f8fafc" font-size="28" font-weight="700">AI 负责加速，人负责方向</text>
  </g>
</svg>
