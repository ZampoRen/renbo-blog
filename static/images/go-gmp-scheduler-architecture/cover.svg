<svg xmlns="http://www.w3.org/2000/svg" width="900" height="383" viewBox="0 0 900 383">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#07111f"/><stop offset="100%" stop-color="#111827"/></linearGradient>
    <linearGradient id="pgrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="900" height="383" rx="0" fill="url(#bg)"/>
  <circle cx="120" cy="80" r="150" fill="#0ea5e9" opacity="0.08"/>
  <circle cx="760" cy="330" r="190" fill="#22c55e" opacity="0.06"/>
  <text x="58" y="78" font-family="PingFang SC, Helvetica, Arial" font-size="28" fill="#e5e7eb" font-weight="700">Go GMP 调度器</text>
  <text x="58" y="118" font-family="PingFang SC, Helvetica, Arial" font-size="18" fill="#94a3b8">真正难懂的不是 G 和 M，而是 P 为什么存在</text>
  <g transform="translate(70,165)">
    <rect x="0" y="0" width="150" height="88" rx="18" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="75" y="38" text-anchor="middle" font-family="PingFang SC" font-size="30" fill="#f8fafc" font-weight="700">G</text>
    <text x="75" y="64" text-anchor="middle" font-family="PingFang SC" font-size="16" fill="#94a3b8">要执行的任务</text>
  </g>
  <g transform="translate(300,165)">
    <rect x="0" y="0" width="150" height="88" rx="18" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="75" y="38" text-anchor="middle" font-family="PingFang SC" font-size="30" fill="#f8fafc" font-weight="700">M</text>
    <text x="75" y="64" text-anchor="middle" font-family="PingFang SC" font-size="16" fill="#94a3b8">真正干活的线程</text>
  </g>
  <g transform="translate(545,132)" filter="url(#glow)">
    <rect x="0" y="0" width="250" height="154" rx="24" fill="url(#pgrad)" opacity="0.96"/>
    <text x="125" y="50" text-anchor="middle" font-family="PingFang SC" font-size="38" fill="#03101f" font-weight="800">P</text>
    <text x="125" y="84" text-anchor="middle" font-family="PingFang SC" font-size="21" fill="#061424" font-weight="700">执行 Go 代码的许可证</text>
    <text x="125" y="116" text-anchor="middle" font-family="PingFang SC" font-size="15" fill="#082f49">runq · runnext · timer · mcache</text>
  </g>
  <path d="M225 209 C260 209 265 209 296 209" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M455 209 C495 209 505 209 540 209" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#64748b"/></marker></defs>
  <text x="58" y="328" font-family="PingFang SC" font-size="20" fill="#e2e8f0" font-weight="700">P 不是 CPU 核心，是 runtime 把任务、线程和调度资源拆开的关键。</text>
</svg>