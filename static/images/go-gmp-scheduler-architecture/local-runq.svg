<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#111827"/></linearGradient><marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#22d3ee"/></marker></defs>
<rect width="1200" height="760" fill="url(#bg)"/>
<text x="60" y="82" font-family="PingFang SC" font-size="34" fill="#f8fafc" font-weight="800">P 的本地队列：少抢全局锁，也不让全局队列饿死</text>
<text x="60" y="120" font-family="PingFang SC" font-size="18" fill="#94a3b8">runnext 是优先槽，本地 runq 是 256 长度环形队列；队列满了，半批转全局</text>
<rect x="90" y="185" width="455" height="310" rx="28" fill="#0f172a" stroke="#334155" stroke-width="2"/>
<text x="318" y="232" text-anchor="middle" font-family="PingFang SC" font-size="28" fill="#e2e8f0" font-weight="800">P0</text>
<rect x="155" y="260" width="325" height="62" rx="16" fill="#0c4a6e" stroke="#38bdf8" stroke-width="2"/>
<text x="318" y="299" text-anchor="middle" font-family="PingFang SC" font-size="22" fill="#e0f2fe" font-weight="700">runnext：优先运行槽</text>
<g transform="translate(128,370)"><text x="0" y="-22" font-family="PingFang SC" font-size="18" fill="#94a3b8">local runq[256]</text>
<g fill="#1e293b" stroke="#475569"><rect x="0" y="0" width="38" height="46" rx="8"/><rect x="48" y="0" width="38" height="46" rx="8"/><rect x="96" y="0" width="38" height="46" rx="8"/><rect x="144" y="0" width="38" height="46" rx="8"/><rect x="192" y="0" width="38" height="46" rx="8"/><rect x="240" y="0" width="38" height="46" rx="8"/><rect x="288" y="0" width="38" height="46" rx="8"/><rect x="336" y="0" width="38" height="46" rx="8"/></g><g font-family="PingFang SC" font-size="15" fill="#cbd5e1" text-anchor="middle"><text x="19" y="29">G</text><text x="67" y="29">G</text><text x="115" y="29">G</text><text x="163" y="29">G</text><text x="211" y="29">G</text><text x="259" y="29">G</text><text x="307" y="29">G</text><text x="355" y="29">G</text></g></g>
<rect x="655" y="185" width="455" height="310" rx="28" fill="#0f172a" stroke="#334155" stroke-width="2"/>
<text x="883" y="232" text-anchor="middle" font-family="PingFang SC" font-size="28" fill="#e2e8f0" font-weight="800">P1</text>
<rect x="720" y="260" width="325" height="62" rx="16" fill="#164e63" stroke="#22d3ee" stroke-width="2"/>
<text x="883" y="299" text-anchor="middle" font-family="PingFang SC" font-size="22" fill="#cffafe" font-weight="700">stealWork：偷一批可运行 G</text>
<g transform="translate(693,370)"><text x="0" y="-22" font-family="PingFang SC" font-size="18" fill="#94a3b8">local runq[256]</text><g fill="#1e293b" stroke="#475569"><rect x="0" y="0" width="38" height="46" rx="8"/><rect x="48" y="0" width="38" height="46" rx="8"/><rect x="96" y="0" width="38" height="46" rx="8"/><rect x="144" y="0" width="38" height="46" rx="8"/><rect x="192" y="0" width="38" height="46" rx="8"/><rect x="240" y="0" width="38" height="46" rx="8"/><rect x="288" y="0" width="38" height="46" rx="8"/><rect x="336" y="0" width="38" height="46" rx="8"/></g></g>
<rect x="355" y="570" width="490" height="75" rx="22" fill="#020617" stroke="#475569" stroke-width="2"/>
<text x="600" y="604" text-anchor="middle" font-family="PingFang SC" font-size="23" fill="#f8fafc" font-weight="800">global runq</text>
<text x="600" y="631" text-anchor="middle" font-family="PingFang SC" font-size="16" fill="#94a3b8">每 61 tick 检查一次，避免全局队列长期饥饿</text>
<g stroke="#22d3ee" stroke-width="3" fill="none" marker-end="url(#arr)"><path d="M545 360 C610 330 620 330 655 360"/><path d="M318 495 C360 545 420 570 500 570"/><path d="M760 570 C850 545 885 505 883 495"/></g>
<text x="600" y="522" text-anchor="middle" font-family="PingFang SC" font-size="18" fill="#bae6fd">本地优先，不等于只看本地；公平性要靠全局队列和 stealing 兜底。</text>
</svg>