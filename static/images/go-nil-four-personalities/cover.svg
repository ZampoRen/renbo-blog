<svg xmlns="http://www.w3.org/2000/svg" width="900" height="383" viewBox="0 0 900 383" role="img" aria-labelledby="title desc">
  <title id="title">Go nil 的 4 种分裂人格</title>
  <desc id="desc">深色技术风封面图，展示 nil 在 interface、slice、map、channel 下的不同行为。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#07111f"/>
    </linearGradient>
    <radialGradient id="glow" cx="42%" cy="48%" r="60%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.38"/>
      <stop offset="0.45" stop-color="#22c55e" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="900" height="383" fill="url(#bg)"/>
  <rect width="900" height="383" fill="url(#glow)"/>
  <g opacity="0.18" stroke="#94a3b8" stroke-width="1">
    <path d="M0 306 C140 260 242 334 380 286 S646 246 900 292" fill="none"/>
    <path d="M0 92 C172 132 260 50 414 84 S664 140 900 78" fill="none"/>
  </g>
  <g transform="translate(78 64)" filter="url(#softShadow)">
    <circle cx="138" cy="126" r="58" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
    <text x="138" y="139" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="42" font-weight="700" fill="#e0f2fe">nil</text>
    <g stroke="#38bdf8" stroke-width="2" opacity="0.85" fill="none">
      <path d="M194 104 L294 58"/>
      <path d="M202 126 L308 126"/>
      <path d="M194 148 L294 198"/>
      <path d="M138 184 L138 244"/>
    </g>
    <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="700">
      <rect x="306" y="28" width="146" height="58" rx="16" fill="#111827" stroke="#38bdf8"/>
      <text x="379" y="64" text-anchor="middle" fill="#e0f2fe">interface</text>
      <rect x="320" y="98" width="116" height="58" rx="16" fill="#111827" stroke="#22c55e"/>
      <text x="378" y="134" text-anchor="middle" fill="#dcfce7">slice</text>
      <rect x="306" y="170" width="116" height="58" rx="16" fill="#111827" stroke="#f97316"/>
      <text x="364" y="206" text-anchor="middle" fill="#ffedd5">map</text>
      <rect x="82" y="254" width="132" height="58" rx="16" fill="#111827" stroke="#a78bfa"/>
      <text x="148" y="290" text-anchor="middle" fill="#ede9fe">channel</text>
    </g>
  </g>
  <g transform="translate(548 82)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="42" font-weight="800" fill="#f8fafc">Go nil 的</text>
    <text x="0" y="56" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="52" font-weight="900" fill="#38bdf8">4 种分裂人格</text>
    <text x="2" y="108" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" fill="#cbd5e1">同一个 nil，不同类型下完全不同</text>
    <g transform="translate(0 154)" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" fill="#e5e7eb">
      <rect x="0" y="0" width="276" height="92" rx="18" fill="#020617" opacity="0.72" stroke="#334155"/>
      <text x="24" y="36">interface：看 type</text>
      <text x="24" y="66">map：能看，不能动</text>
    </g>
  </g>
</svg>
