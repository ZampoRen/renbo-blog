<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="800" height="500" fill="#0D1117"/>
  
  <!-- 标题 -->
  <text x="400" y="40" fill="#C9D1D9" font-family="system-ui" font-size="18" font-weight="600" text-anchor="middle">企业 CLI 四层骨架</text>
  
  <!-- 认证层 -->
  <rect x="200" y="70" width="400" height="80" rx="8" fill="#161B22" stroke="#30363D" stroke-width="2"/>
  <rect x="200" y="70" width="400" height="32" rx="8" fill="#1F6FEB" fill-opacity="0.2"/>
  <text x="400" y="92" fill="#58A6FF" font-family="system-ui" font-size="14" font-weight="600" text-anchor="middle">认证层（internal/auth/）</text>
  <text x="400" y="118" fill="#8B949E" font-family="monospace" font-size="12" text-anchor="middle">OAuth 登录 · Token 持久化 · Device ID</text>
  <text x="400" y="138" fill="#8B949E" font-family="monospace" font-size="11" text-anchor="middle">cmd/auth_login.go · internal/store/</text>
  
  <!-- 箭头 -->
  <line x1="400" y1="150" x2="400" y2="170" stroke="#30363D" stroke-width="2"/>
  <polygon points="400,170 394,158 406,158" fill="#30363D"/>
  
  <!-- 请求层 -->
  <rect x="200" y="170" width="400" height="80" rx="8" fill="#161B22" stroke="#30363D" stroke-width="2"/>
  <rect x="200" y="170" width="400" height="32" rx="8" fill="#238636" fill-opacity="0.2"/>
  <text x="400" y="192" fill="#7EE787" font-family="system-ui" font-size="14" font-weight="600" text-anchor="middle">请求层（internal/httpx/）</text>
  <text x="400" y="218" fill="#8B949E" font-family="monospace" font-size="12" text-anchor="middle">HTTP Client · Header 注入 · 401 Refresh</text>
  <text x="400" y="238" fill="#8B949E" font-family="monospace" font-size="11" text-anchor="middle">client.go · transport.go · 401 retry once</text>
  
  <!-- 箭头 -->
  <line x1="400" y1="250" x2="400" y2="270" stroke="#30363D" stroke-width="2"/>
  <polygon points="400,270 394,258 406,258" fill="#30363D"/>
  
  <!-- 命令层 -->
  <rect x="200" y="270" width="400" height="100" rx="8" fill="#161B22" stroke="#30363D" stroke-width="2"/>
  <rect x="200" y="270" width="400" height="32" rx="8" fill="#8957E5" fill-opacity="0.2"/>
  <text x="400" y="292" fill="#D2A8FF" font-family="system-ui" font-size="14" font-weight="600" text-anchor="middle">命令层（cmd/ + specs/）</text>
  <text x="400" y="318" fill="#8B949E" font-family="monospace" font-size="12" text-anchor="middle">核心命令代码化 · 业务命令 YAML 化</text>
  <text x="400" y="338" fill="#8B949E" font-family="monospace" font-size="11" text-anchor="middle">root.go · group.yaml · commands/*.yaml</text>
  <text x="400" y="358" fill="#8B949E" font-family="monospace" font-size="11" text-anchor="middle">runtime/loader.go · executor.go</text>
  
  <!-- 箭头 -->
  <line x1="400" y1="370" x2="400" y2="390" stroke="#30363D" stroke-width="2"/>
  <polygon points="400,390 394,378 406,378" fill="#30363D"/>
  
  <!-- 打包层 -->
  <rect x="200" y="390" width="400" height="70" rx="8" fill="#161B22" stroke="#30363D" stroke-width="2"/>
  <rect x="200" y="390" width="400" height="32" rx="8" fill="#D29922" fill-opacity="0.2"/>
  <text x="400" y="412" fill="#F0883E" font-family="system-ui" font-size="14" font-weight="600" text-anchor="middle">打包层（scripts/）</text>
  <text x="400" y="438" fill="#8B949E" font-family="monospace" font-size="12" text-anchor="middle">多环境构建 · 多平台矩阵 · OAuth 凭据注入</text>
  
  <!-- 右侧说明 -->
  <rect x="640" y="100" width="140" height="280" rx="4" fill="#0D1117" stroke="#30363D" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="710" y="125" fill="#C9D1D9" font-family="system-ui" font-size="12" font-weight="600" text-anchor="middle">设计原则</text>
  <text x="710" y="150" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="middle">稳定层先代码化</text>
  <text x="710" y="170" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="middle">业务层再规格化</text>
  <text x="710" y="200" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="middle">构建时固定环境</text>
  <text x="710" y="220" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="middle">运行时不切 profile</text>
  <text x="710" y="250" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="middle">401 refresh once</text>
  <text x="710" y="270" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="middle">Header 统一注入</text>
  <text x="710" y="300" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="middle">YAML 内嵌二进制</text>
</svg>
