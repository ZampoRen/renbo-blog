<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="800" height="450" fill="#0D1117"/>
  
  <!-- 标题 -->
  <text x="400" y="35" fill="#C9D1D9" font-family="system-ui" font-size="18" font-weight="600" text-anchor="middle">登录 + Token Refresh 流程</text>
  
  <!-- 登录流程（左半部分） -->
  <text x="250" y="70" fill="#58A6FF" font-family="system-ui" font-size="13" font-weight="600" text-anchor="middle">登录流程</text>
  
  <!-- 步骤 1 -->
  <rect x="120" y="85" width="260" height="50" rx="6" fill="#161B22" stroke="#58A6FF" stroke-width="1.5"/>
  <text x="250" y="108" fill="#C9D1D9" font-family="monospace" font-size="12" text-anchor="middle">1. cli auth login</text>
  <text x="250" y="125" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="middle">起本地回调服务 · 自动打开浏览器</text>
  
  <!-- 箭头 -->
  <line x1="250" y1="135" x2="250" y2="155" stroke="#30363D" stroke-width="1.5"/>
  <polygon points="250,155 244,143 256,143" fill="#30363D"/>
  
  <!-- 步骤 2 -->
  <rect x="120" y="155" width="260" height="50" rx="6" fill="#161B22" stroke="#30363D" stroke-width="1.5"/>
  <text x="250" y="178" fill="#C9D1D9" font-family="monospace" font-size="12" text-anchor="middle">2. OAuth 授权码回调</text>
  <text x="250" y="195" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="middle">校验 state · 换取 token</text>
  
  <!-- 箭头 -->
  <line x1="250" y1="205" x2="250" y2="225" stroke="#30363D" stroke-width="1.5"/>
  <polygon points="250,225 244,213 256,213" fill="#30363D"/>
  
  <!-- 步骤 3 -->
  <rect x="120" y="225" width="260" height="50" rx="6" fill="#161B22" stroke="#7EE787" stroke-width="1.5"/>
  <text x="250" y="248" fill="#C9D1D9" font-family="monospace" font-size="12" text-anchor="middle">3. Token 落盘</text>
  <text x="250" y="265" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="middle">~/.cli/profiles/&lt;profile&gt;.json</text>
  
  <!-- 业务请求流程（右半部分） -->
  <text x="550" y="70" fill="#7EE787" font-family="system-ui" font-size="13" font-weight="600" text-anchor="middle">业务请求 + 401 处理</text>
  
  <!-- 步骤 A -->
  <rect x="420" y="85" width="260" height="50" rx="6" fill="#161B22" stroke="#7EE787" stroke-width="1.5"/>
  <text x="550" y="108" fill="#C9D1D9" font-family="monospace" font-size="12" text-anchor="middle">A. 业务请求</text>
  <text x="550" y="125" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="middle">Header 注入 · 发送请求</text>
  
  <!-- 箭头 -->
  <line x1="550" y1="135" x2="550" y2="155" stroke="#30363D" stroke-width="1.5"/>
  <polygon points="550,155 544,143 556,143" fill="#30363D"/>
  
  <!-- 步骤 B -->
  <rect x="420" y="155" width="260" height="50" rx="6" fill="#161B22" stroke="#30363D" stroke-width="1.5"/>
  <text x="550" y="178" fill="#C9D1D9" font-family="monospace" font-size="12" text-anchor="middle">B. 收到 401？</text>
  <text x="550" y="195" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="middle">是 → 刷新 · 否 → 返回</text>
  
  <!-- 箭头 -->
  <line x1="550" y1="205" x2="550" y2="225" stroke="#30363D" stroke-width="1.5"/>
  <polygon points="550,225 544,213 556,213" fill="#30363D"/>
  
  <!-- 步骤 C -->
  <rect x="420" y="225" width="260" height="50" rx="6" fill="#161B22" stroke="#F0883E" stroke-width="1.5"/>
  <text x="550" y="248" fill="#C9D1D9" font-family="monospace" font-size="12" text-anchor="middle">C. Refresh Token</text>
  <text x="550" y="265" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="middle">只刷新一次 · 只重试一次</text>
  
  <!-- 箭头 -->
  <line x1="550" y1="275" x2="550" y2="295" stroke="#30363D" stroke-width="1.5"/>
  <polygon points="550,295 544,283 556,283" fill="#30363D"/>
  
  <!-- 步骤 D -->
  <rect x="420" y="295" width="260" height="50" rx="6" fill="#161B22" stroke="#30363D" stroke-width="1.5"/>
  <text x="550" y="318" fill="#C9D1D9" font-family="monospace" font-size="12" text-anchor="middle">D. 重试请求</text>
  <text x="550" y="335" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="middle">成功 → 返回 · 失败 → 401</text>
  
  <!-- 底部说明 -->
  <rect x="120" y="360" width="560" height="70" rx="6" fill="#161B22" stroke="#30363D" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="400" y="385" fill="#C9D1D9" font-family="system-ui" font-size="12" font-weight="600" text-anchor="middle">关键设计</text>
  <text x="400" y="405" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="middle">OAuth 链路不带 X-Device-Id · 业务链路带</text>
  <text x="400" y="420" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="middle">401 只 refresh once · 避免无限重试打挂认证服务</text>
</svg>
