<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780">
  <rect width="1400" height="780" fill="#f8fafc"/>
  <text x="70" y="90" font-family="PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="46" font-weight="800" fill="#0f172a">OOMKilled 排查：先拆三本账</text>
  <text x="72" y="135" font-family="PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="27" fill="#475569">同一个内存事故，Kubernetes、Go runtime、操作系统看到的账本不一样。</text>

  <g transform="translate(80 210)">
    <rect width="340" height="400" rx="30" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
    <circle cx="58" cy="58" r="30" fill="#2563eb"/>
    <text x="110" y="68" font-family="PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="33" font-weight="800" fill="#0f172a">Kubernetes</text>
    <text x="36" y="150" font-family="PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="24" fill="#475569">working set / limit</text>
    <rect x="42" y="210" width="220" height="28" rx="14" fill="#2563eb"/>
    <text x="55" y="265" font-family="Arial" font-size="20" fill="#64748b">limit</text>
    <rect x="42" y="268" width="170" height="28" rx="14" fill="#2563eb" opacity=".75"/>
    <text x="55" y="323" font-family="Arial" font-size="20" fill="#64748b">used</text>
    <rect x="42" y="326" width="260" height="28" rx="14" fill="#2563eb" opacity=".5"/>
    <text x="55" y="381" font-family="Arial" font-size="20" fill="#64748b">trend</text>
  </g>

  <g transform="translate(530 210)">
    <rect width="340" height="400" rx="30" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
    <circle cx="58" cy="58" r="30" fill="#16a34a"/>
    <text x="110" y="68" font-family="PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="33" font-weight="800" fill="#0f172a">Go runtime</text>
    <text x="36" y="150" font-family="PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="24" fill="#475569">heap live / managed</text>
    <rect x="42" y="210" width="150" height="28" rx="14" fill="#16a34a"/>
    <text x="55" y="265" font-family="Arial" font-size="20" fill="#64748b">HeapAlloc</text>
    <rect x="42" y="268" width="230" height="28" rx="14" fill="#16a34a" opacity=".75"/>
    <text x="55" y="323" font-family="Arial" font-size="20" fill="#64748b">Sys - HeapReleased</text>
    <rect x="42" y="326" width="190" height="28" rx="14" fill="#16a34a" opacity=".5"/>
    <text x="55" y="381" font-family="Arial" font-size="20" fill="#64748b">NextGC</text>
  </g>

  <g transform="translate(980 210)">
    <rect width="340" height="400" rx="30" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
    <circle cx="58" cy="58" r="30" fill="#dc2626"/>
    <text x="110" y="68" font-family="PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="33" font-weight="800" fill="#0f172a">OS / Native</text>
    <text x="36" y="150" font-family="PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="24" fill="#475569">RSS / cgo / mmap</text>
    <rect x="42" y="210" width="260" height="28" rx="14" fill="#dc2626"/>
    <text x="55" y="265" font-family="Arial" font-size="20" fill="#64748b">RSS</text>
    <rect x="42" y="268" width="120" height="28" rx="14" fill="#dc2626" opacity=".75"/>
    <text x="55" y="323" font-family="Arial" font-size="20" fill="#64748b">cgo</text>
    <rect x="42" y="326" width="210" height="28" rx="14" fill="#dc2626" opacity=".5"/>
    <text x="55" y="381" font-family="Arial" font-size="20" fill="#64748b">mmap / stack</text>
  </g>

  <rect x="190" y="660" width="1020" height="70" rx="24" fill="#0f172a"/>
  <text x="245" y="705" font-family="PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="29" fill="#f8fafc">heap profile 解释 Go 对象；RSS 解释进程账本；working set 解释容器边界。</text>
</svg>
