<svg width="900" height="600" viewBox="0 0 900 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="900" height="600" fill="#0D1117"/>
  
  <!-- 标题 -->
  <text x="450" y="35" fill="#C9D1D9" font-family="system-ui" font-size="18" font-weight="600" text-anchor="middle">架构对比：传统微服务 vs PostgreSQL 单一体</text>
  
  <!-- 左侧：传统微服务架构 -->
  <rect x="30" y="70" width="400" height="245" rx="8" fill="#161B22" stroke="#FF7B72" stroke-width="2"/>
  <text x="230" y="100" fill="#FF7B72" font-family="system-ui" font-size="16" font-weight="600" text-anchor="middle">❌ 传统微服务架构</text>
  
  <!-- 应用层 -->
  <rect x="60" y="120" width="340" height="35" rx="6" fill="#1F6FEB" fill-opacity="0.3" stroke="#58A6FF" stroke-width="1.5"/>
  <text x="230" y="143" fill="#58A6FF" font-family="system-ui" font-size="11" font-weight="600" text-anchor="middle">应用层</text>
  
  <!-- 箭头向下 -->
  <line x1="230" y1="155" x2="230" y2="175" stroke="#30363D" stroke-width="2"/>
  <polygon points="230,175 224,163 236,163" fill="#30363D"/>
  
  <!-- 服务层（分散） -->
  <rect x="60" y="180" width="96" height="35" rx="4" fill="#FF7B72" fill-opacity="0.2" stroke="#FF7B72" stroke-width="1"/>
  <text x="108" y="202" fill="#FF7B72" font-family="monospace" font-size="9" text-anchor="middle">Redis</text>
  
  <rect x="170" y="180" width="96" height="35" rx="4" fill="#FF7B72" fill-opacity="0.2" stroke="#FF7B72" stroke-width="1"/>
  <text x="218" y="202" fill="#FF7B72" font-family="monospace" font-size="9" text-anchor="middle">Kafka</text>
  
  <rect x="280" y="180" width="80" height="35" rx="4" fill="#FF7B72" fill-opacity="0.2" stroke="#FF7B72" stroke-width="1"/>
  <text x="320" y="202" fill="#FF7B72" font-family="monospace" font-size="8" text-anchor="middle">Elasticsearch</text>
  
  <!-- 第二排服务 -->
  <rect x="60" y="223" width="96" height="35" rx="4" fill="#FF7B72" fill-opacity="0.2" stroke="#FF7B72" stroke-width="1"/>
  <text x="108" y="245" fill="#FF7B72" font-family="monospace" font-size="9" text-anchor="middle">Pinecone</text>
  
  <rect x="170" y="223" width="96" height="35" rx="4" fill="#FF7B72" fill-opacity="0.2" stroke="#FF7B72" stroke-width="1"/>
  <text x="218" y="245" fill="#FF7B72" font-family="monospace" font-size="9" text-anchor="middle">PostGIS</text>
  
  <rect x="280" y="223" width="80" height="35" rx="4" fill="#FF7B72" fill-opacity="0.2" stroke="#FF7B72" stroke-width="1"/>
  <text x="320" y="245" fill="#FF7B72" font-family="monospace" font-size="8" text-anchor="middle">PostgreSQL</text>
  
  <!-- 问题标签 -->
  <rect x="60" y="276" width="340" height="22" rx="4" fill="#FF7B72" fill-opacity="0.1" stroke="#FF7B72" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="230" y="291" fill="#FFA198" font-family="monospace" font-size="8" text-anchor="middle">6 个服务 · 运维复杂 · 数据不一致 · 成本高</text>
  
  <!-- 右侧：PostgreSQL 单一体架构 -->
  <rect x="470" y="70" width="400" height="245" rx="8" fill="#161B22" stroke="#7EE787" stroke-width="2"/>
  <text x="670" y="100" fill="#7EE787" font-family="system-ui" font-size="16" font-weight="600" text-anchor="middle">✅ PostgreSQL 单一体</text>
  
  <!-- 应用层 -->
  <rect x="500" y="120" width="340" height="35" rx="6" fill="#1F6FEB" fill-opacity="0.3" stroke="#58A6FF" stroke-width="1.5"/>
  <text x="670" y="143" fill="#58A6FF" font-family="system-ui" font-size="11" font-weight="600" text-anchor="middle">应用层</text>
  
  <!-- 箭头向下 -->
  <line x1="670" y1="155" x2="670" y2="175" stroke="#30363D" stroke-width="2"/>
  <polygon points="670,175 664,163 676,163" fill="#30363D"/>
  
  <!-- PostgreSQL 单一体 -->
  <rect x="500" y="176" width="340" height="92" rx="8" fill="#238636" fill-opacity="0.2" stroke="#7EE787" stroke-width="2"/>
  
  <!-- 内部功能 -->
  <rect x="520" y="200" width="72" height="24" rx="4" fill="#7EE787" fill-opacity="0.2" stroke="#7EE787" stroke-width="1"/>
  <text x="556" y="217" fill="#7EE787" font-family="monospace" font-size="8" text-anchor="middle">JSONB</text>
  
  <rect x="604" y="200" width="72" height="24" rx="4" fill="#7EE787" fill-opacity="0.2" stroke="#7EE787" stroke-width="1"/>
  <text x="640" y="217" fill="#7EE787" font-family="monospace" font-size="8" text-anchor="middle">Vector</text>
  
  <rect x="688" y="200" width="88" height="24" rx="4" fill="#7EE787" fill-opacity="0.2" stroke="#7EE787" stroke-width="1"/>
  <text x="732" y="217" fill="#7EE787" font-family="monospace" font-size="8" text-anchor="middle">Full-text</text>
  
  <rect x="520" y="230" width="72" height="24" rx="4" fill="#7EE787" fill-opacity="0.2" stroke="#7EE787" stroke-width="1"/>
  <text x="556" y="247" fill="#7EE787" font-family="monospace" font-size="8" text-anchor="middle">PostGIS</text>
  
  <rect x="604" y="230" width="172" height="24" rx="4" fill="#7EE787" fill-opacity="0.2" stroke="#7EE787" stroke-width="1"/>
  <text x="690" y="247" fill="#7EE787" font-family="monospace" font-size="8" text-anchor="middle">SKIP LOCKED / LISTEN</text>
  
  <!-- 优势标签 -->
  <rect x="500" y="282" width="340" height="20" rx="4" fill="#7EE787" fill-opacity="0.1" stroke="#7EE787" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="670" y="296" fill="#7EE787" font-family="monospace" font-size="8" text-anchor="middle">1 个服务 · ACID · 运维简单 · 成本低</text>
  
  <!-- 底部对比表格 -->
  <rect x="30" y="338" width="840" height="245" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.5"/>
  <text x="450" y="378" fill="#C9D1D9" font-family="system-ui" font-size="14" font-weight="600" text-anchor="middle">📊 详细对比</text>
  
  <!-- 表格头部 -->
  <rect x="50" y="393" width="800" height="30" rx="4" fill="#1F2937" stroke="#30363D" stroke-width="1"/>
  <text x="150" y="413" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="middle">维度</text>
  <text x="340" y="413" fill="#FF7B72" font-family="monospace" font-size="10" text-anchor="middle">传统微服务</text>
  <text x="650" y="413" fill="#7EE787" font-family="monospace" font-size="10" text-anchor="middle">PostgreSQL 单一体</text>
  
  <!-- 表格行 1 -->
  <rect x="50" y="423" width="800" height="28" rx="2" fill="#0D1117" stroke="#30363D" stroke-width="0.5"/>
  <text x="150" y="441" fill="#C9D1D9" font-family="monospace" font-size="10" text-anchor="middle">服务数量</text>
  <text x="340" y="441" fill="#FF7B72" font-family="monospace" font-size="10" text-anchor="middle">6 个</text>
  <text x="650" y="441" fill="#7EE787" font-family="monospace" font-size="10" text-anchor="middle">1 个</text>
  
  <!-- 表格行 2 -->
  <rect x="50" y="451" width="800" height="28" rx="2" fill="#161B22" stroke="#30363D" stroke-width="0.5"/>
  <text x="150" y="469" fill="#C9D1D9" font-family="monospace" font-size="10" text-anchor="middle">运维复杂度</text>
  <text x="340" y="469" fill="#FF7B72" font-family="monospace" font-size="10" text-anchor="middle">高</text>
  <text x="650" y="469" fill="#7EE787" font-family="monospace" font-size="10" text-anchor="middle">低</text>
  
  <!-- 表格行 3 -->
  <rect x="50" y="479" width="800" height="28" rx="2" fill="#0D1117" stroke="#30363D" stroke-width="0.5"/>
  <text x="150" y="497" fill="#C9D1D9" font-family="monospace" font-size="10" text-anchor="middle">数据一致性</text>
  <text x="340" y="497" fill="#FF7B72" font-family="monospace" font-size="10" text-anchor="middle">最终一致</text>
  <text x="650" y="497" fill="#7EE787" font-family="monospace" font-size="10" text-anchor="middle">ACID 事务</text>
  
  <!-- 表格行 4 -->
  <rect x="50" y="507" width="800" height="28" rx="2" fill="#161B22" stroke="#30363D" stroke-width="0.5"/>
  <text x="150" y="525" fill="#C9D1D9" font-family="monospace" font-size="10" text-anchor="middle">成本</text>
  <text x="340" y="525" fill="#FF7B72" font-family="monospace" font-size="10" text-anchor="middle">多家 SaaS 订阅</text>
  <text x="650" y="525" fill="#7EE787" font-family="monospace" font-size="10" text-anchor="middle">单一数据库</text>
  
  <!-- 表格行 5 -->
  <rect x="50" y="535" width="800" height="28" rx="2" fill="#0D1117" stroke="#30363D" stroke-width="0.5"/>
  <text x="150" y="553" fill="#C9D1D9" font-family="monospace" font-size="10" text-anchor="middle">故障排查</text>
  <text x="340" y="553" fill="#FF7B72" font-family="monospace" font-size="10" text-anchor="middle">指数级复杂</text>
  <text x="650" y="553" fill="#7EE787" font-family="monospace" font-size="10" text-anchor="middle">简单</text>
</svg>
