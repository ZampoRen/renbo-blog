<svg width="800" height="550" viewBox="0 0 800 550" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="800" height="550" fill="#0D1117"/>
  
  <!-- 标题 -->
  <text x="400" y="35" fill="#C9D1D9" font-family="system-ui" font-size="18" font-weight="600" text-anchor="middle">架构对比：传统微服务 vs PostgreSQL 单一体</text>
  
  <!-- 左侧：传统微服务架构 -->
  <rect x="40" y="70" width="340" height="210" rx="8" fill="#161B22" stroke="#FF7B72" stroke-width="2"/>
  <text x="210" y="100" fill="#FF7B72" font-family="system-ui" font-size="16" font-weight="600" text-anchor="middle">❌ 传统微服务架构</text>
  
  <!-- 应用层 -->
  <rect x="65" y="120" width="290" height="35" rx="6" fill="#1F6FEB" fill-opacity="0.3" stroke="#58A6FF" stroke-width="1.5"/>
  <text x="210" y="143" fill="#58A6FF" font-family="system-ui" font-size="11" font-weight="600" text-anchor="middle">应用层</text>
  
  <!-- 箭头向下 -->
  <line x1="210" y1="155" x2="210" y2="175" stroke="#30363D" stroke-width="2"/>
  <polygon points="210,175 204,163 216,163" fill="#30363D"/>
  
  <!-- 服务层（分散） -->
  <rect x="65" y="180" width="80" height="35" rx="4" fill="#FF7B72" fill-opacity="0.2" stroke="#FF7B72" stroke-width="1"/>
  <text x="105" y="202" fill="#FF7B72" font-family="monospace" font-size="9" text-anchor="middle">Redis</text>
  
  <rect x="155" y="180" width="80" height="35" rx="4" fill="#FF7B72" fill-opacity="0.2" stroke="#FF7B72" stroke-width="1"/>
  <text x="195" y="202" fill="#FF7B72" font-family="monospace" font-size="9" text-anchor="middle">Kafka</text>
  
  <rect x="245" y="180" width="85" height="35" rx="4" fill="#FF7B72" fill-opacity="0.2" stroke="#FF7B72" stroke-width="1"/>
  <text x="287" y="202" fill="#FF7B72" font-family="monospace" font-size="9" text-anchor="middle">Elasticsearch</text>
  
  <!-- 第二排服务 -->
  <rect x="65" y="223" width="80" height="35" rx="4" fill="#FF7B72" fill-opacity="0.2" stroke="#FF7B72" stroke-width="1"/>
  <text x="105" y="245" fill="#FF7B72" font-family="monospace" font-size="9" text-anchor="middle">Pinecone</text>
  
  <rect x="155" y="223" width="80" height="35" rx="4" fill="#FF7B72" fill-opacity="0.2" stroke="#FF7B72" stroke-width="1"/>
  <text x="195" y="245" fill="#FF7B72" font-family="monospace" font-size="9" text-anchor="middle">PostGIS</text>
  
  <rect x="245" y="223" width="85" height="35" rx="4" fill="#FF7B72" fill-opacity="0.2" stroke="#FF7B72" stroke-width="1"/>
  <text x="287" y="245" fill="#FF7B72" font-family="monospace" font-size="9" text-anchor="middle">PostgreSQL</text>
  
  <!-- 问题标签 -->
  <rect x="65" y="266" width="270" height="22" rx="4" fill="#FF7B72" fill-opacity="0.1" stroke="#FF7B72" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="200" y="281" fill="#FFA198" font-family="monospace" font-size="8" text-anchor="middle">6 个服务 · 运维复杂 · 数据不一致 · 成本高</text>
  
  <!-- 右侧：PostgreSQL 单一体架构 -->
  <rect x="420" y="70" width="340" height="210" rx="8" fill="#161B22" stroke="#7EE787" stroke-width="2"/>
  <text x="590" y="100" fill="#7EE787" font-family="system-ui" font-size="16" font-weight="600" text-anchor="middle">✅ PostgreSQL 单一体</text>
  
  <!-- 应用层 -->
  <rect x="445" y="120" width="290" height="35" rx="6" fill="#1F6FEB" fill-opacity="0.3" stroke="#58A6FF" stroke-width="1.5"/>
  <text x="590" y="143" fill="#58A6FF" font-family="system-ui" font-size="11" font-weight="600" text-anchor="middle">应用层</text>
  
  <!-- 箭头向下 -->
  <line x1="590" y1="155" x2="590" y2="175" stroke="#30363D" stroke-width="2"/>
  <polygon points="590,175 584,163 596,163" fill="#30363D"/>
  
  <!-- PostgreSQL 单一体 -->
  <rect x="445" y="180" width="290" height="115" rx="8" fill="#238636" fill-opacity="0.2" stroke="#7EE787" stroke-width="2"/>
  <text x="590" y="208" fill="#7EE787" font-family="system-ui" font-size="13" font-weight="600" text-anchor="middle">PostgreSQL</text>
  
  <!-- 内部功能 -->
  <rect x="465" y="223" width="65" height="28" rx="4" fill="#7EE787" fill-opacity="0.2" stroke="#7EE787" stroke-width="1"/>
  <text x="497" y="242" fill="#7EE787" font-family="monospace" font-size="8" text-anchor="middle">JSONB</text>
  
  <rect x="540" y="223" width="65" height="28" rx="4" fill="#7EE787" fill-opacity="0.2" stroke="#7EE787" stroke-width="1"/>
  <text x="572" y="242" fill="#7EE787" font-family="monospace" font-size="8" text-anchor="middle">Vector</text>
  
  <rect x="615" y="223" width="75" height="28" rx="4" fill="#7EE787" fill-opacity="0.2" stroke="#7EE787" stroke-width="1"/>
  <text x="652" y="242" fill="#7EE787" font-family="monospace" font-size="8" text-anchor="middle">Full-text</text>
  
  <rect x="465" y="258" width="65" height="28" rx="4" fill="#7EE787" fill-opacity="0.2" stroke="#7EE787" stroke-width="1"/>
  <text x="497" y="277" fill="#7EE787" font-family="monospace" font-size="8" text-anchor="middle">PostGIS</text>
  
  <rect x="540" y="258" width="150" height="28" rx="4" fill="#7EE787" fill-opacity="0.2" stroke="#7EE787" stroke-width="1"/>
  <text x="615" y="277" fill="#7EE787" font-family="monospace" font-size="8" text-anchor="middle">SKIP LOCKED / LISTEN</text>
  
  <!-- 优势标签 -->
  <rect x="445" y="293" width="290" height="20" rx="4" fill="#7EE787" fill-opacity="0.1" stroke="#7EE787" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="590" y="307" fill="#7EE787" font-family="monospace" font-size="8" text-anchor="middle">1 个服务 · ACID · 运维简单 · 成本低</text>
  
  <!-- 底部对比表格 -->
  <rect x="40" y="310" width="720" height="230" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.5"/>
  <text x="400" y="350" fill="#C9D1D9" font-family="system-ui" font-size="14" font-weight="600" text-anchor="middle">📊 详细对比</text>
  
  <!-- 表格头部 -->
  <rect x="60" y="365" width="680" height="30" rx="4" fill="#1F2937" stroke="#30363D" stroke-width="1"/>
  <text x="150" y="385" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="middle">维度</text>
  <text x="300" y="385" fill="#FF7B72" font-family="monospace" font-size="10" text-anchor="middle">传统微服务</text>
  <text x="550" y="385" fill="#7EE787" font-family="monospace" font-size="10" text-anchor="middle">PostgreSQL 单一体</text>
  
  <!-- 表格行 1 -->
  <rect x="60" y="395" width="680" height="28" rx="2" fill="#0D1117" stroke="#30363D" stroke-width="0.5"/>
  <text x="150" y="413" fill="#C9D1D9" font-family="monospace" font-size="10" text-anchor="middle">服务数量</text>
  <text x="300" y="413" fill="#FF7B72" font-family="monospace" font-size="10" text-anchor="middle">6 个</text>
  <text x="550" y="413" fill="#7EE787" font-family="monospace" font-size="10" text-anchor="middle">1 个</text>
  
  <!-- 表格行 2 -->
  <rect x="60" y="423" width="680" height="28" rx="2" fill="#161B22" stroke="#30363D" stroke-width="0.5"/>
  <text x="150" y="441" fill="#C9D1D9" font-family="monospace" font-size="10" text-anchor="middle">运维复杂度</text>
  <text x="300" y="441" fill="#FF7B72" font-family="monospace" font-size="10" text-anchor="middle">高</text>
  <text x="550" y="441" fill="#7EE787" font-family="monospace" font-size="10" text-anchor="middle">低</text>
  
  <!-- 表格行 3 -->
  <rect x="60" y="451" width="680" height="28" rx="2" fill="#0D1117" stroke="#30363D" stroke-width="0.5"/>
  <text x="150" y="469" fill="#C9D1D9" font-family="monospace" font-size="10" text-anchor="middle">数据一致性</text>
  <text x="300" y="469" fill="#FF7B72" font-family="monospace" font-size="10" text-anchor="middle">最终一致</text>
  <text x="550" y="469" fill="#7EE787" font-family="monospace" font-size="10" text-anchor="middle">ACID 事务</text>
  
  <!-- 表格行 4 -->
  <rect x="60" y="479" width="680" height="28" rx="2" fill="#161B22" stroke="#30363D" stroke-width="0.5"/>
  <text x="150" y="497" fill="#C9D1D9" font-family="monospace" font-size="10" text-anchor="middle">成本</text>
  <text x="300" y="497" fill="#FF7B72" font-family="monospace" font-size="10" text-anchor="middle">多家 SaaS 订阅</text>
  <text x="550" y="497" fill="#7EE787" font-family="monospace" font-size="10" text-anchor="middle">单一数据库</text>
  
  <!-- 表格行 5 -->
  <rect x="60" y="507" width="680" height="28" rx="2" fill="#0D1117" stroke="#30363D" stroke-width="0.5"/>
  <text x="150" y="525" fill="#C9D1D9" font-family="monospace" font-size="10" text-anchor="middle">故障排查</text>
  <text x="300" y="525" fill="#FF7B72" font-family="monospace" font-size="10" text-anchor="middle">指数级复杂</text>
  <text x="550" y="525" fill="#7EE787" font-family="monospace" font-size="10" text-anchor="middle">简单</text>
</svg>
