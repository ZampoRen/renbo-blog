<svg width="900" height="383" viewBox="0 0 900 383" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="900" height="383" fill="#0D1117"/>
  
  <!-- 网格线 -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1F2937" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="900" height="383" fill="url(#grid)"/>
  
  <!-- 左侧：传统架构（混乱） -->
  <rect x="50" y="80" width="350" height="220" rx="8" fill="#161B22" stroke="#FF7B72" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="225" y="115" fill="#FF7B72" font-family="system-ui" font-size="16" font-weight="600" text-anchor="middle">❌ 传统架构（6 个服务）</text>
  
  <!-- 传统架构服务块 -->
  <rect x="70" y="135" width="100" height="35" rx="4" fill="#FF7B72" fill-opacity="0.2" stroke="#FF7B72" stroke-width="1"/>
  <text x="120" y="157" fill="#FF7B72" font-family="monospace" font-size="11" text-anchor="middle">Redis</text>
  
  <rect x="180" y="135" width="100" height="35" rx="4" fill="#FF7B72" fill-opacity="0.2" stroke="#FF7B72" stroke-width="1"/>
  <text x="230" y="157" fill="#FF7B72" font-family="monospace" font-size="11" text-anchor="middle">Kafka</text>
  
  <rect x="290" y="135" width="90" height="35" rx="4" fill="#FF7B72" fill-opacity="0.2" stroke="#FF7B72" stroke-width="1"/>
  <text x="335" y="157" fill="#FF7B72" font-family="monospace" font-size="11" text-anchor="middle">Elasticsearch</text>
  
  <rect x="70" y="185" width="100" height="35" rx="4" fill="#FF7B72" fill-opacity="0.2" stroke="#FF7B72" stroke-width="1"/>
  <text x="120" y="207" fill="#FF7B72" font-family="monospace" font-size="11" text-anchor="middle">Pinecone</text>
  
  <rect x="180" y="185" width="100" height="35" rx="4" fill="#FF7B72" fill-opacity="0.2" stroke="#FF7B72" stroke-width="1"/>
  <text x="230" y="207" fill="#FF7B72" font-family="monospace" font-size="11" text-anchor="middle">PostGIS</text>
  
  <rect x="290" y="185" width="90" height="35" rx="4" fill="#FF7B72" fill-opacity="0.2" stroke="#FF7B72" stroke-width="1"/>
  <text x="335" y="207" fill="#FF7B72" font-family="monospace" font-size="11" text-anchor="middle">PostgreSQL</text>
  
  <text x="225" y="250" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="middle">运维复杂 · 数据不一致 · 成本高</text>
  
  <!-- VS 标志 -->
  <circle cx="450" cy="190" r="35" fill="#1F2937" stroke="#30363D" stroke-width="2"/>
  <text x="450" y="200" fill="#C9D1D9" font-family="system-ui" font-size="20" font-weight="700" text-anchor="middle">VS</text>
  
  <!-- 右侧：PostgreSQL 单一体（简洁） -->
  <rect x="500" y="80" width="350" height="220" rx="8" fill="#161B22" stroke="#7EE787" stroke-width="2"/>
  <text x="675" y="115" fill="#7EE787" font-family="system-ui" font-size="16" font-weight="600" text-anchor="middle">✅ PostgreSQL 单一体</text>
  
  <!-- PostgreSQL 单一体 -->
  <rect x="520" y="135" width="310" height="145" rx="8" fill="#238636" fill-opacity="0.2" stroke="#7EE787" stroke-width="2"/>
  <text x="675" y="165" fill="#7EE787" font-family="system-ui" font-size="14" font-weight="600" text-anchor="middle">PostgreSQL</text>
  
  <!-- 内部功能模块 -->
  <rect x="540" y="180" width="80" height="35" rx="4" fill="#7EE787" fill-opacity="0.2" stroke="#7EE787" stroke-width="1"/>
  <text x="580" y="202" fill="#7EE787" font-family="monospace" font-size="10" text-anchor="middle">JSONB</text>
  
  <rect x="630" y="180" width="80" height="35" rx="4" fill="#7EE787" fill-opacity="0.2" stroke="#7EE787" stroke-width="1"/>
  <text x="670" y="202" fill="#7EE787" font-family="monospace" font-size="10" text-anchor="middle">Vector</text>
  
  <rect x="720" y="180" width="90" height="35" rx="4" fill="#7EE787" fill-opacity="0.2" stroke="#7EE787" stroke-width="1"/>
  <text x="765" y="202" fill="#7EE787" font-family="monospace" font-size="10" text-anchor="middle">Full-text</text>
  
  <rect x="540" y="225" width="80" height="35" rx="4" fill="#7EE787" fill-opacity="0.2" stroke="#7EE787" stroke-width="1"/>
  <text x="580" y="247" fill="#7EE787" font-family="monospace" font-size="10" text-anchor="middle">PostGIS</text>
  
  <rect x="630" y="225" width="180" height="35" rx="4" fill="#7EE787" fill-opacity="0.2" stroke="#7EE787" stroke-width="1"/>
  <text x="720" y="247" fill="#7EE787" font-family="monospace" font-size="10" text-anchor="middle">SKIP LOCKED / LISTEN-NOTIFY</text>
  
  <text x="675" y="290" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="middle">1 个服务 · ACID · 成本低</text>
  
  <!-- 底部标题 -->
  <text x="450" y="340" fill="#C9D1D9" font-family="system-ui" font-size="18" font-weight="700" text-anchor="middle">我用 PostgreSQL 替换了整个技术栈</text>
  <text x="450" y="365" fill="#8B949E" font-family="monospace" font-size="12" text-anchor="middle">省了 6 个微服务</text>
</svg>
