<svg width="900" height="383" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="restGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a90a4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357a8c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rpcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c73e54;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="383" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="450" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">REST vs RPC</text>
  <text x="450" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#a0a0a0" text-anchor="middle">内部 API 设计的选择困境</text>
  
  <!-- Left side: REST -->
  <rect x="80" y="140" width="320" height="180" rx="8" fill="url(#restGrad)" opacity="0.15"/>
  <rect x="80" y="140" width="4" height="180" rx="2" fill="#4a90a4"/>
  <text x="95" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#4a90a4">REST</text>
  <text x="95" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#c0c0c0">• 资源模型</text>
  <text x="95" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#c0c0c0">• GET / POST / PUT / DELETE</text>
  <text x="95" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#c0c0c0">• 适合公共 API</text>
  <text x="95" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#c0c0c0">• 人类可直接调试</text>
  <text x="95" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#808080" font-style="italic">/invoices/{id}/approval</text>
  
  <!-- Right side: RPC -->
  <rect x="500" y="140" width="320" height="180" rx="8" fill="url(#rpcGrad)" opacity="0.15"/>
  <rect x="500" y="140" width="4" height="180" rx="2" fill="#e94560"/>
  <text x="515" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#e94560">RPC</text>
  <text x="515" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#c0c0c0">• 动作模型</text>
  <text x="515" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#c0c0c0">• approveInvoice()</text>
  <text x="515" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#c0c0c0">• 适合内部服务</text>
  <text x="515" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#c0c0c0">• 强契约 + 代码生成</text>
  <text x="515" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#808080" font-style="italic">approveInvoice(id)</text>
  
  <!-- VS circle in middle -->
  <circle cx="450" cy="230" r="28" fill="#2a2a3e"/>
  <text x="450" y="237" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">VS</text>
  
  <!-- Bottom tagline -->
  <text x="450" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#606060" text-anchor="middle">不是谁取代谁，而是各归其位</text>
</svg>
