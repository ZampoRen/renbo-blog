<svg xmlns="http://www.w3.org/2000/svg" width="900" height="383" viewBox="0 0 900 383">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="900" height="383" rx="0" fill="url(#bg)"/>
  <circle cx="180" cy="190" r="96" fill="#0f172a" stroke="#334155" stroke-width="3"/>
  <circle cx="180" cy="190" r="70" fill="none" stroke="#1e293b" stroke-width="14"/>
  <path d="M180 120 A70 70 0 0 1 247 190" fill="none" stroke="#38bdf8" stroke-width="14" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="180" y1="190" x2="180" y2="145" stroke="#e5e7eb" stroke-width="7" stroke-linecap="round"/>
  <line x1="180" y1="190" x2="222" y2="190" stroke="#e5e7eb" stroke-width="7" stroke-linecap="round"/>
  <text x="180" y="314" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22" fill="#94a3b8">timeout</text>
  <rect x="315" y="124" width="230" height="78" rx="22" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="430" y="173" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="28" font-weight="700" fill="#94a3b8">不是超时按钮</text>
  <path d="M560 163 L617 163" stroke="#64748b" stroke-width="3" stroke-dasharray="8 8"/>
  <rect x="640" y="112" width="190" height="102" rx="26" fill="url(#accent)"/>
  <text x="735" y="154" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="32" font-weight="800" fill="#052e16">release</text>
  <text x="735" y="187" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22" font-weight="700" fill="#052e16">资源释放</text>
  <text x="315" y="276" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="42" font-weight="800" fill="#f8fafc">WithTimeout 的 cancel</text>
  <text x="318" y="318" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24" fill="#cbd5e1">不是触发超时，而是提前收尾</text>
</svg>
