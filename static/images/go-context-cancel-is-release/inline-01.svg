<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0b1020"/><stop offset="100%" stop-color="#111827"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#172033"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="600" y="105" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="44" font-weight="800" fill="#f8fafc">Context timeout 三条线排查法</text>
  <text x="600" y="154" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24" fill="#94a3b8">不要猜“context 失灵”，沿着路径把生命周期对上</text>

  <rect x="85" y="235" width="300" height="285" rx="28" fill="url(#card)" stroke="#334155" stroke-width="2"/>
  <circle cx="235" cy="295" r="36" fill="#38bdf8" opacity="0.18"/><text x="235" y="307" text-anchor="middle" font-family="Menlo,Monaco,monospace" font-size="32" font-weight="800" fill="#38bdf8">1</text>
  <text x="235" y="365" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="32" font-weight="800" fill="#e2e8f0">创建路径</text>
  <text x="235" y="413" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22" fill="#cbd5e1">谁创建 timeout？</text>
  <text x="235" y="450" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22" fill="#cbd5e1">parent 是谁？</text>
  <text x="235" y="487" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22" fill="#cbd5e1">生命周期多长？</text>

  <rect x="450" y="235" width="300" height="285" rx="28" fill="url(#card)" stroke="#334155" stroke-width="2"/>
  <circle cx="600" cy="295" r="36" fill="#22c55e" opacity="0.18"/><text x="600" y="307" text-anchor="middle" font-family="Menlo,Monaco,monospace" font-size="32" font-weight="800" fill="#22c55e">2</text>
  <text x="600" y="365" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="32" font-weight="800" fill="#e2e8f0">取消路径</text>
  <text x="600" y="413" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22" fill="#cbd5e1">cancel 在哪调？</text>
  <text x="600" y="450" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22" fill="#cbd5e1">错误路径覆盖吗？</text>
  <text x="600" y="487" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22" fill="#cbd5e1">timer 是否停止？</text>

  <rect x="815" y="235" width="300" height="285" rx="28" fill="url(#card)" stroke="#334155" stroke-width="2"/>
  <circle cx="965" cy="295" r="36" fill="#f97316" opacity="0.18"/><text x="965" y="307" text-anchor="middle" font-family="Menlo,Monaco,monospace" font-size="32" font-weight="800" fill="#fb923c">3</text>
  <text x="965" y="365" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="32" font-weight="800" fill="#e2e8f0">响应路径</text>
  <text x="965" y="413" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22" fill="#cbd5e1">Done 听了吗？</text>
  <text x="965" y="450" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22" fill="#cbd5e1">阻塞点能退吗？</text>
  <text x="965" y="487" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22" fill="#cbd5e1">退出路径走得到吗？</text>

  <path d="M392 378 L438 378" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
  <path d="M757 378 L803 378" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
  <rect x="205" y="600" width="790" height="72" rx="20" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="600" y="646" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="28" font-weight="800" fill="#f8fafc">少看任何一条，结论都容易偏</text>
</svg>
