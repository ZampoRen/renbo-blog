<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#f6f8fc"/>
  <text x="70" y="90" fill="#192337" font-size="46" font-weight="700" font-family="PingFang SC,Arial">Claude Code 的正确节奏</text>
  <g font-family="PingFang SC,Arial">
    <rect x="90" y="170" width="290" height="235" rx="28" fill="#fff" stroke="#cdd6e6" stroke-width="2"/>
    <circle cx="146" cy="231" r="26" fill="#1e4c91"/><text x="139" y="240" fill="white" font-size="25">1</text>
    <text x="120" y="318" fill="#12203a" font-size="38" font-weight="700">Plan</text><text x="120" y="372" fill="#5c697d" font-size="23">先读代码，先写计划</text>
    <line x1="400" y1="285" x2="470" y2="285" stroke="#375082" stroke-width="5"/><polygon points="470,285 450,273 450,297" fill="#375082"/>
    <rect x="480" y="170" width="290" height="235" rx="28" fill="#fff" stroke="#cdd6e6" stroke-width="2"/>
    <circle cx="536" cy="231" r="26" fill="#1e4c91"/><text x="529" y="240" fill="white" font-size="25">2</text>
    <text x="510" y="318" fill="#12203a" font-size="38" font-weight="700">Execute</text><text x="510" y="372" fill="#5c697d" font-size="23">按小步骤改，每步验证</text>
    <line x1="790" y1="285" x2="860" y2="285" stroke="#375082" stroke-width="5"/><polygon points="860,285 840,273 840,297" fill="#375082"/>
    <rect x="870" y="170" width="290" height="235" rx="28" fill="#fff" stroke="#cdd6e6" stroke-width="2"/>
    <circle cx="926" cy="231" r="26" fill="#1e4c91"/><text x="919" y="240" fill="white" font-size="25">3</text>
    <text x="900" y="318" fill="#12203a" font-size="38" font-weight="700">Review</text><text x="900" y="372" fill="#5c697d" font-size="23">跑测试，看 diff，找反例</text>
    <text x="70" y="535" fill="#273754" font-size="32" font-weight="700">关键不是“让它多干”，而是让每一步都有回声。</text>
  </g>
</svg>