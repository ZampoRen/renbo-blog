<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" rx="32" fill="#111827"/>

  <text x="78" y="114" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="36" font-weight="700">服务端里，其实是两种 socket</text>
  <text x="78" y="152" fill="#94A3B8" font-family="Arial, sans-serif" font-size="21">listen 等连接，accept 后的新 socket 才通信</text>

  <rect x="94" y="262" width="252" height="150" rx="24" fill="#1F2937" stroke="#4B5563"/>
  <rect x="474" y="262" width="252" height="150" rx="24" fill="#152A45" stroke="#60A5FA"/>
  <rect x="860" y="152" width="246" height="118" rx="22" fill="#1F2937" stroke="#4B5563"/>
  <rect x="860" y="322" width="246" height="118" rx="22" fill="#1F2937" stroke="#4B5563"/>
  <rect x="860" y="492" width="246" height="118" rx="22" fill="#1F2937" stroke="#4B5563"/>

  <path d="M346 337H474" stroke="#64748B" stroke-width="8" stroke-linecap="round"/>
  <path d="M726 337H860" stroke="#60A5FA" stroke-width="8" stroke-linecap="round"/>
  <path d="M726 337C790 337 792 211 860 211" stroke="#60A5FA" stroke-width="8" stroke-linecap="round"/>
  <path d="M726 337C790 337 792 551 860 551" stroke="#60A5FA" stroke-width="8" stroke-linecap="round"/>

  <text x="220" y="323" text-anchor="middle" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="30" font-weight="700">listen</text>
  <text x="220" y="358" text-anchor="middle" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="21">监听 socket</text>
  <text x="220" y="390" text-anchor="middle" fill="#94A3B8" font-family="Arial, sans-serif" font-size="19">负责等新连接</text>

  <text x="600" y="323" text-anchor="middle" fill="#DBEAFE" font-family="Arial, sans-serif" font-size="30" font-weight="700">accept</text>
  <text x="600" y="358" text-anchor="middle" fill="#BFDBFE" font-family="Arial, sans-serif" font-size="21">分出新 socket</text>
  <text x="600" y="390" text-anchor="middle" fill="#93C5FD" font-family="Arial, sans-serif" font-size="19">监听端继续留在门口</text>

  <text x="983" y="201" text-anchor="middle" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="27" font-weight="700">client A</text>
  <text x="983" y="233" text-anchor="middle" fill="#94A3B8" font-family="Arial, sans-serif" font-size="18">读写</text>
  <text x="983" y="371" text-anchor="middle" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="27" font-weight="700">client B</text>
  <text x="983" y="403" text-anchor="middle" fill="#94A3B8" font-family="Arial, sans-serif" font-size="18">读写</text>
  <text x="983" y="541" text-anchor="middle" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="27" font-weight="700">client C</text>
  <text x="983" y="573" text-anchor="middle" fill="#94A3B8" font-family="Arial, sans-serif" font-size="18">读写</text>

  <rect x="94" y="650" width="1012" height="56" rx="16" fill="#161F2C" stroke="#2E3A4A"/>
  <text x="124" y="686" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="24">真正通信的，不是监听 socket，而是 accept 之后的新 socket。</text>
</svg>