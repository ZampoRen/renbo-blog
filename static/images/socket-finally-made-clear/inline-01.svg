<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" rx="32" fill="#0F172A"/>

  <text x="78" y="114" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="36" font-weight="700">socket 是通信入口，不是协议</text>
  <text x="78" y="152" fill="#94A3B8" font-family="Arial, sans-serif" font-size="21">应用通过它进入 TCP、UDP、UDS</text>

  <rect x="92" y="232" width="236" height="124" rx="22" fill="#1E293B" stroke="#334155"/>
  <rect x="410" y="232" width="236" height="124" rx="22" fill="#152A45" stroke="#60A5FA"/>
  <rect x="726" y="162" width="380" height="112" rx="22" fill="#162032" stroke="#334155"/>
  <rect x="726" y="324" width="380" height="112" rx="22" fill="#162032" stroke="#334155"/>
  <rect x="726" y="486" width="380" height="112" rx="22" fill="#162032" stroke="#334155"/>

  <path d="M328 294H410" stroke="#64748B" stroke-width="6" stroke-linecap="round"/>
  <path d="M646 294H726" stroke="#60A5FA" stroke-width="6" stroke-linecap="round"/>
  <path d="M646 294C694 294 688 218 726 218" stroke="#60A5FA" stroke-width="6" stroke-linecap="round"/>
  <path d="M646 294C694 294 688 542 726 542" stroke="#60A5FA" stroke-width="6" stroke-linecap="round"/>

  <text x="210" y="282" text-anchor="middle" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="30" font-weight="700">应用</text>
  <text x="210" y="318" text-anchor="middle" fill="#94A3B8" font-family="Arial, sans-serif" font-size="20">浏览器 / 服务 / 客户端</text>

  <text x="528" y="282" text-anchor="middle" fill="#DBEAFE" font-family="Arial, sans-serif" font-size="31" font-weight="700">socket</text>
  <text x="528" y="318" text-anchor="middle" fill="#BFDBFE" font-family="Arial, sans-serif" font-size="20">统一通信入口</text>

  <text x="760" y="210" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="28" font-weight="700">TCP socket</text>
  <text x="760" y="244" fill="#94A3B8" font-family="Arial, sans-serif" font-size="19">可靠、按序</text>

  <text x="760" y="372" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="28" font-weight="700">UDP socket</text>
  <text x="760" y="406" fill="#94A3B8" font-family="Arial, sans-serif" font-size="19">更轻、更快</text>

  <text x="760" y="534" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="28" font-weight="700">Unix Domain Socket</text>
  <text x="760" y="568" fill="#94A3B8" font-family="Arial, sans-serif" font-size="19">本机进程通信</text>

  <rect x="92" y="650" width="1014" height="56" rx="16" fill="#121D2E" stroke="#2B3B52"/>
  <text x="122" y="686" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="24">一旦把 socket 讲明白，后面的术语就不再是散的。</text>
</svg>