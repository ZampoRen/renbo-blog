<svg xmlns="http://www.w3.org/2000/svg" width="900" height="383" viewBox="0 0 900 383" role="img" aria-labelledby="title desc">
  <title id="title">Kafka 避开磁盘最慢的用法</title>
  <desc id="desc">深色技术风封面图，展示随机小写的慢路与 Kafka append、page cache、sendfile 的快路对比。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="glow" cx="32%" cy="44%" r="60%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.35"/>
      <stop offset="0.48" stop-color="#22c55e" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.34"/>
    </filter>
  </defs>
  <rect width="900" height="383" fill="url(#bg)"/>
  <rect width="900" height="383" fill="url(#glow)"/>
  <g opacity="0.16" stroke="#94a3b8" stroke-width="1" fill="none">
    <path d="M0 315 C140 265 240 332 380 292 S650 245 900 300"/>
    <path d="M0 86 C150 128 270 42 425 80 S660 142 900 72"/>
  </g>
  <g transform="translate(56 72)" filter="url(#shadow)">
    <rect x="0" y="16" width="318" height="82" rx="22" fill="#020617" stroke="#475569"/>
    <text x="28" y="50" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="19" fill="#cbd5e1">慢路</text>
    <text x="28" y="78" font-family="Menlo,Consolas,monospace" font-size="18" fill="#fca5a5">random · small · copy again</text>
    <path d="M30 138 C78 106 116 174 168 140 S246 104 292 146" stroke="#f97316" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.9"/>
    <circle cx="32" cy="138" r="7" fill="#f97316"/>
    <circle cx="292" cy="146" r="7" fill="#f97316"/>
    <rect x="0" y="184" width="318" height="82" rx="22" fill="#031b1e" stroke="#22c55e"/>
    <text x="28" y="218" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="19" fill="#bbf7d0">快路</text>
    <text x="28" y="246" font-family="Menlo,Consolas,monospace" font-size="18" fill="#a7f3d0">append → cache → sendfile</text>
    <path d="M28 294 H292" stroke="#38bdf8" stroke-width="5" fill="none" stroke-linecap="round" marker-end="url(#arrow)"/>
  </g>
  <g transform="translate(468 78)">
    <text x="0" y="0" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="38" font-weight="800" fill="#f8fafc">Kafka 敢写磁盘</text>
    <text x="0" y="58" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="44" font-weight="900" fill="#38bdf8">因为没走慢路</text>
    <text x="2" y="106" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" fill="#cbd5e1">高吞吐不是神技，是数据路径设计</text>
    <g transform="translate(0 154)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" fill="#e5e7eb">
      <rect x="0" y="0" width="330" height="96" rx="20" fill="#020617" opacity="0.74" stroke="#334155"/>
      <text x="24" y="38">顺序追加，而不是随机写</text>
      <text x="24" y="68">少跨用户态，少重复搬运</text>
    </g>
  </g>
</svg>
