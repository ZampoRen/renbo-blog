<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Kafka 消费路径：普通 read/write 与 sendfile 对比</title>
  <desc id="desc">对比数据从 page cache 到网络发送的普通路径和 sendfile 快路径。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#fb923c"/>
    </marker>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="600" y="92" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="42" font-weight="850" fill="#f8fafc">一条消息少走了哪几步？</text>
  <text x="600" y="132" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22" fill="#cbd5e1">普通路径让应用层当搬运工，sendfile 把搬运留在内核路径里</text>

  <g transform="translate(70 195)">
    <rect width="500" height="360" rx="28" fill="#020617" stroke="#475569"/>
    <text x="250" y="52" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="28" font-weight="800" fill="#fed7aa">普通 read/write</text>
    <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" font-weight="700">
      <rect x="58" y="92" width="160" height="58" rx="16" fill="#111827" stroke="#38bdf8"/>
      <text x="138" y="128" text-anchor="middle" fill="#e0f2fe">page cache</text>
      <rect x="284" y="92" width="160" height="58" rx="16" fill="#111827" stroke="#f97316"/>
      <text x="364" y="128" text-anchor="middle" fill="#ffedd5">app buffer</text>
      <rect x="58" y="224" width="160" height="58" rx="16" fill="#111827" stroke="#f97316"/>
      <text x="138" y="260" text-anchor="middle" fill="#ffedd5">socket buffer</text>
      <rect x="284" y="224" width="160" height="58" rx="16" fill="#111827" stroke="#22c55e"/>
      <text x="364" y="260" text-anchor="middle" fill="#dcfce7">NIC</text>
    </g>
    <g stroke="#fb923c" stroke-width="4" fill="none" marker-end="url(#arrowOrange)">
      <path d="M220 121 H276"/>
      <path d="M364 154 C364 190 190 188 150 220"/>
      <path d="M220 253 H276"/>
    </g>
    <text x="250" y="324" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="19" fill="#cbd5e1">多次跨边界，CPU 和内存带宽都要付账</text>
  </g>

  <g transform="translate(630 195)">
    <rect width="500" height="360" rx="28" fill="#021b22" stroke="#2563eb"/>
    <text x="250" y="52" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="28" font-weight="800" fill="#bae6fd">sendfile 快路径</text>
    <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" font-weight="700">
      <rect x="64" y="142" width="170" height="66" rx="18" fill="#0f172a" stroke="#38bdf8"/>
      <text x="149" y="182" text-anchor="middle" fill="#e0f2fe">page cache</text>
      <rect x="272" y="142" width="170" height="66" rx="18" fill="#0f172a" stroke="#22c55e"/>
      <text x="357" y="182" text-anchor="middle" fill="#dcfce7">socket / NIC</text>
    </g>
    <path d="M238 175 H266" stroke="#38bdf8" stroke-width="5" fill="none" marker-end="url(#arrowBlue)"/>
    <text x="250" y="260" text-anchor="middle" font-family="Menlo,Consolas,monospace" font-size="22" fill="#93c5fd">sendfile(out_fd, in_fd, ...)</text>
    <text x="250" y="324" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="19" fill="#cbd5e1">不是没有拷贝，是少让应用层中转</text>
  </g>

  <rect x="220" y="625" width="760" height="64" rx="22" fill="#020617" stroke="#334155"/>
  <text x="600" y="666" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22" font-weight="750" fill="#f8fafc">Kafka 的优势，是日志格式、page cache 和网络发送路径刚好咬在一起</text>
</svg>
