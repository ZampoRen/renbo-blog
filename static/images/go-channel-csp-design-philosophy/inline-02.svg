<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#08111e"/><stop offset="1" stop-color="#17223a"/></linearGradient></defs>
<rect width="1200" height="760" fill="url(#bg)"/>
<text x="600" y="80" text-anchor="middle" fill="#fff" font-size="40" font-family="PingFang SC, Arial" font-weight="800">channel 还是 mutex，先问问题长什么样</text>
<g font-family="PingFang SC, Arial">
  <rect x="80" y="150" width="490" height="430" rx="26" fill="#0c2138" stroke="#56d6ff" stroke-width="2"/>
  <text x="325" y="210" text-anchor="middle" fill="#56d6ff" font-size="34" font-weight="800">channel</text>
  <text x="325" y="252" text-anchor="middle" fill="#fff" font-size="24">表达流动和关系</text>
  <text x="140" y="315" fill="#d9eef8" font-size="24">• 任务分发 / worker pool</text>
  <text x="140" y="365" fill="#d9eef8" font-size="24">• 结果回流 / 异步通知</text>
  <text x="140" y="415" fill="#d9eef8" font-size="24">• 取消、信号、背压</text>
  <text x="140" y="465" fill="#d9eef8" font-size="24">• 所有权 / 访问权交接</text>
  <rect x="630" y="150" width="490" height="430" rx="26" fill="#0c2138" stroke="#7cf2b4" stroke-width="2"/>
  <text x="875" y="210" text-anchor="middle" fill="#7cf2b4" font-size="34" font-weight="800">mutex</text>
  <text x="875" y="252" text-anchor="middle" fill="#fff" font-size="24">保护状态和边界</text>
  <text x="690" y="315" fill="#d9eef8" font-size="24">• cache / map / 计数器</text>
  <text x="690" y="365" fill="#d9eef8" font-size="24">• 短临界区</text>
  <text x="690" y="415" fill="#d9eef8" font-size="24">• 结构体不变量</text>
  <text x="690" y="465" fill="#d9eef8" font-size="24">• 读多写少状态</text>
  <rect x="170" y="630" width="860" height="68" rx="20" fill="#102b49" stroke="#2e5e82"/>
  <text x="600" y="674" text-anchor="middle" fill="#fff" font-size="28" font-weight="800">传东西，用 channel；护东西，用 mutex</text>
</g>
</svg>