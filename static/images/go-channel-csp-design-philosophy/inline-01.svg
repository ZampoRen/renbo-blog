<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#08111e"/><stop offset="1" stop-color="#122642"/></linearGradient></defs>
<rect width="1200" height="760" fill="url(#bg)"/>
<text x="600" y="86" text-anchor="middle" fill="#ffffff" font-size="40" font-family="PingFang SC, Arial" font-weight="800">CSP 在 Go 里怎么落地</text>
<text x="600" y="128" text-anchor="middle" fill="#a9c4d8" font-size="22" font-family="PingFang SC, Arial">独立执行的 goroutine，通过 channel 交接任务、结果和信号</text>
<g font-family="PingFang SC, Arial">
  <rect x="80" y="260" width="220" height="120" rx="20" fill="#0c2138" stroke="#56d6ff" stroke-width="2"/>
  <text x="190" y="316" text-anchor="middle" fill="#fff" font-size="28" font-weight="700">生产者</text>
  <text x="190" y="352" text-anchor="middle" fill="#a9c4d8" font-size="19">产生任务 / 数据</text>
  <rect x="490" y="260" width="220" height="120" rx="20" fill="#0c2138" stroke="#7cf2b4" stroke-width="2"/>
  <text x="600" y="316" text-anchor="middle" fill="#fff" font-size="28" font-weight="700">channel</text>
  <text x="600" y="352" text-anchor="middle" fill="#a9c4d8" font-size="19">通信 + 同步</text>
  <rect x="900" y="260" width="220" height="120" rx="20" fill="#0c2138" stroke="#56d6ff" stroke-width="2"/>
  <text x="1010" y="316" text-anchor="middle" fill="#fff" font-size="28" font-weight="700">消费者</text>
  <text x="1010" y="352" text-anchor="middle" fill="#a9c4d8" font-size="19">处理结果 / 继续流动</text>
  <path d="M310 320 H470" stroke="#7cf2b4" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M720 320 H880" stroke="#7cf2b4" stroke-width="4"/>
  <rect x="160" y="500" width="880" height="90" rx="22" fill="#102b49" stroke="#2e5e82"/>
  <text x="600" y="548" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="700">重点不是“跑得更快”，而是结构更清楚</text>
  <text x="600" y="582" text-anchor="middle" fill="#a9c4d8" font-size="20">谁生产、谁消费、谁等待、谁关闭，都写在通信关系里</text>
</g>
</svg>