<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="virt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937"/>
      <stop offset="100%" style="stop-color:#374151"/>
    </linearGradient>
    <linearGradient id="phys" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="500" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" fill="#e5e7eb" font-weight="600">页表映射：虚拟地址 → 物理地址</text>
  
  <!-- Virtual Address Space -->
  <rect x="50" y="70" width="200" height="350" rx="8" fill="url(#virt)" stroke="#4b5563" stroke-width="2"/>
  <text x="150" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#ffffff" font-weight="600">虚拟地址空间</text>
  
  <!-- Virtual Pages -->
  <rect x="70" y="120" width="160" height="50" rx="4" fill="#4b5563" opacity="0.8"/>
  <text x="150" y="150" text-anchor="middle" font-family="monospace" font-size="12" fill="#ffffff">Page 0</text>
  <text x="150" y="165" text-anchor="middle" font-family="monospace" font-size="10" fill="#9ca3af">0x0000-0x0FFF</text>
  
  <rect x="70" y="180" width="160" height="50" rx="4" fill="#4b5563" opacity="0.8"/>
  <text x="150" y="210" text-anchor="middle" font-family="monospace" font-size="12" fill="#ffffff">Page 1</text>
  <text x="150" y="225" text-anchor="middle" font-family="monospace" font-size="10" fill="#9ca3af">0x1000-0x1FFF</text>
  
  <rect x="70" y="240" width="160" height="50" rx="4" fill="#6b7280" opacity="0.8"/>
  <text x="150" y="270" text-anchor="middle" font-family="monospace" font-size="12" fill="#ffffff">Page 2</text>
  <text x="150" y="285" text-anchor="middle" font-family="monospace" font-size="10" fill="#9ca3af">0x2000-0x2FFF</text>
  
  <rect x="70" y="300" width="160" height="50" rx="4" fill="#4b5563" opacity="0.8"/>
  <text x="150" y="330" text-anchor="middle" font-family="monospace" font-size="12" fill="#ffffff">Page 3</text>
  <text x="150" y="345" text-anchor="middle" font-family="monospace" font-size="10" fill="#9ca3af">0x3000-0x3FFF</text>
  
  <!-- Page Table -->
  <rect x="300" y="150" width="180" height="200" rx="8" fill="#374151" stroke="#6b7280" stroke-width="2"/>
  <text x="390" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#ffffff" font-weight="600">页表</text>
  
  <!-- Page Table Entries -->
  <rect x="320" y="200" width="140" height="30" rx="3" fill="#4b5563"/>
  <text x="390" y="220" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">Page 0 → Frame 5</text>
  
  <rect x="320" y="240" width="140" height="30" rx="3" fill="#4b5563"/>
  <text x="390" y="260" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">Page 1 → Frame 2</text>
  
  <rect x="320" y="280" width="140" height="30" rx="3" fill="#6b7280"/>
  <text x="390" y="300" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">Page 2 → Disk</text>
  
  <rect x="320" y="320" width="140" height="30" rx="3" fill="#4b5563"/>
  <text x="390" y="340" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">Page 3 → Frame 8</text>
  
  <!-- Physical Memory -->
  <rect x="550" y="70" width="200" height="350" rx="8" fill="url(#phys)" stroke="#3b82f6" stroke-width="2"/>
  <text x="650" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#ffffff" font-weight="600">物理内存 (RAM)</text>
  
  <!-- Physical Frames -->
  <rect x="570" y="120" width="160" height="50" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="650" y="150" text-anchor="middle" font-family="monospace" font-size="12" fill="#ffffff">Frame 0</text>
  
  <rect x="570" y="180" width="160" height="50" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="650" y="210" text-anchor="middle" font-family="monospace" font-size="12" fill="#ffffff">Frame 1</text>
  
  <rect x="570" y="240" width="160" height="50" rx="4" fill="#60a5fa" opacity="0.9"/>
  <text x="650" y="270" text-anchor="middle" font-family="monospace" font-size="12" fill="#ffffff">Frame 2 ← Page 1</text>
  
  <rect x="570" y="300" width="160" height="50" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="650" y="330" text-anchor="middle" font-family="monospace" font-size="12" fill="#ffffff">Frame 3</text>
  
  <rect x="570" y="360" width="160" height="50" rx="4" fill="#60a5fa" opacity="0.9"/>
  <text x="650" y="390" text-anchor="middle" font-family="monospace" font-size="12" fill="#ffffff">Frame 5 ← Page 0</text>
  
  <!-- Mapping arrows -->
  <path d="M 250 145 L 290 145" stroke="#6b7280" stroke-width="2" stroke-dasharray="4" fill="none"/>
  <path d="M 250 205 L 290 245" stroke="#6b7280" stroke-width="2" stroke-dasharray="4" fill="none"/>
  <path d="M 250 265 L 290 285" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4" fill="none"/>
  <path d="M 250 325 L 290 325" stroke="#6b7280" stroke-width="2" stroke-dasharray="4" fill="none"/>
  
  <!-- Disk indicator for Page 2 -->
  <rect x="550" y="440" width="200" height="40" rx="6" fill="#7c3aed" opacity="0.8"/>
  <text x="650" y="465" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">磁盘交换空间 ← Page 2</text>
</svg>
