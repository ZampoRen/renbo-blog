<svg xmlns="http://www.w3.org/2000/svg" width="900" height="383" viewBox="0 0 900 383" role="img" aria-labelledby="title desc">
  <title id="title">Go 架构极简主义</title>
  <desc id="desc">对比过度分层和可定位的 Go 项目结构</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="58%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#052e36"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="900" height="383" fill="url(#bg)"/>
  <circle cx="128" cy="88" r="90" fill="#22d3ee" opacity="0.08"/>
  <circle cx="760" cy="300" r="130" fill="#34d399" opacity="0.08"/>

  <g transform="translate(54 72)">
    <text x="0" y="0" fill="#67e8f9" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="16" letter-spacing="2">GO ARCHITECTURE</text>
    <text x="0" y="46" fill="#f8fafc" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="35" font-weight="700">加一个字段</text>
    <text x="0" y="92" fill="#f8fafc" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="35" font-weight="700">为什么要改 8 个文件？</text>
    <text x="0" y="138" fill="#cbd5e1" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="20">架构不是目录模板</text>
    <text x="0" y="170" fill="#cbd5e1" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="20">是 30 秒找到修改点</text>
  </g>

  <g transform="translate(502 62)">
    <rect x="0" y="0" width="322" height="250" rx="24" fill="#0b1220" opacity="0.74" stroke="#334155"/>
    <text x="32" y="42" fill="#f8fafc" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700">两种项目气味</text>

    <g transform="translate(30 70)">
      <rect x="0" y="0" width="116" height="34" rx="10" fill="#1e293b" stroke="#64748b"/>
      <text x="58" y="23" text-anchor="middle" fill="#cbd5e1" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="14">handler</text>
      <rect x="0" y="46" width="116" height="34" rx="10" fill="#1e293b" stroke="#64748b"/>
      <text x="58" y="69" text-anchor="middle" fill="#cbd5e1" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="14">usecase</text>
      <rect x="0" y="92" width="116" height="34" rx="10" fill="#1e293b" stroke="#64748b"/>
      <text x="58" y="115" text-anchor="middle" fill="#cbd5e1" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="14">mapper</text>
      <rect x="0" y="138" width="116" height="34" rx="10" fill="#1e293b" stroke="#64748b"/>
      <text x="58" y="161" text-anchor="middle" fill="#cbd5e1" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="14">repository</text>
      <path d="M58 35 V45 M58 81 V91 M58 127 V137" stroke="#64748b" stroke-width="2" stroke-dasharray="4 5"/>
      <text x="58" y="202" text-anchor="middle" fill="#fca5a5" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="15">到处跳</text>
    </g>

    <g transform="translate(182 70)" filter="url(#glow)">
      <rect x="0" y="0" width="106" height="172" rx="18" fill="#064e3b" stroke="#34d399"/>
      <text x="53" y="38" text-anchor="middle" fill="#d1fae5" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="700">order</text>
      <text x="53" y="72" text-anchor="middle" fill="#a7f3d0" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="13">入口</text>
      <text x="53" y="102" text-anchor="middle" fill="#a7f3d0" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="13">规则</text>
      <text x="53" y="132" text-anchor="middle" fill="#a7f3d0" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="13">存储</text>
      <text x="53" y="202" text-anchor="middle" fill="#86efac" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="15">找得到</text>
    </g>
  </g>

  <text x="54" y="340" fill="#94a3b8" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="16">少一点目录宗教，多一点修改点可见性</text>
</svg>
