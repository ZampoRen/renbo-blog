<svg xmlns="http://www.w3.org/2000/svg" width="900" height="383" viewBox="0 0 900 383" role="img" aria-label="pprof 数据拿到后用三条线排查 goroutine 泄漏">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#102a43"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="900" height="383" fill="url(#bg)"/>
  <circle cx="130" cy="80" r="120" fill="#38bdf8" opacity="0.08"/>
  <circle cx="760" cy="310" r="160" fill="#22c55e" opacity="0.07"/>

  <g transform="translate(70 86)" filter="url(#shadow)">
    <rect x="0" y="0" width="245" height="175" rx="26" fill="#0d1b2d" stroke="#2b4b68" stroke-width="2"/>
    <text x="30" y="55" fill="#7dd3fc" font-size="24" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif">pprof</text>
    <text x="30" y="98" fill="#e6f1ff" font-size="28" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif">找到等待点</text>
    <text x="30" y="135" fill="#9fb3c8" font-size="19" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif">chan receive / select / IO wait</text>
  </g>

  <path d="M340 174 C405 120, 470 120, 535 174" fill="none" stroke="#5d7690" stroke-width="4" stroke-linecap="round"/>
  <path d="M522 160 L540 174 L519 184" fill="none" stroke="#5d7690" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(555 68)" filter="url(#shadow)">
    <rect x="0" y="0" width="275" height="220" rx="28" fill="#0d1b2d" stroke="#2b4b68" stroke-width="2"/>
    <text x="32" y="56" fill="#e6f1ff" font-size="30" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif">三条线</text>
    <text x="34" y="105" fill="#b9c7d7" font-size="22" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif">创建：谁放出来</text>
    <text x="34" y="145" fill="#b9c7d7" font-size="22" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif">取消：谁发信号</text>
    <text x="34" y="185" fill="#b9c7d7" font-size="22" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif">响应：谁真退出</text>
  </g>

  <text x="70" y="335" fill="#e6f1ff" font-size="34" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif">别停在 profile 里，把泄漏钉回代码里</text>
</svg>
