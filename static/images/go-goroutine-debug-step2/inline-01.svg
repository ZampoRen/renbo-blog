<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="context goroutine 泄漏三条线排查法">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#102235"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1">
      <stop offset="0" stop-color="#10243a"/>
      <stop offset="1" stop-color="#0d1b2d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <circle cx="1040" cy="120" r="150" fill="#1d9bf0" opacity="0.08"/>
  <circle cx="160" cy="640" r="190" fill="#22c55e" opacity="0.07"/>
  <text x="80" y="105" fill="#e6f1ff" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif" font-size="42" font-weight="700">拿到 pprof 以后，看三条线</text>
  <text x="82" y="150" fill="#9fb3c8" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif" font-size="24">等待点只是现场，真正的责任要回到代码里找</text>

  <g filter="url(#shadow)">
    <rect x="90" y="245" width="280" height="250" rx="28" fill="url(#card)" stroke="#2b4b68" stroke-width="2"/>
    <circle cx="142" cy="305" r="28" fill="#38bdf8" opacity="0.18"/>
    <text x="132" y="315" fill="#7dd3fc" font-size="30" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif">1</text>
    <text x="90" y="365" text-anchor="middle" fill="#e6f1ff" font-size="0"/>
    <text x="230" y="320" text-anchor="middle" fill="#e6f1ff" font-size="32" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif">创建路径</text>
    <text x="230" y="380" text-anchor="middle" fill="#b9c7d7" font-size="22" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif">谁创建了 goroutine？</text>
    <text x="230" y="420" text-anchor="middle" fill="#b9c7d7" font-size="22" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif">生命周期属于谁？</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="460" y="245" width="280" height="250" rx="28" fill="url(#card)" stroke="#2b4b68" stroke-width="2"/>
    <circle cx="512" cy="305" r="28" fill="#f59e0b" opacity="0.18"/>
    <text x="502" y="315" fill="#fbbf24" font-size="30" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif">2</text>
    <text x="600" y="320" text-anchor="middle" fill="#e6f1ff" font-size="32" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif">取消路径</text>
    <text x="600" y="380" text-anchor="middle" fill="#b9c7d7" font-size="22" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif">cancel 有没有发出？</text>
    <text x="600" y="420" text-anchor="middle" fill="#b9c7d7" font-size="22" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif">是否覆盖所有出口？</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="830" y="245" width="280" height="250" rx="28" fill="url(#card)" stroke="#2b4b68" stroke-width="2"/>
    <circle cx="882" cy="305" r="28" fill="#22c55e" opacity="0.18"/>
    <text x="872" y="315" fill="#86efac" font-size="30" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif">3</text>
    <text x="970" y="320" text-anchor="middle" fill="#e6f1ff" font-size="32" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif">响应路径</text>
    <text x="970" y="380" text-anchor="middle" fill="#b9c7d7" font-size="22" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif">阻塞点有没有听 Done？</text>
    <text x="970" y="420" text-anchor="middle" fill="#b9c7d7" font-size="22" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif">听到以后是否 return？</text>
  </g>

  <path d="M385 370 L435 370" stroke="#5d7690" stroke-width="4" stroke-linecap="round"/>
  <path d="M425 358 L442 370 L425 382" fill="none" stroke="#5d7690" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M755 370 L805 370" stroke="#5d7690" stroke-width="4" stroke-linecap="round"/>
  <path d="M795 358 L812 370 L795 382" fill="none" stroke="#5d7690" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="160" y="570" width="880" height="78" rx="24" fill="#071827" stroke="#24435c" stroke-width="2"/>
  <text x="600" y="620" text-anchor="middle" fill="#e6f1ff" font-size="28" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif">pprof 给现场，三条线给责任</text>
</svg>
