<text x="80" y="132" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" fill="#9fc7d0">子节点通常不反向取消父节点；它只负责自己和自己的 children。</text>
