<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
<rect width="1200" height="760" fill="#081821"/>
<text x="80" y="90" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="36" fill="#f8fbff" font-weight="800">WithValue 不是 map，是一条链</text>
<text x="80" y="132" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" fill="#9fc7d0">Value(key) 从当前层开始找；找不到再沿 parent 一层层向上。</text>
<g font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">
  <g fill="#12313e" stroke="#4eb8ce" stroke-width="2">
    <rect x="80" y="280" width="220" height="120" rx="22"/>
    <rect x="375" y="280" width="220" height="120" rx="22"/>
    <rect x="670" y="280" width="220" height="120" rx="22"/>
    <rect x="965" y="280" width="155" height="120" rx="22"/>
  </g>
  <g font-size="24" fill="#fff" font-weight="700">
    <text x="128" y="330">valueCtx</text><text x="423" y="330">valueCtx</text><text x="718" y="330">valueCtx</text><text x="988" y="330">emptyCtx</text>
  </g>
  <g font-size="18" fill="#acd3dc">
    <text x="123" y="366">key: trace_id</text><text x="427" y="366">key: user_id</text><text x="705" y="366">key: request_id</text><text x="990" y="366">root</text>
  </g>
  <g stroke="#f6c35b" stroke-width="4" fill="none">
    <path d="M300 340 H375"/><path d="M595 340 H670"/><path d="M890 340 H965"/>
  </g>
  <g fill="#f6c35b"><polygon points="365,340 350,332 350,348"/><polygon points="660,340 645,332 645,348"/><polygon points="955,340 940,332 940,348"/></g>
  <rect x="250" y="510" width="700" height="62" rx="18" fill="#102d39" stroke="#2d6575"/>
  <text x="325" y="549" font-size="23" fill="#dff8ff">链越深，查找路径越长；同 key 内层会遮蔽外层</text>
</g>
</svg>