<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#111827"/></linearGradient>
  <linearGradient id="line1" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#38bdf8"/><stop offset="1" stop-color="#22c55e"/></linearGradient>
  <linearGradient id="line2" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#f97316"/><stop offset="1" stop-color="#facc15"/></linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="1200" height="675" fill="url(#bg)"/>
<circle cx="1010" cy="120" r="210" fill="#1e293b" opacity="0.55"/>
<circle cx="170" cy="560" r="250" fill="#0e7490" opacity="0.16"/>
<text x="74" y="92" fill="#e5e7eb" font-size="28" font-family="Arial, PingFang SC, sans-serif" font-weight="700">GOGC 不是魔法参数</text>
<text x="74" y="142" fill="#94a3b8" font-size="19" font-family="Arial, PingFang SC, sans-serif">它只是决定：这次由 CPU 付账，还是由内存付账</text>
<line x1="110" y1="560" x2="1080" y2="560" stroke="#334155" stroke-width="2"/>
<line x1="110" y1="160" x2="110" y2="560" stroke="#334155" stroke-width="2"/>
<text x="92" y="145" fill="#64748b" font-size="18" text-anchor="end" font-family="Arial">堆目标</text>
<text x="1080" y="596" fill="#64748b" font-size="18" text-anchor="end" font-family="Arial">GOGC</text>
<path d="M130 500 C 330 465, 515 382, 700 300 C 840 238, 950 200, 1060 170" fill="none" stroke="url(#line1)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
<path d="M130 235 C 330 255, 515 300, 700 365 C 840 414, 950 455, 1060 495" fill="none" stroke="url(#line2)" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
<g font-family="Arial, PingFang SC, sans-serif" font-size="20" font-weight="700">
  <circle cx="265" cy="472" r="8" fill="#38bdf8"/><text x="250" y="515" fill="#e5e7eb" text-anchor="middle">GOGC=50</text>
  <circle cx="550" cy="365" r="8" fill="#38bdf8"/><text x="550" y="420" fill="#e5e7eb" text-anchor="middle">GOGC=100</text>
  <circle cx="855" cy="230" r="8" fill="#38bdf8"/><text x="855" y="285" fill="#e5e7eb" text-anchor="middle">GOGC=200</text>
</g>
<rect x="690" y="78" width="420" height="146" rx="22" fill="#020617" opacity="0.72" stroke="#334155"/>
<text x="722" y="126" fill="#f8fafc" font-size="25" font-family="Arial, PingFang SC, sans-serif" font-weight="700">调高 GOGC</text>
<text x="722" y="166" fill="#38bdf8" font-size="21" font-family="Arial, PingFang SC, sans-serif">GC 少跑一点，CPU 好看一点</text>
<text x="722" y="198" fill="#f97316" font-size="21" font-family="Arial, PingFang SC, sans-serif">堆峰值也会更高一点</text>
<text x="880" y="542" fill="#facc15" font-size="22" font-family="Arial, PingFang SC, sans-serif" font-weight="700">GC CPU 趋势</text>
<text x="850" y="160" fill="#22c55e" font-size="22" font-family="Arial, PingFang SC, sans-serif" font-weight="700">Heap Goal 趋势</text>
</svg>