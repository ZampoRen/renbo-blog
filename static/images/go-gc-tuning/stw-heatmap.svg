<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#111827"/><stop offset="1" stop-color="#0f172a"/></linearGradient></defs>
<rect width="1200" height="760" fill="url(#bg)"/>
<text x="70" y="90" fill="#f8fafc" font-size="34" font-family="Arial, PingFang SC, sans-serif" font-weight="800">STW 只是一小段，别只盯 pause</text>
<text x="70" y="132" fill="#94a3b8" font-size="21" font-family="Arial, PingFang SC, sans-serif">p99 抖动还可能来自并发标记、assist、写屏障和 CPU 竞争</text>
<rect x="80" y="210" width="1040" height="310" rx="26" fill="#020617" stroke="#334155"/>
<g font-family="Arial, PingFang SC, sans-serif" font-weight="700" text-anchor="middle">
 <rect x="130" y="285" width="150" height="150" rx="18" fill="#ef4444" opacity="0.88"/>
 <text x="205" y="350" fill="#fff" font-size="24">Mark</text><text x="205" y="382" fill="#fee2e2" font-size="22">Setup</text><text x="205" y="418" fill="#fff" font-size="16">STW</text>
 <rect x="320" y="255" width="330" height="210" rx="20" fill="#f59e0b" opacity="0.78"/>
 <text x="485" y="344" fill="#111827" font-size="28">Concurrent Mark</text><text x="485" y="382" fill="#1f2937" font-size="18">CPU / assist / write barrier</text>
 <rect x="690" y="285" width="190" height="150" rx="18" fill="#ef4444" opacity="0.88"/>
 <text x="785" y="346" fill="#fff" font-size="24">Mark</text><text x="785" y="378" fill="#fee2e2" font-size="22">Termination</text><text x="785" y="416" fill="#fff" font-size="16">STW</text>
 <rect x="920" y="300" width="150" height="120" rx="18" fill="#38bdf8" opacity="0.76"/>
 <text x="995" y="356" fill="#082f49" font-size="25">Sweep</text><text x="995" y="390" fill="#0f172a" font-size="17">mostly concurrent</text>
</g>
<line x1="205" y1="555" x2="995" y2="555" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
<polygon points="995,555 970,542 970,568" fill="#475569"/>
<text x="600" y="602" fill="#94a3b8" font-size="20" text-anchor="middle" font-family="Arial, PingFang SC, sans-serif">一次 GC 周期</text>
<rect x="205" y="635" width="790" height="58" rx="18" fill="#1e293b" stroke="#334155"/>
<text x="600" y="672" fill="#e5e7eb" font-size="22" text-anchor="middle" font-family="Arial, PingFang SC, sans-serif" font-weight="700">STW 很短，不等于 GC 没影响</text>
</svg>