      <text x="24" y="29" font-family="Arial, sans-serif" font-size="18" fill="#e0f2fe">nil</text>
      <rect x="132" y="0" width="130" height="44" rx="14" fill="#0f172a" stroke="#fb7185"/>
      <text x="155" y="29" font-family="Arial, sans-serif" font-size="18" fill="#ffe4e6">closed</text>
      <rect x="282" y="0" width="128" height="44" rx="14" fill="#0f172a" stroke="#f97316"/>
      <text x="304" y="29" font-family="Arial, sans-serif" font-size="18" fill="#ffedd5">buffer</text>
    </g>
