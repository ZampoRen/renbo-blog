<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#111827"/></linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/></marker>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="80" y="90" font-family="Arial, sans-serif" font-size="42" font-weight="800" fill="#f8fafc">Channel 阻塞排查路径</text>
  <text x="80" y="134" font-family="Arial, sans-serif" font-size="22" fill="#cbd5e1">不要先改 buffer，先确认 goroutine 卡在哪里</text>
  <g font-family="Arial, sans-serif">
    <rect x="80" y="210" width="250" height="140" rx="22" fill="#172033" stroke="#334155" stroke-width="2"/>
    <text x="115" y="263" font-size="27" font-weight="700" fill="#e5e7eb">1. 看趋势</text>
    <text x="115" y="305" font-size="21" fill="#cbd5e1">NumGoroutine</text>
    <text x="115" y="335" font-size="21" fill="#cbd5e1">go_goroutines</text>

    <rect x="475" y="210" width="250" height="140" rx="22" fill="#172033" stroke="#38bdf8" stroke-width="2"/>
    <text x="510" y="263" font-size="27" font-weight="700" fill="#e5e7eb">2. 抓 pprof</text>
    <text x="510" y="305" font-size="21" fill="#cbd5e1">goroutine 栈</text>
    <text x="510" y="335" font-size="21" fill="#cbd5e1">找阻塞状态</text>

    <rect x="870" y="210" width="250" height="140" rx="22" fill="#172033" stroke="#334155" stroke-width="2"/>
    <text x="905" y="263" font-size="27" font-weight="700" fill="#e5e7eb">3. 分方向</text>
    <text x="905" y="305" font-size="21" fill="#cbd5e1">chan send</text>
    <text x="905" y="335" font-size="21" fill="#cbd5e1">chan receive</text>

    <path d="M340 280 L455 280" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M735 280 L850 280" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="180" y="455" width="360" height="145" rx="24" fill="#111827" stroke="#f97316" stroke-width="2"/>
    <text x="220" y="510" font-size="30" font-weight="800" fill="#ffedd5">chan send</text>
    <text x="220" y="552" font-size="22" fill="#cbd5e1">receiver 是否退出？</text>
    <text x="220" y="586" font-size="22" fill="#cbd5e1">发送方是否监听 ctx？</text>

    <rect x="660" y="455" width="360" height="145" rx="24" fill="#111827" stroke="#22c55e" stroke-width="2"/>
    <text x="700" y="510" font-size="30" font-weight="800" fill="#dcfce7">chan receive</text>
    <text x="700" y="552" font-size="22" fill="#cbd5e1">sender 是否退出？</text>
    <text x="700" y="586" font-size="22" fill="#cbd5e1">channel 是否该 close？</text>

    <path d="M995 360 C995 410,840 420,840 445" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <path d="M995 360 C995 410,360 420,360 445" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

    <rect x="245" y="660" width="710" height="54" rx="18" fill="#0b1220" stroke="#475569"/>
    <text x="305" y="695" font-size="24" font-weight="700" fill="#f8fafc">buffer 只在确认是短峰值时才是答案</text>
  </g>
</svg>
