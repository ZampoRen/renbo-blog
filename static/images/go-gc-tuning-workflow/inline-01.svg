<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#172033"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#17213a"/>
      <stop offset="100%" stop-color="#101827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;font-size:46px;font-weight:800;fill:#f8fafc;letter-spacing:1px}
      .sub{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;font-size:22px;fill:#a7b2c7}
      .step{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;font-size:16px;font-weight:700;fill:#67e8f9;letter-spacing:.5px}
      .h{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;font-size:25px;font-weight:800;fill:#f8fafc}
      .p{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;font-size:18px;fill:#cbd5e1}
      .small{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;font-size:18px;font-weight:700;fill:#e2e8f0}
      .foot{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;font-size:24px;font-weight:800;fill:#fef3c7}
    </style>
  </defs>

  <rect width="1280" height="760" fill="url(#bg)"/>
  <circle cx="100" cy="90" r="160" fill="#155e75" opacity="0.16"/>
  <circle cx="1080" cy="700" r="220" fill="#7c3aed" opacity="0.12"/>
  <path d="M70 630 C260 500, 420 680, 610 540 S960 420, 1130 520" fill="none" stroke="#38bdf8" stroke-opacity="0.18" stroke-width="3"/>

  <text x="70" y="88" class="title">Go GC 调优决策路径</text>
  <text x="72" y="130" class="sub">别先问 GOGC 设多少，先把证据按顺序摆出来</text>

  <g filter="url(#shadow)">
    <rect x="70" y="190" width="200" height="220" rx="28" fill="url(#card)" stroke="#334155" stroke-width="2"/>
    <text x="100" y="238" class="step">STEP 01</text>
    <text x="100" y="286" class="h">确认相关性</text>
    <text x="100" y="332" class="p">p99 是否贴着</text>
    <text x="100" y="362" class="p">GC 周期抖动</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="300" y="190" width="200" height="220" rx="28" fill="url(#card)" stroke="#334155" stroke-width="2"/>
    <text x="330" y="238" class="step">STEP 02</text>
    <text x="330" y="286" class="h">看 live heap</text>
    <text x="330" y="332" class="p">GC 后是否</text>
    <text x="330" y="362" class="p">真的降下来</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="530" y="190" width="200" height="220" rx="28" fill="url(#card)" stroke="#334155" stroke-width="2"/>
    <text x="560" y="238" class="step">STEP 03</text>
    <text x="560" y="286" class="h">查分配速率</text>
    <text x="560" y="332" class="p">活得太久，还是</text>
    <text x="560" y="362" class="p">生得太快</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="760" y="190" width="200" height="220" rx="28" fill="url(#card)" stroke="#334155" stroke-width="2"/>
    <text x="790" y="238" class="step">STEP 04</text>
    <text x="790" y="286" class="h">按场景交易</text>
    <text x="790" y="332" class="p">CPU、内存、</text>
    <text x="790" y="362" class="p">容器边界</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="990" y="190" width="140" height="220" rx="28" fill="#1e293b" stroke="#f59e0b" stroke-opacity="0.55" stroke-width="2"/>
    <text x="1015" y="238" class="step" fill="#fbbf24">STOP</text>
    <text x="1015" y="286" class="h" font-size="24">回滚线</text>
    <text x="1015" y="332" class="p" font-size="17">先写清楚</text>
    <text x="1015" y="362" class="p" font-size="17">何时停手</text>
  </g>

  <g stroke="#67e8f9" stroke-opacity="0.7" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M273 300 L297 300"/>
    <path d="M503 300 L527 300"/>
    <path d="M733 300 L757 300"/>
    <path d="M963 300 L987 300"/>
  </g>
  <g fill="#67e8f9" opacity="0.9">
    <path d="M296 300 l-8 -6 v12z"/>
    <path d="M526 300 l-8 -6 v12z"/>
    <path d="M756 300 l-8 -6 v12z"/>
    <path d="M986 300 l-8 -6 v12z"/>
  </g>

  <rect x="100" y="492" width="1000" height="96" rx="26" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <text x="140" y="535" class="small">CPU 紧、内存宽：小步提高 GOGC</text>
  <text x="140" y="568" class="small">内存紧：先设 GOMEMLIMIT</text>
  <text x="570" y="535" class="small">live heap 涨：先查持有关系</text>
  <text x="570" y="568" class="small">少分配：别硬往 GC 上靠</text>

  <rect x="260" y="640" width="680" height="54" rx="27" fill="#78350f" opacity="0.88"/>
  <text x="338" y="676" class="foot">参数只是按钮，路径才是保险丝</text>
</svg>
