<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8e8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg2)"/>
  
  <!-- Title -->
  <text x="400" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#333333" text-anchor="middle">组件就是函数</text>
  
  <!-- Function diagram -->
  <rect x="100" y="100" width="200" height="300" rx="8" fill="#ffffff" stroke="#61dafb" stroke-width="2"/>
  <text x="200" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#61dafb" text-anchor="middle">Component</text>
  
  <!-- Input -->
  <text x="200" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#666666" text-anchor="middle">props (输入)</text>
  <path d="M 200 190 L 200 220" stroke="#666666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
  </defs>
  
  <!-- Box for function -->
  <rect x="130" y="230" width="140" height="60" rx="4" fill="#f0f9ff"/>
  <text x="200" y="265" font-family="monospace" font-size="12" fill="#333333" text-anchor="middle">return UI</text>
  
  <!-- Output -->
  <path d="M 200 290 L 200 320" stroke="#666666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="200" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#666666" text-anchor="middle">React Element (输出)</text>
  
  <!-- Right side explanation -->
  <rect x="350" y="100" width="350" height="300" rx="8" fill="#ffffff" stroke="#22c55e" stroke-width="2"/>
  <text x="525" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#22c55e" text-anchor="middle">这意味着什么？</text>
  
  <text x="380" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#333333">• 组件更容易理解</text>
  <text x="380" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#333333">• UI 更容易组合</text>
  <text x="380" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#333333">• 输入输出关系更清楚</text>
  
  <rect x="370" y="270" width="310" height="100" rx="4" fill="#f0fff0"/>
  <text x="525" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#666666" text-anchor="middle">相同输入 → 相同输出</text>
  <text x="525" y="335" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#666666" text-anchor="middle">像普通函数一样可推理</text>
  <text x="525" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#666666" text-anchor="middle">复杂 UI 由小组件拼成</text>
  
  <!-- Bottom note -->
  <text x="400" y="485" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#999999" text-anchor="middle">React 最厉害的地方，是把前端界面重新变成了函数问题</text>
</svg>
