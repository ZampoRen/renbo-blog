<svg width="900" height="383" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="reactGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#61dafb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4fa8c7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="383" fill="url(#bg)"/>
  
  <!-- React Atom Symbol (simplified) -->
  <ellipse cx="450" cy="190" rx="120" ry="40" fill="none" stroke="#61dafb" stroke-width="3" transform="rotate(0 450 190)" opacity="0.4"/>
  <ellipse cx="450" cy="190" rx="120" ry="40" fill="none" stroke="#61dafb" stroke-width="3" transform="rotate(60 450 190)" opacity="0.4"/>
  <ellipse cx="450" cy="190" rx="120" ry="40" fill="none" stroke="#61dafb" stroke-width="3" transform="rotate(120 450 190)" opacity="0.4"/>
  <circle cx="450" cy="190" r="15" fill="#61dafb"/>
  
  <!-- Title -->
  <text x="450" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">React 心智模型</text>
  <text x="450" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#a0a0a0" text-anchor="middle">不是 API 清单，是思维方式</text>
  
  <!-- Bottom tags -->
  <rect x="200" y="280" width="150" height="50" rx="8" fill="#61dafb" opacity="0.15"/>
  <text x="275" y="312" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#61dafb" text-anchor="middle">组件 = 函数</text>
  
  <rect x="375" y="280" width="150" height="50" rx="8" fill="#61dafb" opacity="0.15"/>
  <text x="450" y="312" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#61dafb" text-anchor="middle">UI = 状态的函数</text>
  
  <rect x="550" y="280" width="150" height="50" rx="8" fill="#61dafb" opacity="0.15"/>
  <text x="625" y="312" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#61dafb" text-anchor="middle">effect = 副作用出口</text>
  
  <!-- Bottom tagline -->
  <text x="450" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#606060" text-anchor="middle">React 让 UI 变成了一件可以被推理的事</text>
</svg>
