<svg width="900" height="383" viewBox="0 0 900 383" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="900" height="383" fill="#0D1117"/>
  
  <!-- 网格线 -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1F2937" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="900" height="383" fill="url(#grid)"/>
  
  <!-- Docker 容器抽象图 -->
  <rect x="200" y="100" width="500" height="180" rx="12" fill="#161B22" stroke="#2496ED" stroke-width="3"/>
  
  <!-- 容器内应用 -->
  <circle cx="300" cy="190" r="50" fill="#1F6FEB" fill-opacity="0.3" stroke="#58A6FF" stroke-width="2"/>
  <text x="300" y="195" fill="#58A6FF" font-family="system-ui" font-size="14" font-weight="600" text-anchor="middle">App</text>
  
  <circle cx="450" cy="190" r="50" fill="#238636" fill-opacity="0.3" stroke="#7EE787" stroke-width="2"/>
  <text x="450" y="195" fill="#7EE787" font-family="system-ui" font-size="14" font-weight="600" text-anchor="middle">Deps</text>
  
  <circle cx="600" cy="190" r="50" fill="#8957E5" fill-opacity="0.3" stroke="#D2A8FF" stroke-width="2"/>
  <text x="600" y="195" fill="#D2A8FF" font-family="system-ui" font-size="14" font-weight="600" text-anchor="middle">Runtime</text>
  
  <!-- 装饰性代码元素 -->
  <text x="100" y="80" fill="#58A6FF" font-family="monospace" font-size="12">docker run --rm</text>
  <text x="100" y="100" fill="#7EE787" font-family="monospace" font-size="12">FROM node:18-alpine</text>
  <text x="100" y="120" fill="#F0883E" font-family="monospace" font-size="12">EXPOSE 3000</text>
  
  <!-- 标题文字 -->
  <text x="450" y="320" fill="#C9D1D9" font-family="system-ui" font-size="24" font-weight="700" text-anchor="middle">99% 的开发者用错了 Docker</text>
  
  <!-- 副标题 -->
  <text x="450" y="355" fill="#8B949E" font-family="system-ui" font-size="14" text-anchor="middle">从 Namespaces 到 Dockerfile 最佳实践</text>
</svg>
