<svg width="900" height="383" viewBox="0 0 900 383" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="900" height="383" fill="#0D1117"/>
  
  <!-- 网格线 -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1F2937" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="900" height="383" fill="url(#grid)"/>
  
  <!-- 标题 -->
  <text x="450" y="40" fill="#C9D1D9" font-family="system-ui" font-size="18" font-weight="600" text-anchor="middle">VM vs Container</text>
  
  <!-- 左侧：VM -->
  <rect x="50" y="70" width="380" height="280" rx="8" fill="#161B22" stroke="#FF7B72" stroke-width="2"/>
  <text x="240" y="100" fill="#FF7B72" font-family="system-ui" font-size="16" font-weight="600" text-anchor="middle">Virtual Machine</text>
  
  <!-- VM 分层 -->
  <rect x="80" y="120" width="320" height="40" rx="4" fill="#1F6FEB" fill-opacity="0.3" stroke="#58A6FF" stroke-width="1.5"/>
  <text x="240" y="145" fill="#58A6FF" font-family="system-ui" font-size="12" text-anchor="middle">App A</text>
  
  <rect x="80" y="170" width="320" height="40" rx="4" fill="#1F6FEB" fill-opacity="0.3" stroke="#58A6FF" stroke-width="1.5"/>
  <text x="240" y="195" fill="#58A6FF" font-family="system-ui" font-size="12" text-anchor="middle">App B</text>
  
  <rect x="80" y="220" width="320" height="40" rx="4" fill="#238636" fill-opacity="0.3" stroke="#7EE787" stroke-width="1.5"/>
  <text x="240" y="245" fill="#7EE787" font-family="system-ui" font-size="12" text-anchor="middle">Guest OS (Full Kernel)</text>
  
  <rect x="80" y="270" width="320" height="40" rx="4" fill="#8957E5" fill-opacity="0.3" stroke="#D2A8FF" stroke-width="1.5"/>
  <text x="240" y="295" fill="#D2A8FF" font-family="system-ui" font-size="12" text-anchor="middle">Hypervisor</text>
  
  <rect x="80" y="320" width="320" height="20" rx="4" fill="#D29922" fill-opacity="0.3" stroke="#F0883E" stroke-width="1"/>
  <text x="240" y="335" fill="#F0883E" font-family="system-ui" font-size="11" text-anchor="middle">Host Infrastructure</text>
  
  <!-- 右侧：Container -->
  <rect x="470" y="70" width="380" height="280" rx="8" fill="#161B22" stroke="#7EE787" stroke-width="2"/>
  <text x="660" y="100" fill="#7EE787" font-family="system-ui" font-size="16" font-weight="600" text-anchor="middle">Container</text>
  
  <!-- Container 分层 -->
  <rect x="500" y="120" width="320" height="40" rx="4" fill="#1F6FEB" fill-opacity="0.3" stroke="#58A6FF" stroke-width="1.5"/>
  <text x="660" y="145" fill="#58A6FF" font-family="system-ui" font-size="12" text-anchor="middle">App A</text>
  
  <rect x="500" y="170" width="320" height="40" rx="4" fill="#1F6FEB" fill-opacity="0.3" stroke="#58A6FF" stroke-width="1.5"/>
  <text x="660" y="195" fill="#58A6FF" font-family="system-ui" font-size="12" text-anchor="middle">App B</text>
  
  <rect x="500" y="220" width="320" height="40" rx="4" fill="#238636" fill-opacity="0.3" stroke="#7EE787" stroke-width="1.5"/>
  <text x="660" y="245" fill="#7EE787" font-family="system-ui" font-size="12" text-anchor="middle">Bins &amp; Libs</text>
  
  <rect x="500" y="270" width="320" height="40" rx="4" fill="#8957E5" fill-opacity="0.3" stroke="#D2A8FF" stroke-width="1.5"/>
  <text x="660" y="295" fill="#D2A8FF" font-family="system-ui" font-size="12" text-anchor="middle">Docker Engine</text>
  
  <rect x="500" y="320" width="320" height="20" rx="4" fill="#D29922" fill-opacity="0.3" stroke="#F0883E" stroke-width="1"/>
  <text x="660" y="335" fill="#F0883E" font-family="system-ui" font-size="11" text-anchor="middle">Host Infrastructure (Shared Kernel)</text>
  
  <!-- 中间箭头对比 -->
  <text x="450" y="200" fill="#8B949E" font-family="system-ui" font-size="11" text-anchor="middle">独立内核</text>
  <text x="450" y="220" fill="#8B949E" font-family="system-ui" font-size="11" text-anchor="middle">vs</text>
  <text x="450" y="240" fill="#8B949E" font-family="system-ui" font-size="11" text-anchor="middle">共享内核</text>
</svg>
