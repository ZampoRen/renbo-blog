<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="RAG 选型五问流程图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#111827"/></linearGradient>
    <style>
      .title{font:800 42px -apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif;fill:#f8fafc}.sub{font:500 20px -apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif;fill:#cbd5e1}.boxTitle{font:800 23px -apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif;fill:#f8fafc}.boxText{font:500 17px -apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif;fill:#cbd5e1}.tag{font:800 18px -apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif}.small{font:600 15px -apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif;fill:#94a3b8}
    </style>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <text x="80" y="86" class="title">RAG 选型先问这 5 件事</text>
  <text x="82" y="122" class="sub">不要先争谁更高级，先判断复杂性在哪里。</text>

  <g transform="translate(80,180)">
    <rect width="300" height="150" rx="26" fill="#0b1220" stroke="#38bdf8" stroke-width="2"/>
    <text x="28" y="48" class="boxTitle">答案在少数片段里？</text>
    <text x="28" y="86" class="boxText">FAQ、文档、手册、制度</text>
    <text x="28" y="119" class="tag" fill="#7dd3fc">优先 Standard RAG</text>
  </g>
  <g transform="translate(450,180)">
    <rect width="300" height="150" rx="26" fill="#0b1220" stroke="#34d399" stroke-width="2"/>
    <text x="28" y="48" class="boxTitle">依赖实体关系？</text>
    <text x="28" y="86" class="boxText">多跳、全局主题、组织关系</text>
    <text x="28" y="119" class="tag" fill="#86efac">考虑 Graph RAG</text>
  </g>
  <g transform="translate(820,180)">
    <rect width="300" height="150" rx="26" fill="#0b1220" stroke="#f59e0b" stroke-width="2"/>
    <text x="28" y="48" class="boxTitle">需要运行时判断？</text>
    <text x="28" y="86" class="boxText">拆问题、选源、自检、重查</text>
    <text x="28" y="119" class="tag" fill="#fcd34d">考虑 Agentic RAG</text>
  </g>

  <path d="M380 255 H450" stroke="#475569" stroke-width="3"/>
  <path d="M750 255 H820" stroke="#475569" stroke-width="3"/>

  <g transform="translate(190,420)">
    <rect width="820" height="120" rx="28" fill="#111827" stroke="#334155"/>
    <text x="36" y="45" class="boxTitle">最后两问：成本能不能承受？现在到底错在哪里？</text>
    <text x="36" y="82" class="boxText">如果 70% 错误来自 chunk、metadata、rerank、freshness，先别上 Agent。</text>
  </g>

  <g transform="translate(80,594)">
    <rect width="1040" height="54" rx="27" fill="rgba(56,189,248,0.12)" stroke="#38bdf8"/>
    <text x="74" y="35" class="tag" fill="#e0f2fe">固定管线能解决的，别交给运行时循环；索引资产能解决的，别每次重新思考。</text>
  </g>
</svg>
