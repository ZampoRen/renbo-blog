<svg xmlns="http://www.w3.org/2000/svg" width="900" height="383" viewBox="0 0 900 383" role="img" aria-label="RAG 复杂性位置示意图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="383" fill="url(#bg)"/>
  <circle cx="128" cy="98" r="74" fill="#0f766e" opacity="0.12"/>
  <circle cx="778" cy="295" r="92" fill="#2563eb" opacity="0.10"/>
  <g opacity="0.9">
    <path d="M95 192 C150 120, 238 120, 296 190" fill="none" stroke="#334155" stroke-width="3"/>
    <path d="M296 190 C365 270, 460 270, 528 190" fill="none" stroke="#334155" stroke-width="3"/>
    <path d="M528 190 C585 120, 670 120, 730 190" fill="none" stroke="#334155" stroke-width="3"/>
    <g filter="url(#glow)">
      <circle cx="95" cy="192" r="20" fill="#38bdf8"/>
      <circle cx="296" cy="190" r="20" fill="#a78bfa"/>
      <circle cx="528" cy="190" r="20" fill="#34d399"/>
      <circle cx="730" cy="190" r="20" fill="#f59e0b"/>
    </g>
  </g>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif">
    <text x="60" y="64" fill="#93c5fd" font-size="18" font-weight="600">RAG 选型不是升级路线</text>
    <text x="60" y="130" fill="#f8fafc" font-size="42" font-weight="800">复杂性放错了，</text>
    <text x="60" y="181" fill="#f8fafc" font-size="42" font-weight="800">Agent 只会更贵地犯错</text>
    <text x="62" y="238" fill="#cbd5e1" font-size="20">固定管线 · 图谱索引 · 运行时决策</text>
    <rect x="60" y="278" width="250" height="42" rx="21" fill="rgba(56,189,248,0.14)" stroke="#38bdf8"/>
    <text x="86" y="306" fill="#e0f2fe" font-size="18" font-weight="700">先做失败归因，再加复杂度</text>
  </g>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">
    <rect x="448" y="266" width="124" height="42" rx="14" fill="#0f172a" stroke="#38bdf8" opacity="0.95"/>
    <text x="478" y="292" fill="#e0f2fe">Standard</text>
    <rect x="590" y="266" width="124" height="42" rx="14" fill="#0f172a" stroke="#34d399" opacity="0.95"/>
    <text x="625" y="292" fill="#dcfce7">Graph</text>
    <rect x="732" y="266" width="124" height="42" rx="14" fill="#0f172a" stroke="#f59e0b" opacity="0.95"/>
    <text x="761" y="292" fill="#fef3c7">Agentic</text>
  </g>
</svg>
