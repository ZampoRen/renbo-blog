<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-label="TypeScript native port 官方 benchmark 表">
  <rect width="900" height="520" fill="#07111f"/>
  <text x="52" y="62" font-family="Inter,Arial,'PingFang SC',sans-serif" font-size="30" font-weight="900" fill="#fff">官方 benchmark：10 倍提速发生在 tsc / 类型检查</text>
  <text x="52" y="96" font-family="Inter,Arial,'PingFang SC',sans-serif" font-size="17" fill="#94a3b8">Microsoft TypeScript Blog, A 10x Faster TypeScript</text>
  <g transform="translate(52 126)">
    <rect width="796" height="54" rx="14" fill="#1e40af"/>
    <text x="24" y="35" font-family="Inter,Arial,'PingFang SC',sans-serif" font-size="17" font-weight="800" fill="#fff">Codebase</text>
    <text x="300" y="35" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="800" fill="#fff">Current</text>
    <text x="455" y="35" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="800" fill="#fff">Native</text>
    <text x="610" y="35" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="800" fill="#fff">Speedup</text>
    <g font-family="Inter,Arial,'PingFang SC',sans-serif" font-size="18" fill="#e5e7eb">
      <rect y="70" width="796" height="50" rx="12" fill="#0f172a"/><text x="24" y="102">VS Code</text><text x="300" y="102">77.8s</text><text x="455" y="102">7.5s</text><text x="610" y="102" fill="#7dd3fc" font-weight="900">10.4x</text>
      <rect y="130" width="796" height="50" rx="12" fill="#111c31"/><text x="24" y="162">Playwright</text><text x="300" y="162">11.1s</text><text x="455" y="162">1.1s</text><text x="610" y="162" fill="#7dd3fc" font-weight="900">10.1x</text>
      <rect y="190" width="796" height="50" rx="12" fill="#0f172a"/><text x="24" y="222">TypeORM</text><text x="300" y="222">17.5s</text><text x="455" y="222">1.3s</text><text x="610" y="222" fill="#7dd3fc" font-weight="900">13.5x</text>
      <rect y="250" width="796" height="50" rx="12" fill="#111c31"/><text x="24" y="282">date-fns</text><text x="300" y="282">6.5s</text><text x="455" y="282">0.7s</text><text x="610" y="282" fill="#7dd3fc" font-weight="900">9.5x</text>
      <rect y="310" width="796" height="50" rx="12" fill="#0f172a"/><text x="24" y="342">tRPC server + client</text><text x="300" y="342">5.5s</text><text x="455" y="342">0.6s</text><text x="610" y="342" fill="#7dd3fc" font-weight="900">9.1x</text>
    </g>
  </g>
  <text x="52" y="492" font-family="Inter,Arial,'PingFang SC',sans-serif" font-size="18" fill="#cbd5e1">这不是业务 JS 运行时加速，而是开发期工具链加速。</text>
</svg>
