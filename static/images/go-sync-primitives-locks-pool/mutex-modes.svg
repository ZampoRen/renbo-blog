<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#0b1020"/><stop offset="1" stop-color="#14213d"/></linearGradient></defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <circle cx="1040" cy="120" r="180" fill="#38bdf8" opacity="0.10"/>
  <circle cx="130" cy="620" r="220" fill="#22c55e" opacity="0.08"/>
  <text x="72" y="110" fill="#f8fafc" font-family="Arial, 'PingFang SC', sans-serif" font-size="46" font-weight="700">Mutex 两种模式</text>
  <text x="74" y="158" fill="#94a3b8" font-family="Arial, 'PingFang SC', sans-serif" font-size="24">正常模式保吞吐，饥饿模式保尾延迟</text>
  
  <rect x="90" y="245" width="470" height="260" rx="28" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
  <text x="140" y="305" fill="#e0f2fe" font-family="Arial, 'PingFang SC', sans-serif" font-size="32" font-weight="700">正常模式</text>
  <text x="140" y="360" fill="#cbd5e1" font-family="Arial, 'PingFang SC', sans-serif" font-size="24">被唤醒者仍要抢锁</text>
  <text x="140" y="404" fill="#cbd5e1" font-family="Arial, 'PingFang SC', sans-serif" font-size="24">新来的 goroutine 更占便宜</text>
  <text x="140" y="448" fill="#38bdf8" font-family="Arial, 'PingFang SC', sans-serif" font-size="24">吞吐更好</text>
  <rect x="640" y="245" width="470" height="260" rx="28" fill="#0f172a" stroke="#f97316" stroke-width="2"/>
  <text x="690" y="305" fill="#ffedd5" font-family="Arial, 'PingFang SC', sans-serif" font-size="32" font-weight="700">饥饿模式</text>
  <text x="690" y="360" fill="#cbd5e1" font-family="Arial, 'PingFang SC', sans-serif" font-size="24">等待超过约 1ms 后切入</text>
  <text x="690" y="404" fill="#cbd5e1" font-family="Arial, 'PingFang SC', sans-serif" font-size="24">所有权直接 handoff</text>
  <text x="690" y="448" fill="#fb923c" font-family="Arial, 'PingFang SC', sans-serif" font-size="24">尾延迟保护</text>
  <text x="420" y="610" fill="#e2e8f0" font-family="Arial, 'PingFang SC', sans-serif" font-size="26">不是公平队列，而是吞吐与尾延迟的切换</text>
</svg>