  <text x="72" y="110" fill="#f8fafc" font-family="Arial, 'PingFang SC', sans-serif" font-size="46" font-weight="700">sync.Pool 与 GC</text>
  <text x="74" y="158" fill="#94a3b8" font-family="Arial, 'PingFang SC', sans-serif" font-size="24">primary / victim cache 会随 GC 轮转</text>
  
