  <text x="550" y="330" fill="#dcfce7" font-family="Arial, 'PingFang SC', sans-serif" font-size="30" font-weight="700">victim</text>
  <rect x="840" y="245" width="270" height="150" rx="24" fill="#0f172a" stroke="#ef4444" stroke-width="2"/>
  <text x="915" y="330" fill="#fee2e2" font-family="Arial, 'PingFang SC', sans-serif" font-size="30" font-weight="700">discard</text>
  <path d="M365 320 L455 320" stroke="#94a3b8" stroke-width="4"/>
  <path d="M740 320 L830 320" stroke="#94a3b8" stroke-width="4"/>
