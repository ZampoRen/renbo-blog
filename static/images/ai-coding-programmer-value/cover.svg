    <path d="M420 126 L420 82 M420 244 L420 296 M362 185 L305 185 M478 185 L546 185 M379 144 L340 105 M461 144 L502 105 M379 226 L338 267 M461 226 L506 267" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="420" cy="82" r="10" fill="#6ee7f9"/><circle cx="420" cy="296" r="10" fill="#a78bfa"/><circle cx="305" cy="185" r="10" fill="#6ee7f9"/><circle cx="546" cy="185" r="10" fill="#a78bfa"/>
