<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="800" height="500" fill="#0D1117"/>
  
  <!-- 标题 -->
  <text x="400" y="35" fill="#C9D1D9" font-family="system-ui" font-size="18" font-weight="600" text-anchor="middle">栈 vs 堆：核心差异</text>
  
  <!-- 左侧：栈 -->
  <rect x="40" y="70" width="340" height="400" rx="8" fill="#161B22" stroke="#58A6FF" stroke-width="2"/>
  <text x="210" y="100" fill="#58A6FF" font-family="system-ui" font-size="16" font-weight="600" text-anchor="middle">栈（Stack）</text>
  
  <!-- 栈特点 -->
  <rect x="60" y="120" width="300" height="60" rx="6" fill="#1F2937" stroke="#30363D" stroke-width="1"/>
  <text x="210" y="145" fill="#79C0FF" font-family="system-ui" font-size="13" font-weight="600" text-anchor="middle">管理方式</text>
  <text x="210" y="170" fill="#8B949E" font-family="monospace" font-size="11" text-anchor="middle">LIFO · 编译器自动管理</text>
  
  <rect x="60" y="190" width="300" height="60" rx="6" fill="#1F2937" stroke="#30363D" stroke-width="1"/>
  <text x="210" y="215" fill="#79C0FF" font-family="system-ui" font-size="13" font-weight="600" text-anchor="middle">分配速度</text>
  <text x="210" y="240" fill="#8B949E" font-family="monospace" font-size="11" text-anchor="middle">极快 · 指针移动即可</text>
  
  <rect x="60" y="260" width="300" height="60" rx="6" fill="#1F2937" stroke="#30363D" stroke-width="1"/>
  <text x="210" y="285" fill="#79C0FF" font-family="system-ui" font-size="13" font-weight="600" text-anchor="middle">生命周期</text>
  <text x="210" y="310" fill="#8B949E" font-family="monospace" font-size="11" text-anchor="middle">函数结束时自动释放</text>
  
  <rect x="60" y="330" width="300" height="60" rx="6" fill="#1F2937" stroke="#30363D" stroke-width="1"/>
  <text x="210" y="355" fill="#79C0FF" font-family="system-ui" font-size="13" font-weight="600" text-anchor="middle">大小限制</text>
  <text x="210" y="380" fill="#8B949E" font-family="monospace" font-size="11" text-anchor="middle">通常几 MB · 编译期确定</text>
  
  <!-- 右侧：堆 -->
  <rect x="420" y="70" width="340" height="400" rx="8" fill="#161B22" stroke="#7EE787" stroke-width="2"/>
  <text x="590" y="100" fill="#7EE787" font-family="system-ui" font-size="16" font-weight="600" text-anchor="middle">堆（Heap）</text>
  
  <!-- 堆特点 -->
  <rect x="440" y="120" width="300" height="60" rx="6" fill="#1F2937" stroke="#30363D" stroke-width="1"/>
  <text x="590" y="145" fill="#7EE787" font-family="system-ui" font-size="13" font-weight="600" text-anchor="middle">管理方式</text>
  <text x="590" y="170" fill="#8B949E" font-family="monospace" font-size="11" text-anchor="middle">运行时 · 分配器/GC 管理</text>
  
  <rect x="440" y="190" width="300" height="60" rx="6" fill="#1F2937" stroke="#30363D" stroke-width="1"/>
  <text x="590" y="215" fill="#7EE787" font-family="system-ui" font-size="13" font-weight="600" text-anchor="middle">分配速度</text>
  <text x="590" y="240" fill="#8B949E" font-family="monospace" font-size="11" text-anchor="middle">慢 · 涉及元数据和 GC</text>
  
  <rect x="440" y="260" width="300" height="60" rx="6" fill="#1F2937" stroke="#30363D" stroke-width="1"/>
  <text x="590" y="285" fill="#7EE787" font-family="system-ui" font-size="13" font-weight="600" text-anchor="middle">生命周期</text>
  <text x="590" y="310" fill="#8B949E" font-family="monospace" font-size="11" text-anchor="middle">可超过函数生命周期</text>
  
  <rect x="440" y="330" width="300" height="60" rx="6" fill="#1F2937" stroke="#30363D" stroke-width="1"/>
  <text x="590" y="355" fill="#7EE787" font-family="system-ui" font-size="13" font-weight="600" text-anchor="middle">大小限制</text>
  <text x="590" y="380" fill="#8B949E" font-family="monospace" font-size="11" text-anchor="middle">更大更灵活 · 可向 OS 请求</text>
  
  <!-- 底部说明 -->
  <rect x="40" y="480" width="720" height="15" rx="4" fill="#0D1117" stroke="#30363D" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="400" y="492" fill="#8B949E" font-family="system-ui" font-size="10" text-anchor="middle">关键区别：栈变量在函数结束时消失，堆对象可以活得更久</text>
</svg>
