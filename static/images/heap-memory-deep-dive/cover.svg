<svg width="900" height="383" viewBox="0 0 900 383" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="900" height="383" fill="#0D1117"/>
  
  <!-- 网格线 -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1F2937" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="900" height="383" fill="url(#grid)"/>
  
  <!-- 左侧：栈 -->
  <rect x="100" y="80" width="280" height="220" rx="8" fill="#161B22" stroke="#58A6FF" stroke-width="2"/>
  <text x="240" y="115" fill="#58A6FF" font-family="system-ui" font-size="18" font-weight="600" text-anchor="middle">Stack（栈）</text>
  
  <!-- 栈帧 -->
  <rect x="130" y="140" width="220" height="40" rx="4" fill="#1F6FEB" fill-opacity="0.3" stroke="#58A6FF" stroke-width="1.5"/>
  <text x="240" y="165" fill="#79C0FF" font-family="monospace" font-size="12" text-anchor="middle">Frame 1 (main)</text>
  
  <rect x="130" y="190" width="220" height="40" rx="4" fill="#1F6FEB" fill-opacity="0.3" stroke="#58A6FF" stroke-width="1.5"/>
  <text x="240" y="215" fill="#79C0FF" font-family="monospace" font-size="12" text-anchor="middle">Frame 2 (foo)</text>
  
  <rect x="130" y="240" width="220" height="40" rx="4" fill="#FF7B72" fill-opacity="0.3" stroke="#FF7B72" stroke-width="1.5"/>
  <text x="240" y="265" fill="#FFA198" font-family="monospace" font-size="12" text-anchor="middle">← SP (Stack Pointer)</text>
  
  <text x="240" y="310" fill="#8B949E" font-family="monospace" font-size="11" text-anchor="middle">LIFO · 极快 · 编译期确定</text>
  
  <!-- 右侧：堆 -->
  <rect x="520" y="80" width="280" height="220" rx="8" fill="#161B22" stroke="#7EE787" stroke-width="2"/>
  <text x="660" y="115" fill="#7EE787" font-family="system-ui" font-size="18" font-weight="600" text-anchor="middle">Heap（堆）</text>
  
  <!-- 堆块 -->
  <rect x="550" y="140" width="100" height="50" rx="4" fill="#238636" fill-opacity="0.3" stroke="#7EE787" stroke-width="1.5"/>
  <text x="600" y="170" fill="#7EE787" font-family="monospace" font-size="10" text-anchor="middle">In Use</text>
  
  <rect x="660" y="140" width="100" height="50" rx="4" fill="#D29922" fill-opacity="0.3" stroke="#F0883E" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="710" y="170" fill="#F0883E" font-family="monospace" font-size="10" text-anchor="middle">Free</text>
  
  <rect x="550" y="200" width="100" height="50" rx="4" fill="#238636" fill-opacity="0.3" stroke="#7EE787" stroke-width="1.5"/>
  <text x="600" y="230" fill="#7EE787" font-family="monospace" font-size="10" text-anchor="middle">In Use</text>
  
  <rect x="660" y="200" width="100" height="50" rx="4" fill="#238636" fill-opacity="0.3" stroke="#7EE787" stroke-width="1.5"/>
  <text x="710" y="230" fill="#7EE787" font-family="monospace" font-size="10" text-anchor="middle">In Use</text>
  
  <rect x="550" y="260" width="210" height="20" rx="4" fill="#D29922" fill-opacity="0.3" stroke="#F0883E" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="655" y="275" fill="#F0883E" font-family="monospace" font-size="10" text-anchor="middle">Free (Fragmented)</text>
  
  <text x="660" y="310" fill="#8B949E" font-family="monospace" font-size="11" text-anchor="middle">动态分配 · GC · 碎片化</text>
  
  <!-- 标题 -->
  <text x="450" y="50" fill="#C9D1D9" font-family="system-ui" font-size="20" font-weight="700" text-anchor="middle">99% 的开发者不懂堆内存</text>
</svg>
