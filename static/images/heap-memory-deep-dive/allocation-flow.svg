<svg width="800" height="550" viewBox="0 0 800 550" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="800" height="550" fill="#0D1117"/>
  
  <!-- 标题 -->
  <text x="400" y="35" fill="#C9D1D9" font-family="system-ui" font-size="18" font-weight="600" text-anchor="middle">堆分配流程</text>
  
  <!-- 分配器结构 -->
  <rect x="40" y="70" width="340" height="200" rx="8" fill="#161B22" stroke="#8957E5" stroke-width="2"/>
  <text x="210" y="100" fill="#D2A8FF" font-family="system-ui" font-size="16" font-weight="600" text-anchor="middle">分配器结构</text>
  
  <!-- 空闲链表 -->
  <rect x="60" y="120" width="300" height="40" rx="4" fill="#1F2937" stroke="#30363D" stroke-width="1"/>
  <text x="210" y="145" fill="#79C0FF" font-family="system-ui" font-size="12" font-weight="600" text-anchor="middle">空闲链表（Free Lists）</text>
  
  <!-- 大小块 -->
  <rect x="60" y="170" width="300" height="40" rx="4" fill="#1F2937" stroke="#30363D" stroke-width="1"/>
  <text x="210" y="195" fill="#79C0FF" font-family="system-ui" font-size="12" font-weight="600" text-anchor="middle">大小块（Size Bins）</text>
  
  <!-- 区域 -->
  <rect x="60" y="220" width="300" height="40" rx="4" fill="#1F2937" stroke="#30363D" stroke-width="1"/>
  <text x="210" y="245" fill="#79C0FF" font-family="system-ui" font-size="12" font-weight="600" text-anchor="middle">区域（Arenas）</text>
  
  <!-- 分配流程 -->
  <rect x="420" y="70" width="340" height="300" rx="8" fill="#161B22" stroke="#58A6FF" stroke-width="2"/>
  <text x="590" y="100" fill="#58A6FF" font-family="system-ui" font-size="16" font-weight="600" text-anchor="middle">分配流程</text>
  
  <!-- 步骤 1 -->
  <rect x="440" y="120" width="300" height="50" rx="6" fill="#1F2937" stroke="#30363D" stroke-width="1"/>
  <text x="590" y="145" fill="#79C0FF" font-family="system-ui" font-size="12" font-weight="600" text-anchor="middle">1. 程序请求内存</text>
  <text x="590" y="165" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="middle">malloc(sizeof(int))</text>
  
  <!-- 箭头 -->
  <line x1="590" y1="170" x2="590" y2="185" stroke="#30363D" stroke-width="1.5"/>
  <polygon points="590,185 584,173 596,173" fill="#30363D"/>
  
  <!-- 步骤 2 -->
  <rect x="440" y="185" width="300" height="50" rx="6" fill="#1F2937" stroke="#30363D" stroke-width="1"/>
  <text x="590" y="210" fill="#79C0FF" font-family="system-ui" font-size="12" font-weight="600" text-anchor="middle">2. 扫描空闲链表</text>
  <text x="590" y="230" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="middle">找到足够大的块</text>
  
  <!-- 箭头 -->
  <line x1="590" y1="235" x2="590" y2="250" stroke="#30363D" stroke-width="1.5"/>
  <polygon points="590,250 584,238 596,238" fill="#30363D"/>
  
  <!-- 步骤 3 -->
  <rect x="440" y="250" width="300" height="50" rx="6" fill="#1F2937" stroke="#30363D" stroke-width="1"/>
  <text x="590" y="275" fill="#79C0FF" font-family="system-ui" font-size="12" font-weight="600" text-anchor="middle">3. 标记为"使用中"</text>
  <text x="590" y="295" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="middle">更新元数据</text>
  
  <!-- 箭头 -->
  <line x1="590" y1="300" x2="590" y2="315" stroke="#30363D" stroke-width="1.5"/>
  <polygon points="590,315 584,303 596,303" fill="#30363D"/>
  
  <!-- 步骤 4 -->
  <rect x="440" y="315" width="300" height="50" rx="6" fill="#238636" fill-opacity="0.2" stroke="#7EE787" stroke-width="1.5"/>
  <text x="590" y="340" fill="#7EE787" font-family="system-ui" font-size="12" font-weight="600" text-anchor="middle">4. 返回指针</text>
  <text x="590" y="360" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="middle">int* p = malloc(...)</text>
  
  <!-- 释放流程 -->
  <rect x="40" y="290" width="340" height="180" rx="8" fill="#161B22" stroke="#FF7B72" stroke-width="2"/>
  <text x="210" y="320" fill="#FF7B72" font-family="system-ui" font-size="16" font-weight="600" text-anchor="middle">释放流程</text>
  
  <!-- 释放步骤 -->
  <rect x="60" y="340" width="300" height="35" rx="4" fill="#1F2937" stroke="#30363D" stroke-width="1"/>
  <text x="210" y="362" fill="#FFA198" font-family="monospace" font-size="11" text-anchor="middle">1. 调用 free(p)</text>
  
  <rect x="60" y="380" width="300" height="35" rx="4" fill="#1F2937" stroke="#30363D" stroke-width="1"/>
  <text x="210" y="402" fill="#FFA198" font-family="monospace" font-size="11" text-anchor="middle">2. 检查相邻块，尝试合并</text>
  
  <rect x="60" y="420" width="300" height="35" rx="4" fill="#1F2937" stroke="#30363D" stroke-width="1"/>
  <text x="210" y="442" fill="#FFA198" font-family="monospace" font-size="11" text-anchor="middle">3. 标记为"空闲"，加入链表</text>
  
  <!-- 底部说明 -->
  <rect x="40" y="490" width="720" height="50" rx="6" fill="#161B22" stroke="#30363D" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="400" y="515" fill="#8B949E" font-family="system-ui" font-size="12" font-weight="600" text-anchor="middle">为什么堆分配更慢？</text>
  <text x="400" y="535" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="middle">扫描链表 · 切分块 · 系统调用 · 线程同步</text>
</svg>
