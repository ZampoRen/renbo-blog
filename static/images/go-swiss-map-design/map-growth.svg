<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
<defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0D1117"/><stop offset="100%" stop-color="#13233A"/></linearGradient><filter id="glow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
<rect width="1200" height="760" rx="32" fill="url(#bg)"/>
<text x="70" y="92" fill="#E6EDF3" font-family="Arial, PingFang SC, sans-serif" font-size="42" font-weight="700">Go 的改造：多 table 增长</text>
<text x="70" y="137" fill="#8B949E" font-family="Arial, PingFang SC, sans-serif" font-size="22">extendible hashing 让 map 不必一次搬完整张大表</text>
<g transform="translate(90,205)"><rect width="260" height="280" rx="26" fill="#161B22" stroke="#30363D"/><text x="42" y="55" fill="#E6EDF3" font-family="Arial" font-size="26" font-weight="700">Map</text><rect x="50" y="95" width="160" height="50" rx="12" fill="#0D1117" stroke="#58A6FF"/><text x="86" y="128" fill="#58A6FF" font-family="Arial" font-size="20">directory</text><text x="50" y="190" fill="#8B949E" font-family="Arial" font-size="20">hash 高位</text><text x="50" y="225" fill="#8B949E" font-family="Arial" font-size="20">选择 table</text></g><path d="M360 345 L455 345" stroke="#58A6FF" stroke-width="5"/><g transform="translate(490,170)"><rect width="250" height="110" rx="20" fill="#10243A" stroke="#58A6FF"/><text x="60" y="63" fill="#E6EDF3" font-family="Arial" font-size="24">table 00</text><rect y="140" width="250" height="110" rx="20" fill="#10243A" stroke="#58A6FF"/><text x="60" y="203" fill="#E6EDF3" font-family="Arial" font-size="24">table 01</text><rect y="280" width="250" height="110" rx="20" fill="#10243A" stroke="#58A6FF"/><text x="60" y="343" fill="#E6EDF3" font-family="Arial" font-size="24">table 10</text></g><path d="M760 360 C820 320 850 300 905 260" fill="none" stroke="#7EE787" stroke-width="5"/><path d="M760 360 C820 400 850 420 905 460" fill="none" stroke="#7EE787" stroke-width="5"/><g transform="translate(930,195)"><rect width="180" height="90" rx="18" fill="#0D1117" stroke="#7EE787"/><text x="42" y="55" fill="#E6EDF3" font-family="Arial" font-size="22">split A</text><rect y="220" width="180" height="90" rx="18" fill="#0D1117" stroke="#7EE787"/><text x="42" y="275" fill="#E6EDF3" font-family="Arial" font-size="22">split B</text></g><text x="90" y="575" fill="#E6EDF3" font-family="Arial" font-size="30" font-weight="700">单 table 最多 1024，超过后分裂成多个 table</text><text x="90" y="623" fill="#8B949E" font-family="Arial" font-size="22">增长不是一次搬完整张大表，而是把增长压力拆小</text>
</svg>