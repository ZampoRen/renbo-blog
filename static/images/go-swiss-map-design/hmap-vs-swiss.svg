<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
<defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0D1117"/><stop offset="100%" stop-color="#13233A"/></linearGradient><filter id="glow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
<rect width="1200" height="760" rx="32" fill="url(#bg)"/>
<text x="70" y="92" fill="#E6EDF3" font-family="Arial, PingFang SC, sans-serif" font-size="42" font-weight="700">旧 hmap vs Swiss Table</text>
<text x="70" y="137" fill="#8B949E" font-family="Arial, PingFang SC, sans-serif" font-size="22">一个是 bucket 链出去，一个是在 table 内 probe</text>
<g transform="translate(70,205)"><rect width="500" height="330" rx="28" fill="#161B22" stroke="#30363D"/><text x="35" y="55" fill="#F0883E" font-family="Arial" font-size="28" font-weight="700">旧模型：bucket 链出去</text><rect x="55" y="105" width="140" height="70" rx="14" fill="#0D1117" stroke="#F0883E"/><text x="83" y="148" fill="#E6EDF3" font-family="Arial" font-size="22">bucket</text><path d="M200 140 L270 140" stroke="#8B949E" stroke-width="4"/><rect x="290" y="105" width="150" height="70" rx="14" fill="#0D1117" stroke="#DB6D28"/><text x="314" y="148" fill="#E6EDF3" font-family="Arial" font-size="22">overflow</text><text x="55" y="235" fill="#8B949E" font-family="Arial" font-size="22">冲突多了，路径变长</text><text x="55" y="275" fill="#8B949E" font-family="Arial" font-size="22">更多指针追踪</text></g><g transform="translate(630,205)"><rect width="500" height="330" rx="28" fill="#10243A" stroke="#58A6FF"/><text x="35" y="55" fill="#58A6FF" font-family="Arial" font-size="28" font-weight="700">Swiss：在表内探下去</text><rect x="55" y="105" width="95" height="70" rx="14" fill="#0D1117" stroke="#58A6FF"/><text x="76" y="148" fill="#E6EDF3" font-family="Arial" font-size="20">grp</text><path d="M155 140 L210 140" stroke="#8B949E" stroke-width="4"/><rect x="230" y="105" width="95" height="70" rx="14" fill="#0D1117" stroke="#58A6FF"/><text x="251" y="148" fill="#E6EDF3" font-family="Arial" font-size="20">grp</text><path d="M330 140 L385 140" stroke="#8B949E" stroke-width="4"/><rect x="405" y="105" width="70" height="70" rx="14" fill="#0D1117" stroke="#58A6FF"/><text x="424" y="148" fill="#E6EDF3" font-family="Arial" font-size="20">...</text><text x="55" y="235" fill="#8B949E" font-family="Arial" font-size="22">control word 先筛</text><text x="55" y="275" fill="#8B949E" font-family="Arial" font-size="22">连续 group 更紧凑</text></g><text x="70" y="610" fill="#E6EDF3" font-family="Arial" font-size="30" font-weight="700">不是旧图换标题，而是冲突处理方式变了</text>
</svg>