<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
<defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0D1117"/><stop offset="100%" stop-color="#13233A"/></linearGradient><filter id="glow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
<rect width="1200" height="760" rx="32" fill="url(#bg)"/>
<text x="70" y="92" fill="#E6EDF3" font-family="Arial, PingFang SC, sans-serif" font-size="42" font-weight="700">Swiss Table 结构</text>
<text x="70" y="137" fill="#8B949E" font-family="Arial, PingFang SC, sans-serif" font-size="22">8 slots + control word：先筛候选，再比较 key</text>
<g transform="translate(90,215)"><rect width="1020" height="260" rx="30" fill="#161B22" stroke="#30363D"/><text x="35" y="55" fill="#58A6FF" font-family="Arial" font-size="26" font-weight="700">Group：8 个 slot</text><rect x="35" y="90" width="920" height="58" rx="12" fill="#0D1117" stroke="#58A6FF"/><text x="58" y="128" fill="#8B949E" font-family="Menlo" font-size="20">ctrl</text><text x="155" y="128" fill="#7EE787" font-family="Menlo" font-size="20">H2</text><text x="255" y="128" fill="#7EE787" font-family="Menlo" font-size="20">H2</text><text x="355" y="128" fill="#F0883E" font-family="Menlo" font-size="20">empty</text><text x="515" y="128" fill="#7EE787" font-family="Menlo" font-size="20">H2</text><text x="635" y="128" fill="#DB6D28" font-family="Menlo" font-size="20">del</text><text x="735" y="128" fill="#7EE787" font-family="Menlo" font-size="20">H2</text><text x="835" y="128" fill="#7EE787" font-family="Menlo" font-size="20">H2</text><text x="55" y="214" fill="#E6EDF3" font-family="Arial" font-size="24">slot0</text><text x="170" y="214" fill="#E6EDF3" font-family="Arial" font-size="24">slot1</text><text x="285" y="214" fill="#E6EDF3" font-family="Arial" font-size="24">slot2</text><text x="400" y="214" fill="#E6EDF3" font-family="Arial" font-size="24">slot3</text><text x="515" y="214" fill="#E6EDF3" font-family="Arial" font-size="24">slot4</text><text x="630" y="214" fill="#E6EDF3" font-family="Arial" font-size="24">slot5</text><text x="745" y="214" fill="#E6EDF3" font-family="Arial" font-size="24">slot6</text><text x="860" y="214" fill="#E6EDF3" font-family="Arial" font-size="24">slot7</text></g><text x="110" y="555" fill="#E6EDF3" font-family="Arial" font-size="30" font-weight="700">先用 7 位 hash 批量筛候选，再做真正 key 比较</text><text x="110" y="603" fill="#8B949E" font-family="Arial" font-size="22">一眼看 8 个 slot，大多数完整 key 比较根本不用发生</text>
</svg>