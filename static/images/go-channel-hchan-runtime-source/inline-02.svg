<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#07111f"/>
  <text x="600" y="80" fill="#ffffff" font-size="38" font-family="Arial, Helvetica, sans-serif" font-weight="800" text-anchor="middle">send / recv 的五条路</text>
  <text x="600" y="120" fill="#8da5b2" font-size="22" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">优先找等待者，其次看 buffer，最后才挂起当前 goroutine</text>
  <g transform="translate(80 180)">
    <rect x="0" y="0" width="500" height="455" rx="28" fill="#0c1b2a" stroke="#43a9c7" stroke-width="2"/>
    <text x="250" y="55" fill="#7de4ff" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="700" text-anchor="middle">chansend</text>
    <text x="70" y="118" fill="#dff8ff" font-size="23" font-family="Arial, Helvetica, sans-serif">1. nil channel：永久阻塞</text>
    <text x="70" y="178" fill="#dff8ff" font-size="23" font-family="Arial, Helvetica, sans-serif">2. recvq 有等待者：直接交付</text>
    <text x="70" y="238" fill="#dff8ff" font-size="23" font-family="Arial, Helvetica, sans-serif">3. buffer 有空间：写入 sendx</text>
    <text x="70" y="298" fill="#dff8ff" font-size="23" font-family="Arial, Helvetica, sans-serif">4. 非阻塞：返回 false</text>
    <text x="70" y="358" fill="#dff8ff" font-size="23" font-family="Arial, Helvetica, sans-serif">5. 普通阻塞：入 sendq</text>
  </g>
  <g transform="translate(620 180)">
    <rect x="0" y="0" width="500" height="455" rx="28" fill="#0c1b2a" stroke="#52c98d" stroke-width="2"/>
    <text x="250" y="55" fill="#b9ffd9" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="700" text-anchor="middle">chanrecv</text>
    <text x="70" y="118" fill="#e5fff0" font-size="23" font-family="Arial, Helvetica, sans-serif">1. nil channel：永久阻塞</text>
    <text x="70" y="178" fill="#e5fff0" font-size="23" font-family="Arial, Helvetica, sans-serif">2. closed 且空：零值，ok=false</text>
    <text x="70" y="238" fill="#e5fff0" font-size="23" font-family="Arial, Helvetica, sans-serif">3. sendq 有等待者：配对接收</text>
    <text x="70" y="298" fill="#e5fff0" font-size="23" font-family="Arial, Helvetica, sans-serif">4. buffer 有数据：读取 recvx</text>
    <text x="70" y="358" fill="#e5fff0" font-size="23" font-family="Arial, Helvetica, sans-serif">5. 普通阻塞：入 recvq</text>
  </g>
  <path d="M580 405 C600 385, 600 385, 620 405" fill="none" stroke="#ffcc66" stroke-width="3"/>
  <circle cx="600" cy="405" r="16" fill="#ffcc66"/>
  <text x="600" y="412" fill="#07111f" font-size="19" font-family="Arial, Helvetica, sans-serif" font-weight="800" text-anchor="middle">G</text>
  <rect x="240" y="665" width="720" height="56" rx="18" fill="#0f2332" stroke="#2d7892"/>
  <text x="600" y="701" fill="#dff8ff" font-size="22" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">真正的阻塞，是把当前 G 包成 sudog 挂进等待队列</text>
</svg>
