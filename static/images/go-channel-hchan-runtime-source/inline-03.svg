<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#07111f"/>
  <text x="600" y="82" fill="#ffffff" font-size="38" font-family="Arial, Helvetica, sans-serif" font-weight="800" text-anchor="middle">close(ch)：批量唤醒，不只是设置 closed</text>
  <text x="600" y="122" fill="#8da5b2" font-size="22" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">recvq 和 sendq 都会被清空，锁释放后再 goready</text>
  <g transform="translate(90 190)">
    <rect x="0" y="0" width="300" height="300" rx="26" fill="#132a26" stroke="#52c98d" stroke-width="2"/>
    <text x="150" y="52" fill="#dfffe9" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="700" text-anchor="middle">recvq</text>
    <circle cx="83" cy="120" r="30" fill="#1f5e42" stroke="#8ff0bd"/>
    <circle cx="150" cy="120" r="30" fill="#1f5e42" stroke="#8ff0bd"/>
    <circle cx="217" cy="120" r="30" fill="#1f5e42" stroke="#8ff0bd"/>
    <text x="150" y="215" fill="#c9f8dc" font-size="22" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">醒来：零值 + ok=false</text>
  </g>
  <g transform="translate(810 190)">
    <rect x="0" y="0" width="300" height="300" rx="26" fill="#30231e" stroke="#ffb36a" stroke-width="2"/>
    <text x="150" y="52" fill="#ffe4c2" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="700" text-anchor="middle">sendq</text>
    <circle cx="83" cy="120" r="30" fill="#6a3c24" stroke="#ffc183"/>
    <circle cx="150" cy="120" r="30" fill="#6a3c24" stroke="#ffc183"/>
    <circle cx="217" cy="120" r="30" fill="#6a3c24" stroke="#ffc183"/>
    <text x="150" y="215" fill="#ffe2bd" font-size="22" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">醒来：send panic</text>
  </g>
  <g transform="translate(455 230)">
    <rect x="0" y="0" width="290" height="220" rx="30" fill="#0c1b2a" stroke="#7de4ff" stroke-width="2"/>
    <text x="145" y="62" fill="#7de4ff" font-size="32" font-family="Arial, Helvetica, sans-serif" font-weight="800" text-anchor="middle">closechan</text>
    <text x="145" y="112" fill="#dff8ff" font-size="22" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">closed = 1</text>
    <text x="145" y="154" fill="#dff8ff" font-size="22" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">push into glist</text>
    <text x="145" y="196" fill="#dff8ff" font-size="22" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">unlock → goready</text>
  </g>
  <path d="M390 335 L455 335" stroke="#52c98d" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M745 335 L810 335" stroke="#ffb36a" stroke-width="4" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#dff8ff"/></marker></defs>
  <rect x="190" y="620" width="820" height="58" rx="18" fill="#0f2332" stroke="#2d7892"/>
  <text x="600" y="657" fill="#dff8ff" font-size="22" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">close 不是让阻塞者继续等，而是把它们全部放回可运行队列</text>
</svg>
