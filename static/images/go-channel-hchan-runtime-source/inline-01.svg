<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#07111f"/>
  <text x="600" y="82" fill="#ffffff" font-size="38" font-family="Arial, Helvetica, sans-serif" font-weight="800" text-anchor="middle">hchan：一个 channel 的运行时形状</text>
  <text x="600" y="123" fill="#8da5b2" font-size="22" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">buffer、等待队列和锁一起决定 goroutine 怎么走</text>
  <rect x="110" y="180" width="980" height="420" rx="32" fill="#0c1b2a" stroke="#2e7590" stroke-width="2"/>
  <text x="150" y="235" fill="#7de4ff" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="700">hchan</text>
  <g transform="translate(150 285)">
    <rect x="0" y="0" width="520" height="120" rx="22" fill="#10283a" stroke="#43a9c7" stroke-width="2"/>
    <text x="260" y="38" fill="#dff8ff" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700" text-anchor="middle">环形缓冲区 buf</text>
    <g transform="translate(58 62)">
      <rect x="0" y="0" width="62" height="34" rx="8" fill="#193d55" stroke="#7de4ff"/>
      <rect x="70" y="0" width="62" height="34" rx="8" fill="#193d55" stroke="#7de4ff"/>
      <rect x="140" y="0" width="62" height="34" rx="8" fill="#193d55" stroke="#7de4ff"/>
      <rect x="210" y="0" width="62" height="34" rx="8" fill="#193d55" stroke="#7de4ff"/>
      <rect x="280" y="0" width="62" height="34" rx="8" fill="#193d55" stroke="#7de4ff"/>
      <rect x="350" y="0" width="62" height="34" rx="8" fill="#193d55" stroke="#7de4ff"/>
    </g>
  </g>
  <rect x="720" y="285" width="300" height="120" rx="22" fill="#1b2a20" stroke="#52c98d" stroke-width="2"/>
  <text x="870" y="335" fill="#dfffe9" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="700" text-anchor="middle">recvq</text>
  <text x="870" y="372" fill="#b9d8c5" font-size="18" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">等待接收的 sudog 链表</text>
  <rect x="720" y="435" width="300" height="120" rx="22" fill="#30231e" stroke="#ffb36a" stroke-width="2"/>
  <text x="870" y="485" fill="#ffe4c2" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="700" text-anchor="middle">sendq</text>
  <text x="870" y="522" fill="#e2c2a3" font-size="18" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">等待发送的 sudog 链表</text>
  <rect x="150" y="435" width="245" height="120" rx="22" fill="#182433" stroke="#8aa4b5" stroke-width="2"/>
  <text x="272" y="484" fill="#e2eef5" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700" text-anchor="middle">sendx / recvx</text>
  <text x="272" y="522" fill="#b8c7d1" font-size="18" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">环形队列读写位置</text>
  <rect x="425" y="435" width="245" height="120" rx="22" fill="#28251b" stroke="#e4c15d" stroke-width="2"/>
  <text x="548" y="484" fill="#ffe9a6" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700" text-anchor="middle">lock mutex</text>
  <text x="548" y="522" fill="#d6c896" font-size="18" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">保护 hchan 和等待者字段</text>
  <rect x="210" y="642" width="780" height="56" rx="18" fill="#0f2332" stroke="#2d7892"/>
  <text x="600" y="678" fill="#dff8ff" font-size="22" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">channel 的核心不是“队列”，而是队列、锁和 goroutine 调度的组合</text>
</svg>
