<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="680" rx="28" fill="#0F172A"/>
  <text x="70" y="82" fill="#F8FAFC" font-size="34" font-weight="700" font-family="Arial, PingFang SC, Microsoft YaHei">一条经常被忽略的主线：AI 不是凭空冒出来的</text>
  <text x="70" y="122" fill="#94A3B8" font-size="20" font-family="Arial, PingFang SC, Microsoft YaHei">真空管把“开”和“关”做成电子计算，晶体管把它缩小，芯片把它批量化，GPU 再把并行算力堆到极致。</text>
  <path d="M130 360H1070" stroke="#334155" stroke-width="6" stroke-linecap="round"/>
  <g>
    <circle cx="165" cy="360" r="58" fill="#13203C" stroke="#5EEAD4" stroke-width="3"/>
    <rect x="144" y="327" width="16" height="60" rx="8" fill="#E2E8F0"/>
    <rect x="169" y="317" width="16" height="80" rx="8" fill="#A5B4FC"/>
    <text x="165" y="453" fill="#F8FAFC" font-size="24" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei">真空管</text>
    <text x="165" y="487" fill="#94A3B8" font-size="18" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei">大、热、耗电</text>
  </g>
  <g>
    <circle cx="390" cy="360" r="58" fill="#13203C" stroke="#60A5FA" stroke-width="3"/>
    <circle cx="390" cy="360" r="15" fill="#93C5FD"/>
    <line x1="350" y1="360" x2="375" y2="360" stroke="#BFDBFE" stroke-width="5"/>
    <line x1="405" y1="360" x2="430" y2="360" stroke="#BFDBFE" stroke-width="5"/>
    <line x1="390" y1="385" x2="390" y2="410" stroke="#BFDBFE" stroke-width="5"/>
    <text x="390" y="453" fill="#F8FAFC" font-size="24" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei">晶体管</text>
    <text x="390" y="487" fill="#94A3B8" font-size="18" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei">更小、更稳、可批量堆叠</text>
  </g>
  <g>
    <circle cx="620" cy="360" r="58" fill="#13203C" stroke="#818CF8" stroke-width="3"/>
    <rect x="587" y="330" width="66" height="60" rx="10" fill="#1E293B" stroke="#C4B5FD" stroke-width="2"/>
    <path d="M596 330V310M610 330V310M624 330V310M638 330V310M596 390V410M610 390V410M624 390V410M638 390V410M587 341H567M587 362H567M653 341H673M653 362H673" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round"/>
    <text x="620" y="453" fill="#F8FAFC" font-size="24" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei">芯片</text>
    <text x="620" y="487" fill="#94A3B8" font-size="18" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei">几十亿个开关装进一块硅片</text>
  </g>
  <g>
    <circle cx="850" cy="360" r="58" fill="#13203C" stroke="#A78BFA" stroke-width="3"/>
    <rect x="815" y="326" width="70" height="68" rx="10" fill="#1E293B"/>
    <g fill="#DDD6FE">
      <circle cx="832" cy="344" r="5"/><circle cx="850" cy="344" r="5"/><circle cx="868" cy="344" r="5"/>
      <circle cx="832" cy="362" r="5"/><circle cx="850" cy="362" r="5"/><circle cx="868" cy="362" r="5"/>
      <circle cx="832" cy="380" r="5"/><circle cx="850" cy="380" r="5"/><circle cx="868" cy="380" r="5"/>
    </g>
    <text x="850" y="453" fill="#F8FAFC" font-size="24" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei">GPU</text>
    <text x="850" y="487" fill="#94A3B8" font-size="18" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei">把并行算力推成基础设施</text>
  </g>
  <g>
    <circle cx="1035" cy="360" r="58" fill="#13203C" stroke="#F472B6" stroke-width="3"/>
    <path d="M1004 385C1018 357 1028 345 1036 345C1044 345 1056 358 1068 385" stroke="#F9A8D4" stroke-width="5" stroke-linecap="round"/>
    <circle cx="1018" cy="339" r="9" fill="#F9A8D4"/>
    <circle cx="1051" cy="339" r="9" fill="#F9A8D4"/>
    <circle cx="1035" cy="314" r="9" fill="#F9A8D4"/>
    <text x="1035" y="453" fill="#F8FAFC" font-size="24" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei">大模型</text>
    <text x="1035" y="487" fill="#94A3B8" font-size="18" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei">软件热潮踩在硬件积累上</text>
  </g>
  <text x="70" y="582" fill="#E2E8F0" font-size="22" font-family="Arial, PingFang SC, Microsoft YaHei">
    <tspan x="70" dy="0">结论：今天 AI 热得发烫，不是因为硬件突然变重要，</tspan>
    <tspan x="70" dy="34">而是因为软件第一次把这条硬件演进链的价值放大到所有人都看见。</tspan>
  </text>
</svg>