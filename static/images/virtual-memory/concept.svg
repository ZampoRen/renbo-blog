<svg width="900" height="383" viewBox="0 0 900 383" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="900" height="383" fill="#0D1117"/>
  
  <!-- 网格线 -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1F2937" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="900" height="383" fill="url(#grid)"/>
  
  <!-- 左侧：物理 RAM -->
  <rect x="100" y="100" width="250" height="180" rx="8" fill="#161B22" stroke="#58A6FF" stroke-width="2"/>
  <text x="225" y="135" fill="#58A6FF" font-family="system-ui" font-size="16" font-weight="600" text-anchor="middle">物理 RAM</text>
  <text x="225" y="160" fill="#79C0FF" font-family="monospace" font-size="14" text-anchor="middle">8GB / 16GB</text>
  
  <!-- RAM 内部页面 -->
  <rect x="130" y="180" width="60" height="60" rx="4" fill="#1F6FEB" fill-opacity="0.3" stroke="#58A6FF" stroke-width="1.5"/>
  <text x="160" y="215" fill="#79C0FF" font-family="monospace" font-size="10" text-anchor="middle">Frame 1</text>
  
  <rect x="200" y="180" width="60" height="60" rx="4" fill="#1F6FEB" fill-opacity="0.3" stroke="#58A6FF" stroke-width="1.5"/>
  <text x="230" y="215" fill="#79C0FF" font-family="monospace" font-size="10" text-anchor="middle">Frame 2</text>
  
  <rect x="270" y="180" width="60" height="60" rx="4" fill="#1F6FEB" fill-opacity="0.3" stroke="#58A6FF" stroke-width="1.5"/>
  <text x="300" y="215" fill="#79C0FF" font-family="monospace" font-size="10" text-anchor="middle">Frame 3</text>
  
  <text x="225" y="270" fill="#8B949E" font-family="monospace" font-size="11" text-anchor="middle">快速访问 (~100ns)</text>
  
  <!-- 中间：页表映射 -->
  <rect x="380" y="100" width="140" height="180" rx="8" fill="#161B22" stroke="#D2A8FF" stroke-width="2"/>
  <text x="450" y="135" fill="#D2A8FF" font-family="system-ui" font-size="14" font-weight="600" text-anchor="middle">页表</text>
  
  <!-- 映射箭头 -->
  <path d="M 350 210 L 375 210" stroke="#D2A8FF" stroke-width="1.5" stroke-dasharray="4,4"/>
  <polygon points="375,210 365,205 365,215" fill="#D2A8FF"/>
  
  <path d="M 520 210 L 545 210" stroke="#D2A8FF" stroke-width="1.5" stroke-dasharray="4,4"/>
  <polygon points="545,210 535,205 535,215" fill="#D2A8FF"/>
  
  <text x="450" y="170" fill="#79C0FF" font-family="monospace" font-size="10" text-anchor="middle">Page 1 → Frame 2</text>
  <text x="450" y="195" fill="#79C0FF" font-family="monospace" font-size="10" text-anchor="middle">Page 2 → Swap</text>
  <text x="450" y="220" fill="#79C0FF" font-family="monospace" font-size="10" text-anchor="middle">Page 3 → Frame 1</text>
  <text x="450" y="245" fill="#79C0FF" font-family="monospace" font-size="10" text-anchor="middle">Page 4 → Frame 3</text>
  <text x="450" y="270" fill="#8B949E" font-family="monospace" font-size="9" text-anchor="middle">虚拟→物理映射</text>
  
  <!-- 右侧：磁盘交换空间 -->
  <rect x="550" y="100" width="250" height="180" rx="8" fill="#161B22" stroke="#F0883E" stroke-width="2"/>
  <text x="675" y="135" fill="#F0883E" font-family="system-ui" font-size="16" font-weight="600" text-anchor="middle">交换空间 (Swap)</text>
  <text x="675" y="160" fill="#F0883E" font-family="monospace" font-size="14" text-anchor="middle">磁盘存储</text>
  
  <!-- 磁盘页面 -->
  <rect x="580" y="180" width="60" height="60" rx="4" fill="#D29922" fill-opacity="0.3" stroke="#F0883E" stroke-width="1.5"/>
  <text x="610" y="215" fill="#F0883E" font-family="monospace" font-size="10" text-anchor="middle">Page 2</text>
  
  <rect x="650" y="180" width="60" height="60" rx="4" fill="#D29922" fill-opacity="0.3" stroke="#F0883E" stroke-width="1.5"/>
  <text x="680" y="215" fill="#F0883E" font-family="monospace" font-size="10" text-anchor="middle">Page 5</text>
  
  <rect x="720" y="180" width="60" height="60" rx="4" fill="#D29922" fill-opacity="0.3" stroke="#F0883E" stroke-width="1.5"/>
  <text x="750" y="215" fill="#F0883E" font-family="monospace" font-size="10" text-anchor="middle">Page 6</text>
  
  <text x="675" y="270" fill="#8B949E" font-family="monospace" font-size="11" text-anchor="middle">慢速访问 (~100μs)</text>
  
  <!-- 底部标题 -->
  <text x="450" y="320" fill="#C9D1D9" font-family="system-ui" font-size="20" font-weight="700" text-anchor="middle">虚拟内存：用磁盘模拟 RAM</text>
  <text x="450" y="350" fill="#8B949E" font-family="monospace" font-size="12" text-anchor="middle">你的 8GB RAM 能跑 10GB 负载，这不是魔法</text>
  
  <!-- 装饰性元素 -->
  <circle cx="100" cy="350" r="20" fill="#1F6FEB" fill-opacity="0.2" stroke="#58A6FF" stroke-width="1"/>
  <circle cx="800" cy="350" r="20" fill="#D29922" fill-opacity="0.2" stroke="#F0883E" stroke-width="1"/>
</svg>
