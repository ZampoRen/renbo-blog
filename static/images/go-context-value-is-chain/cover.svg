<svg xmlns="http://www.w3.org/2000/svg" width="900" height="383" viewBox="0 0 900 383">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="383" rx="0" fill="url(#bg)"/>
  <circle cx="120" cy="84" r="90" fill="#1e293b" opacity="0.45"/>
  <circle cx="780" cy="320" r="120" fill="#0f766e" opacity="0.18"/>

  <g transform="translate(58 92)">
    <path d="M86 66 C145 12 220 12 279 66" stroke="#334155" stroke-width="3" fill="none"/>
    <path d="M279 66 C338 120 413 120 472 66" stroke="#334155" stroke-width="3" fill="none"/>
    <path d="M86 152 C145 206 220 206 279 152" stroke="#334155" stroke-width="3" fill="none"/>
    <path d="M279 152 C338 98 413 98 472 152" stroke="#334155" stroke-width="3" fill="none"/>

    <g filter="url(#glow)">
      <circle cx="86" cy="66" r="30" fill="#0f172a" stroke="#38bdf8" stroke-width="3"/>
      <circle cx="279" cy="66" r="30" fill="#0f172a" stroke="#22c55e" stroke-width="3"/>
      <circle cx="472" cy="66" r="30" fill="#0f172a" stroke="#38bdf8" stroke-width="3"/>
      <circle cx="86" cy="152" r="30" fill="#0f172a" stroke="#22c55e" stroke-width="3"/>
      <circle cx="279" cy="152" r="30" fill="#0f172a" stroke="#38bdf8" stroke-width="3"/>
      <circle cx="472" cy="152" r="30" fill="#0f172a" stroke="#22c55e" stroke-width="3"/>
    </g>
    <text x="86" y="71" text-anchor="middle" fill="#e0f2fe" font-size="15" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">key</text>
    <text x="279" y="71" text-anchor="middle" fill="#dcfce7" font-size="15" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">val</text>
    <text x="472" y="71" text-anchor="middle" fill="#e0f2fe" font-size="15" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">parent</text>
    <text x="86" y="157" text-anchor="middle" fill="#dcfce7" font-size="15" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">ctx</text>
    <text x="279" y="157" text-anchor="middle" fill="#e0f2fe" font-size="15" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">next</text>
    <text x="472" y="157" text-anchor="middle" fill="#dcfce7" font-size="15" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">root</text>
  </g>

  <g transform="translate(565 98)">
    <rect x="0" y="0" width="280" height="174" rx="22" fill="#0f172a" stroke="#334155" stroke-width="2" opacity="0.92"/>
    <text x="28" y="51" fill="#f8fafc" font-size="34" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">不是 map</text>
    <text x="28" y="96" fill="#2dd4bf" font-size="38" font-weight="800" font-family="PingFang SC,Hiragino Sans GB,Heiti SC,Arial Unicode MS,sans-serif">是一条链</text>
    <text x="29" y="136" fill="#94a3b8" font-size="18" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">WithValue 的查找路径</text>
