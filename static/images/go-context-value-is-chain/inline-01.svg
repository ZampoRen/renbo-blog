<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="600" y="92" text-anchor="middle" fill="#f8fafc" font-size="40" font-weight="800" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">valueCtx 是一层层包出来的</text>
  <text x="600" y="138" text-anchor="middle" fill="#94a3b8" font-size="22" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">取值时先看当前层，不匹配才继续往 parent 找</text>

  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <rect x="90" y="250" width="220" height="170" rx="22" fill="#0b1220" stroke="#38bdf8" stroke-width="3"/>
    <text x="200" y="306" text-anchor="middle" fill="#e0f2fe" font-size="28" font-weight="700">valueCtx</text>
    <text x="200" y="354" text-anchor="middle" fill="#bae6fd" font-size="22">key=user</text>
    <text x="200" y="389" text-anchor="middle" fill="#94a3b8" font-size="18">当前层先检查</text>

    <line x1="325" y1="335" x2="440" y2="335" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="382" y="312" text-anchor="middle" fill="#94a3b8" font-size="18">不匹配</text>

    <rect x="455" y="250" width="220" height="170" rx="22" fill="#0b1220" stroke="#22c55e" stroke-width="3"/>
    <text x="565" y="306" text-anchor="middle" fill="#dcfce7" font-size="28" font-weight="700">valueCtx</text>
    <text x="565" y="354" text-anchor="middle" fill="#bbf7d0" font-size="22">key=trace</text>
    <text x="565" y="389" text-anchor="middle" fill="#94a3b8" font-size="18">继续往父级找</text>

    <line x1="690" y1="335" x2="805" y2="335" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="747" y="312" text-anchor="middle" fill="#94a3b8" font-size="18">再不匹配</text>

    <rect x="820" y="250" width="220" height="170" rx="22" fill="#0b1220" stroke="#38bdf8" stroke-width="3"/>
    <text x="930" y="306" text-anchor="middle" fill="#e0f2fe" font-size="28" font-weight="700">cancelCtx</text>
    <text x="930" y="354" text-anchor="middle" fill="#bae6fd" font-size="22">Done / Err</text>
    <text x="930" y="389" text-anchor="middle" fill="#94a3b8" font-size="18">生命周期节点</text>

    <line x1="930" y1="435" x2="930" y2="520" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>

    <rect x="770" y="540" width="320" height="86" rx="18" fill="#111827" stroke="#475569" stroke-width="2"/>
    <text x="930" y="594" text-anchor="middle" fill="#cbd5e1" font-size="24">Background / TODO</text>
  </g>

  <rect x="130" y="645" width="940" height="58" rx="18" fill="#0b1220" stroke="#334155" stroke-width="2"/>
  <text x="600" y="682" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">函数签名变短，不等于依赖变少；依赖藏进 Value，排查会变暗。</text>
</svg>
