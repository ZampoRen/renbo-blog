<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fafafa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg3)"/>
  
  <!-- Title -->
  <text x="400" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#333333" text-anchor="middle">Render vs Commit：两阶段</text>
  
  <!-- Render Phase -->
  <rect x="50" y="70" width="340" height="340" rx="8" fill="#e8f4f8" stroke="#4a90a4" stroke-width="2"/>
  <text x="220" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#4a90a4" text-anchor="middle">Render 阶段</text>
  
  <line x1="80" y1="125" x2="360" y2="125" stroke="#4a90a4" stroke-width="1" opacity="0.3"/>
  
  <text x="80" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#333333">✓ 计算 UI 应该长什么样</text>
  <text x="80" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#333333">✓ 执行组件函数</text>
  <text x="80" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#333333">✓ 生成 React element 树</text>
  <text x="80" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#333333">✓ 对比新旧差异</text>
  
  <rect x="70" y="300" width="300" height="80" rx="4" fill="#ffffff" opacity="0.6"/>
  <text x="220" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#4a90a4" text-anchor="middle" font-weight="bold">算账</text>
  <text x="220" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#666666" text-anchor="middle">准备阶段，不动 DOM</text>
  
  <!-- Arrow -->
  <path d="M 400 240 L 440 240" stroke="#666666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
  </defs>
  
  <!-- Commit Phase -->
  <rect x="450" y="70" width="300" height="340" rx="8" fill="#fde8ec" stroke="#e94560" stroke-width="2"/>
  <text x="600" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#e94560" text-anchor="middle">Commit 阶段</text>
  
  <line x1="480" y1="125" x2="720" y2="125" stroke="#e94560" stroke-width="1" opacity="0.3"/>
  
  <text x="480" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#333333">✓ 应用计算结果到 DOM</text>
  <text x="480" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#333333">✓ 执行 useEffect</text>
  <text x="480" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#333333">✓ 触发浏览器重绘</text>
  
  <rect x="470" y="300" width="260" height="80" rx="4" fill="#ffffff" opacity="0.6"/>
  <text x="600" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#e94560" text-anchor="middle" font-weight="bold">付款</text>
  <text x="600" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#666666" text-anchor="middle">真正落地，执行副作用</text>
  
  <!-- Bottom tagline -->
  <text x="400" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#888888" text-anchor="middle">Render 是准备，Commit 才是执行</text>
</svg>
