<svg width="900" height="383" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wrongGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c73e54;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rightGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="383" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="450" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">React 心智模型</text>
  <text x="450" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a0a0a0" text-anchor="middle">很多人把它学反了</text>
  
  <!-- Left: Wrong Way -->
  <rect x="60" y="120" width="360" height="200" rx="8" fill="url(#wrongGrad)" opacity="0.15"/>
  <rect x="60" y="120" width="4" height="200" rx="2" fill="#e94560"/>
  <text x="80" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#e94560">❌ 学反了</text>
  <text x="80" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#c0c0c0">• 先背 hook API</text>
  <text x="80" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#c0c0c0">• useEffect 当垃圾桶</text>
  <text x="80" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#c0c0c0">• 虚拟 DOM 当核心</text>
  <text x="80" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#c0c0c0">• Context 当万能状态管理</text>
  <text x="80" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#808080" font-style="italic">结果：会写，但说不清在解决什么</text>
  
  <!-- Right: Right Way -->
  <rect x="480" y="120" width="360" height="200" rx="8" fill="url(#rightGrad)" opacity="0.15"/>
  <rect x="480" y="120" width="4" height="200" rx="2" fill="#4ade80"/>
  <text x="500" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#4ade80">✓ 学对了</text>
  <text x="500" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#c0c0c0">• UI 是状态的函数</text>
  <text x="500" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#c0c0c0">• 组件是函数</text>
  <text x="500" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#c0c0c0">• Render/Commit 分开</text>
  <text x="500" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#c0c0c0">• Effect 是副作用出口</text>
  <text x="500" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#808080" font-style="italic">结果：UI 变成可推理的事</text>
  
  <!-- Bottom tagline -->
  <text x="450" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#606060" text-anchor="middle">不是 API 清单，是思维方式</text>
</svg>
