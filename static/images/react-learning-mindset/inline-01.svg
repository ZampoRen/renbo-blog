<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8e8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg2)"/>
  
  <!-- Title -->
  <text x="400" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#333333" text-anchor="middle">命令式 vs 声明式 UI</text>
  
  <!-- Left: Imperative -->
  <rect x="50" y="80" width="340" height="380" rx="8" fill="#ffffff" stroke="#e94560" stroke-width="2"/>
  <text x="220" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#e94560" text-anchor="middle">❌ 命令式（React 之前）</text>
  
  <text x="70" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#666666">你告诉浏览器"怎么改"</text>
  
  <rect x="70" y="185" width="300" height="50" rx="4" fill="#fff0f0"/>
  <text x="85" y="210" font-family="monospace" font-size="11" fill="#333333">const el = document.getElementById('app')</text>
  <text x="85" y="225" font-family="monospace" font-size="11" fill="#333333">el.textContent = state.message</text>
  
  <rect x="70" y="255" width="300" height="50" rx="4" fill="#fff0f0"/>
  <text x="85" y="280" font-family="monospace" font-size="11" fill="#333333">el.addEventListener('click', () => {</text>
  <text x="85" y="295" font-family="monospace" font-size="11" fill="#333333">  state.count++</text>
  
  <text x="70" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888888">问题：代码一多，更新路径失控</text>
  <rect x="70" y="365" width="300" height="70" rx="4" fill="#fff0f0" stroke="#e94560" stroke-width="1"/>
  <text x="85" y="387" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#c73e54">• 哪个节点该更新？</text>
  <text x="85" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#c73e54">• 谁先谁后？</text>
  <text x="85" y="423" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#c73e54">• 状态同步容易乱</text>
  
  <!-- Right: Declarative -->
  <rect x="410" y="80" width="340" height="380" rx="8" fill="#ffffff" stroke="#4ade80" stroke-width="2"/>
  <text x="580" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#4ade80" text-anchor="middle">✓ 声明式（React）</text>
  
  <text x="430" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#666666">你描述"应该是什么"</text>
  
  <rect x="430" y="185" width="300" height="80" rx="4" fill="#f0fff4"/>
  <text x="445" y="210" font-family="monospace" font-size="11" fill="#333333">function App() {</text>
  <text x="445" y="225" font-family="monospace" font-size="11" fill="#333333">  return &lt;div&gt;{state.message}&lt;/div&gt;</text>
  <text x="445" y="240" font-family="monospace" font-size="11" fill="#333333">}</text>
  <text x="445" y="255" font-family="monospace" font-size="11" fill="#333333">// UI = f(state)</text>
  
  <text x="430" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888888">React 负责把 DOM 调整成结果</text>
  <rect x="430" y="325" width="300" height="110" rx="4" fill="#f0fff4" stroke="#4ade80" stroke-width="1"/>
  <text x="445" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#22c55e">• 你只关心状态 → UI 映射</text>
  <text x="445" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#22c55e">• React 处理 DOM 更新</text>
  <text x="445" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#22c55e">• 更新路径可控</text>
  <text x="445" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#22c55e">• 状态同步清晰</text>
  
  <!-- Bottom note -->
  <text x="400" y="485" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#999999" text-anchor="middle">React：界面应该是应用状态的函数</text>
</svg>
