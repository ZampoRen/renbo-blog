<text x="125" y="598" fill="#CBD5E1" font-size="28" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">更稳的路径：先连接，再注入 user_id，再 SET ROLE 到 visitor，让数据库接管最后一道判断。</text>
