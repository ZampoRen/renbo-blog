<text x="220" y="374" fill="#93C5FD" font-size="24" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">只负责连接</text>
<text x="220" y="408" fill="#93C5FD" font-size="24" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">保住连接池</text>
