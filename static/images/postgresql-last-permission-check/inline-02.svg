<text x="600" y="374" fill="#93C5FD" font-size="24" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">search_path / GRANT / RLS</text>
<text x="600" y="408" fill="#93C5FD" font-size="24" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">真正接管权限</text>
