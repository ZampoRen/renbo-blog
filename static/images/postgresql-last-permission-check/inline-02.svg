<text x="90" y="108" fill="#F8FAFC" font-size="42" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">更稳的角色结构，不要再揉成一个 admin</text>
<text x="90" y="152" fill="#94A3B8" font-size="22" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">连接、业务权限、管理动作拆开以后，边界才会清楚</text>
