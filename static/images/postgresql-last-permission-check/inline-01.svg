<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs><linearGradient id="bg1" x1="0" y1="0" x2="1200" y2="760"><stop stop-color="#0B1020"/><stop offset="1" stop-color="#111827"/></linearGradient></defs>
<rect width="1200" height="760" rx="28" fill="url(#bg1)"/>
<text x="90" y="108" fill="#F8FAFC" font-size="42" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">一层层收口，别把最后一跳交出去</text>
<text x="90" y="152" fill="#94A3B8" font-size="22" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">真正重要的不是功能数量，而是数据库自己还会再判断一次</text>
<rect x="90" y="258" width="210" height="160" rx="24" fill="#0F172A" stroke="#334155"/>
<rect x="365" y="258" width="210" height="160" rx="24" fill="#0F172A" stroke="#334155"/>
<rect x="640" y="258" width="210" height="160" rx="24" fill="#0F172A" stroke="#334155"/>
<rect x="915" y="258" width="210" height="160" rx="24" fill="#0F172A" stroke="#334155"/>
<path d="M300 338H365" stroke="#2DD4BF" stroke-width="5" stroke-linecap="round"/>
<path d="M575 338H640" stroke="#2DD4BF" stroke-width="5" stroke-linecap="round"/>
<path d="M850 338H915" stroke="#2DD4BF" stroke-width="5" stroke-linecap="round"/>
<text x="195" y="324" fill="#E5E7EB" font-size="34" text-anchor="middle" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">应用层</text>
<text x="195" y="372" fill="#93C5FD" font-size="24" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">先鉴权</text>
<text x="470" y="324" fill="#E5E7EB" font-size="34" text-anchor="middle" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">schema</text>
<text x="470" y="372" fill="#93C5FD" font-size="24" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">先看见哪</text>
<text x="745" y="324" fill="#E5E7EB" font-size="34" text-anchor="middle" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">grant</text>
<text x="745" y="372" fill="#93C5FD" font-size="24" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">再碰哪些列</text>
<text x="1020" y="324" fill="#E5E7EB" font-size="34" text-anchor="middle" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">RLS</text>
<text x="1020" y="372" fill="#93C5FD" font-size="24" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">这行放不放</text>
<rect x="90" y="514" width="1035" height="118" rx="24" fill="#111827" stroke="#334155"/>
<text x="120" y="588" fill="#CBD5E1" font-size="28" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">应用层判断一次，PostgreSQL 再判断一次，这才叫把最后一道门收回来。</text>
</svg>