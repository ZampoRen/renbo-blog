<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
<rect width="1200" height="760" fill="#0f172a"/>
<text x="600" y="80" fill="#f8fafc" font-size="38" text-anchor="middle" font-family="PingFang SC, Arial" font-weight="800">固定长度数组 vs 动态视图</text>
<text x="600" y="120" fill="#94a3b8" font-size="20" text-anchor="middle" font-family="PingFang SC, Arial">不是谁更高级，而是谁更符合这块数据的真实边界</text>
<g font-family="PingFang SC, Arial">
<rect x="90" y="170" width="1020" height="440" rx="24" fill="#111827" stroke="#334155"/>
<rect x="90" y="170" width="1020" height="70" rx="24" fill="#082f49" stroke="#38bdf8"/>
<text x="235" y="215" fill="#e0f2fe" font-size="22" text-anchor="middle" font-weight="700">选择</text>
<text x="480" y="215" fill="#e0f2fe" font-size="22" text-anchor="middle" font-weight="700">适合表达</text>
<text x="735" y="215" fill="#e0f2fe" font-size="22" text-anchor="middle" font-weight="700">代价</text>
<text x="975" y="215" fill="#e0f2fe" font-size="22" text-anchor="middle" font-weight="700">典型场景</text>
<g fill="#cbd5e1" font-size="20" text-anchor="middle">
<line x1="90" y1="320" x2="1110" y2="320" stroke="#334155"/><line x1="90" y1="430" x2="1110" y2="430" stroke="#334155"/><line x1="90" y1="540" x2="1110" y2="540" stroke="#334155"/>
<line x1="350" y1="170" x2="350" y2="610" stroke="#334155"/><line x1="610" y1="170" x2="610" y2="610" stroke="#334155"/><line x1="860" y1="170" x2="860" y2="610" stroke="#334155"/>
<text x="220" y="287" fill="#bae6fd" font-weight="700">[N]T</text><text x="480" y="287">固定形状的值</text><text x="735" y="287">复制成本</text><text x="975" y="287">hash / 协议头</text>
<text x="220" y="397" fill="#fed7aa" font-weight="700">*[N]T</text><text x="480" y="397">固定形状的存储</text><text x="735" y="397">共享修改风险</text><text x="975" y="397">大数组传参</text>
<text x="220" y="507" fill="#bbf7d0" font-weight="700">[]T</text><text x="480" y="507">任意长度视图</text><text x="735" y="507">长度契约变弱</text><text x="975" y="507">列表 / 输入流</text>
</g>
</g>
<rect x="305" y="650" width="590" height="54" rx="18" fill="#082f49" stroke="#38bdf8"/>
<text x="600" y="685" fill="#e0f2fe" font-size="22" text-anchor="middle" font-family="PingFang SC, Arial">长度本来是契约，才值得写进类型</text>
</svg>