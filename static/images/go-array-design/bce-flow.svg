<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
<rect width="1200" height="760" fill="#0b1120"/>
<text x="600" y="82" fill="#f8fafc" font-size="38" text-anchor="middle" font-family="PingFang SC, Arial" font-weight="800">BCE：编译器消掉的是“已证明多余”的检查</text>
<text x="600" y="122" fill="#94a3b8" font-size="20" text-anchor="middle" font-family="PingFang SC, Arial">数组不会让检查自动消失，固定长度只是提供了证明材料</text>
<g font-family="PingFang SC, Arial" font-size="20" text-anchor="middle">
<rect x="85" y="220" width="230" height="120" rx="22" fill="#111827" stroke="#38bdf8" stroke-width="2"/><text x="200" y="270" fill="#e0f2fe" font-weight="700">代码形状</text><text x="200" y="305" fill="#cbd5e1">a[i&amp;255]</text>
<path d="M325 280 H420" stroke="#38bdf8" stroke-width="3" marker-end="url(#arr)"/>
<rect x="430" y="220" width="250" height="120" rx="22" fill="#111827" stroke="#a78bfa" stroke-width="2"/><text x="555" y="270" fill="#ede9fe" font-weight="700">已知信息</text><text x="555" y="305" fill="#cbd5e1">[256]int + 0..255</text>
<path d="M690 280 H785" stroke="#a78bfa" stroke-width="3" marker-end="url(#arr2)"/>
<rect x="795" y="220" width="320" height="120" rx="22" fill="#111827" stroke="#22c55e" stroke-width="2"/><text x="955" y="270" fill="#dcfce7" font-weight="700">证明 in range</text><text x="955" y="305" fill="#cbd5e1">bounds check 可消除</text>
</g>
<g font-family="PingFang SC, Arial" font-size="20" text-anchor="middle">
<rect x="85" y="430" width="230" height="120" rx="22" fill="#111827" stroke="#f97316" stroke-width="2"/><text x="200" y="480" fill="#ffedd5" font-weight="700">a[i]</text><text x="200" y="515" fill="#cbd5e1">任意 i</text>
<path d="M325 490 H420" stroke="#f97316" stroke-width="3" marker-end="url(#arr3)"/>
<rect x="430" y="430" width="250" height="120" rx="22" fill="#111827" stroke="#f97316" stroke-width="2"/><text x="555" y="480" fill="#ffedd5" font-weight="700">信息不够</text><text x="555" y="515" fill="#cbd5e1">可能越界</text>
<path d="M690 490 H785" stroke="#f97316" stroke-width="3" marker-end="url(#arr3)"/>
<rect x="795" y="430" width="320" height="120" rx="22" fill="#111827" stroke="#ef4444" stroke-width="2"/><text x="955" y="480" fill="#fee2e2" font-weight="700">保留检查</text><text x="955" y="515" fill="#cbd5e1">运行时越界仍 panic</text>
</g>
<rect x="355" y="640" width="490" height="54" rx="18" fill="#111827" stroke="#38bdf8"/>
<text x="600" y="675" fill="#e0f2fe" font-size="22" text-anchor="middle" font-family="PingFang SC, Arial">优化不是祈祷，是证明</text>
<defs><marker id="arr" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#38bdf8"/></marker><marker id="arr2" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#a78bfa"/></marker><marker id="arr3" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#f97316"/></marker></defs>
</svg>