<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="显式 context 与隐式上下文的差别">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="55%" stop-color="#0b1830"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="go" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="hidden" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowGo" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#67e8f9"/>
    </marker>
    <marker id="arrowHidden" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#c4b5fd"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="170" cy="105" r="120" fill="#22d3ee" opacity="0.07"/>
  <circle cx="1060" cy="620" r="180" fill="#a78bfa" opacity="0.08"/>

  <text x="600" y="86" text-anchor="middle" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="38" font-weight="700" fill="#f8fafc">同样是上下文，Go 在暴露生命周期</text>
  <text x="600" y="128" text-anchor="middle" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="20" fill="#94a3b8">隐式上下文让签名安静，显式 context 让调用链可查</text>

  <rect x="70" y="185" width="490" height="400" rx="30" fill="#0f172a" stroke="#164e63" stroke-width="2"/>
  <rect x="640" y="185" width="490" height="400" rx="30" fill="#111827" stroke="#4c1d95" stroke-width="2"/>

  <text x="315" y="238" text-anchor="middle" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="28" font-weight="700" fill="url(#go)">Go：显式传 ctx</text>
  <text x="885" y="238" text-anchor="middle" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="28" font-weight="700" fill="url(#hidden)">Java / Node / Python：隐式上下文</text>

  <g font-family="Menlo, Consolas, monospace" font-size="22" font-weight="700">
    <rect x="125" y="290" width="145" height="64" rx="18" fill="#082f49" stroke="#22d3ee" stroke-width="2"/>
    <text x="197" y="330" text-anchor="middle" fill="#e0f2fe">handler(ctx)</text>
    <line x1="275" y1="322" x2="345" y2="322" stroke="#67e8f9" stroke-width="4" marker-end="url(#arrowGo)"/>
    <rect x="350" y="290" width="145" height="64" rx="18" fill="#082f49" stroke="#22d3ee" stroke-width="2"/>
    <text x="422" y="330" text-anchor="middle" fill="#e0f2fe">service(ctx)</text>
    <line x1="420" y1="359" x2="420" y2="422" stroke="#67e8f9" stroke-width="4" marker-end="url(#arrowGo)"/>
    <rect x="248" y="430" width="145" height="64" rx="18" fill="#082f49" stroke="#22d3ee" stroke-width="2"/>
    <text x="320" y="470" text-anchor="middle" fill="#e0f2fe">repo(ctx)</text>
  </g>

  <text x="315" y="535" text-anchor="middle" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="21" font-weight="700" fill="#f8fafc">噪音在签名里</text>
  <text x="315" y="566" text-anchor="middle" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="18" fill="#94a3b8">deadline、cancel、调用边界一眼可追</text>

  <g font-family="Menlo, Consolas, monospace" font-size="22" font-weight="700">
    <rect x="705" y="305" width="155" height="64" rx="18" fill="#312e81" stroke="#c4b5fd" stroke-width="2"/>
    <text x="782" y="345" text-anchor="middle" fill="#ede9fe">handler()</text>
    <line x1="865" y1="337" x2="935" y2="337" stroke="#c4b5fd" stroke-width="4" marker-end="url(#arrowHidden)"/>
    <rect x="940" y="305" width="155" height="64" rx="18" fill="#312e81" stroke="#c4b5fd" stroke-width="2"/>
    <text x="1018" y="345" text-anchor="middle" fill="#ede9fe">service()</text>
    <path d="M1018 375 C1018 430 805 430 805 485" fill="none" stroke="#c4b5fd" stroke-width="4" marker-end="url(#arrowHidden)"/>
    <rect x="730" y="492" width="155" height="64" rx="18" fill="#312e81" stroke="#c4b5fd" stroke-width="2"/>
    <text x="807" y="532" text-anchor="middle" fill="#ede9fe">repo()</text>
  </g>

  <g filter="url(#softGlow)">
    <rect x="785" y="246" width="220" height="46" rx="23" fill="#581c87" opacity="0.92"/>
    <text x="895" y="276" text-anchor="middle" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="20" font-weight="700" fill="#faf5ff">当前执行上下文</text>
  </g>

  <text x="885" y="535" text-anchor="middle" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="21" font-weight="700" fill="#f8fafc">签名很干净</text>
  <text x="885" y="566" text-anchor="middle" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="18" fill="#a1a1aa">依赖藏在运行时边界里</text>

  <rect x="210" y="625" width="780" height="54" rx="27" fill="#020617" stroke="#334155" stroke-width="1"/>
  <text x="600" y="660" text-anchor="middle" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#f8fafc">签名干净，不等于依赖干净。</text>
</svg>
