<svg xmlns="http://www.w3.org/2000/svg" width="900" height="383" viewBox="0 0 900 383" role="img" aria-labelledby="title desc">
  <title id="title">Go AI Agent 生态三层地图</title>
  <desc id="desc">用三层结构展示 2026 年 Go 在 AI Agent 生态里的编排层、协议层和运行时层。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="55%" stop-color="#0d1b2f"/>
      <stop offset="100%" stop-color="#102b3c"/>
    </linearGradient>
    <linearGradient id="go" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4dd0e1"/>
      <stop offset="100%" stop-color="#2f80ed"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="383" rx="0" fill="url(#bg)"/>
  <circle cx="150" cy="92" r="92" fill="#1e88e5" opacity="0.12"/>
  <circle cx="780" cy="320" r="130" fill="#4dd0e1" opacity="0.08"/>

  <g opacity="0.18" stroke="#8fd8ff" stroke-width="1">
    <path d="M70 310 C180 250, 245 260, 350 205 S550 90, 815 80" fill="none"/>
    <path d="M88 86 C220 130, 270 116, 380 165 S580 270, 805 240" fill="none"/>
  </g>

  <g transform="translate(54,54)">
    <rect x="0" y="0" width="300" height="275" rx="26" fill="#0b1728" stroke="#244763" stroke-width="1.5"/>
    <circle cx="150" cy="100" r="54" fill="url(#go)" opacity="0.95" filter="url(#softGlow)"/>
    <text x="150" y="116" text-anchor="middle" font-family="Inter, PingFang SC, sans-serif" font-size="46" font-weight="800" fill="#06111e">Go</text>
    <text x="150" y="182" text-anchor="middle" font-family="Inter, PingFang SC, sans-serif" font-size="25" font-weight="700" fill="#f3fbff">Agent 不是玩具了</text>
    <text x="150" y="218" text-anchor="middle" font-family="Inter, PingFang SC, sans-serif" font-size="15" fill="#9fb7c8">但它赢的不是热闹</text>
    <text x="150" y="244" text-anchor="middle" font-family="Inter, PingFang SC, sans-serif" font-size="15" fill="#9fb7c8">而是工程边界</text>
  </g>

  <g transform="translate(405,52)" font-family="Inter, PingFang SC, sans-serif">
    <text x="0" y="4" font-size="18" font-weight="700" fill="#58d6e8">2026 Go AI Agent Ecosystem</text>
    <text x="0" y="40" font-size="34" font-weight="800" fill="#f7fbff">三层基础设施开始补齐</text>

    <g transform="translate(0,73)">
      <rect x="0" y="0" width="420" height="58" rx="16" fill="#10243a" stroke="#35c7dc" stroke-width="1.4"/>
      <text x="26" y="36" font-size="20" font-weight="700" fill="#ffffff">编排层</text>
      <text x="128" y="36" font-size="16" fill="#b8d4e6">Eino / Genkit Go / langchaingo</text>
    </g>

    <g transform="translate(0,145)">
      <rect x="0" y="0" width="420" height="58" rx="16" fill="#10243a" stroke="#7ddc8a" stroke-width="1.4"/>
      <text x="26" y="36" font-size="20" font-weight="700" fill="#ffffff">协议层</text>
      <text x="128" y="36" font-size="16" fill="#b8d4e6">MCP Go SDK / mcp-go</text>
    </g>

    <g transform="translate(0,217)">
      <rect x="0" y="0" width="420" height="58" rx="16" fill="#10243a" stroke="#ffcf70" stroke-width="1.4"/>
      <text x="26" y="36" font-size="20" font-weight="700" fill="#ffffff">运行时层</text>
      <text x="148" y="36" font-size="16" fill="#b8d4e6">single binary / gateway / governance</text>
    </g>
  </g>
</svg>
