<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#07111F"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#94A3B8"/>
    </marker>
    <style>
      .title{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;font-weight:800;fill:#F8FAFC}
      .sub{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;fill:#CBD5E1}
      .mono{font-family:'SF Mono','Menlo','Consolas',monospace;fill:#CBD5E1}
      .label{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;font-weight:700;fill:#E5E7EB}
      .small{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;fill:#94A3B8}
    </style>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="160" cy="110" r="170" fill="#1D4ED8" opacity="0.12"/>
  <circle cx="1040" cy="540" r="210" fill="#22C55E" opacity="0.10"/>
  <text x="70" y="88" class="title" font-size="42">GC 标记期间，业务还在写指针</text>
  <text x="72" y="130" class="sub" font-size="22">三色标记真正要防的，是并发修改让活对象从视野里消失</text>

  <rect x="70" y="190" width="285" height="250" rx="28" fill="#0F172A" stroke="#334155" stroke-width="2"/>
  <text x="105" y="240" class="label" font-size="28">黑色对象</text>
  <text x="105" y="278" class="small" font-size="18">GC 已经扫完它的指针</text>
  <rect x="105" y="315" width="190" height="78" rx="18" fill="#111827" stroke="#64748B" stroke-width="2"/>
  <text x="138" y="363" class="mono" font-size="24">root.next</text>

  <rect x="455" y="190" width="290" height="250" rx="28" fill="#132116" stroke="#22C55E" stroke-width="2"/>
  <text x="490" y="240" class="label" font-size="28">业务写入</text>
  <text x="490" y="278" class="small" font-size="18">一次普通赋值，改变可达路径</text>
  <text x="500" y="352" class="mono" font-size="26">root.next = n</text>

  <rect x="850" y="190" width="280" height="250" rx="28" fill="#1F1515" stroke="#EF4444" stroke-width="2"/>
  <text x="885" y="240" class="label" font-size="28">白色对象</text>
  <text x="885" y="278" class="small" font-size="18">还没被 GC 确认为可达</text>
  <circle cx="990" cy="350" r="45" fill="#F8FAFC" opacity="0.96" filter="url(#glow)"/>
  <text x="966" y="360" class="mono" font-size="26" fill="#111827">n</text>

  <path d="M355 315 C405 285, 415 285, 455 315" fill="none" stroke="#94A3B8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M745 315 C795 285, 805 285, 850 315" fill="none" stroke="#EF4444" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="390" y="475" class="small" font-size="20">没有屏障：GC 可能漏掉新路径</text>
  <text x="390" y="510" class="sub" font-size="24">写屏障的价值：把这次指针写入纳入标记视野</text>
  <rect x="70" y="560" width="1060" height="64" rx="20" fill="#0F172A" stroke="#334155" stroke-width="2"/>
  <text x="105" y="601" class="label" font-size="24">并发 GC 最怕的不是慢，是把活对象看丢。</text>
</svg>
