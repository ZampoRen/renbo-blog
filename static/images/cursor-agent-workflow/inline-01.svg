<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="Cursor Agent 可控工作流示意图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#08111f"/><stop offset="1" stop-color="#0f172a"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity="0.26"/></filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <text x="600" y="92" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="36" font-weight="900" fill="#f8fafc">Cursor Agent 不该一路狂奔</text>
  <text x="600" y="132" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" font-weight="700" fill="#93c5fd">把它放进一个小步、可审、可回滚的循环里</text>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" filter="url(#shadow)">
    <g transform="translate(78 230)">
      <rect width="208" height="150" rx="24" fill="#111827" stroke="#334155"/>
      <text x="104" y="54" text-anchor="middle" font-size="24" font-weight="900" fill="#f8fafc">只分析</text>
      <text x="104" y="90" text-anchor="middle" font-size="16" font-weight="700" fill="#94a3b8">先读相关文件</text>
      <text x="104" y="118" text-anchor="middle" font-size="16" font-weight="700" fill="#94a3b8">不要改代码</text>
    </g>
    <g transform="translate(352 230)">
      <rect width="208" height="150" rx="24" fill="#111827" stroke="#334155"/>
      <text x="104" y="54" text-anchor="middle" font-size="24" font-weight="900" fill="#f8fafc">写计划</text>
      <text x="104" y="90" text-anchor="middle" font-size="16" font-weight="700" fill="#94a3b8">列文件范围</text>
      <text x="104" y="118" text-anchor="middle" font-size="16" font-weight="700" fill="#94a3b8">标清风险</text>
    </g>
    <g transform="translate(626 230)">
      <rect width="208" height="150" rx="24" fill="#111827" stroke="#334155"/>
      <text x="104" y="54" text-anchor="middle" font-size="24" font-weight="900" fill="#f8fafc">小步改</text>
      <text x="104" y="90" text-anchor="middle" font-size="16" font-weight="700" fill="#94a3b8">只做确认范围</text>
      <text x="104" y="118" text-anchor="middle" font-size="16" font-weight="700" fill="#94a3b8">不顺手重构</text>
    </g>
    <g transform="translate(900 230)">
      <rect width="208" height="150" rx="24" fill="#111827" stroke="#334155"/>
      <text x="104" y="54" text-anchor="middle" font-size="24" font-weight="900" fill="#f8fafc">验收</text>
      <text x="104" y="90" text-anchor="middle" font-size="16" font-weight="700" fill="#94a3b8">看 diff / 跑测试</text>
      <text x="104" y="118" text-anchor="middle" font-size="16" font-weight="700" fill="#94a3b8">能回滚再继续</text>
    </g>
  </g>
  <g stroke="#38bdf8" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M296 305H338"/><path d="M326 291l14 14-14 14"/>
    <path d="M570 305H612"/><path d="M600 291l14 14-14 14"/>
    <path d="M844 305H886"/><path d="M874 291l14 14-14 14"/>
  </g>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <rect x="222" y="490" width="756" height="82" rx="28" fill="#172554" stroke="#2563eb"/>
    <text x="600" y="540" text-anchor="middle" font-size="24" font-weight="900" fill="#dbeafe">Agent 越主动，边界越要写在前面</text>
  </g>
</svg>
