<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="坏提示词和好提示词对比">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#111827"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity="0.26"/></filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <text x="600" y="86" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="36" font-weight="900" fill="#f8fafc">Prompt 不是许愿，是边界</text>
  <text x="600" y="126" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" font-weight="700" fill="#93c5fd">一句“帮我优化”，通常不够让 Agent 安全行动</text>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" filter="url(#shadow)">
    <g transform="translate(92 190)">
      <rect width="470" height="340" rx="28" fill="#1f2937" stroke="#475569"/>
      <rect x="28" y="26" width="100" height="34" rx="17" fill="#7f1d1d"/>
      <text x="78" y="49" text-anchor="middle" font-size="16" font-weight="900" fill="#fecaca">坏写法</text>
      <text x="42" y="118" font-size="30" font-weight="900" fill="#f8fafc">帮我优化登录页。</text>
      <text x="42" y="196" font-size="20" font-weight="800" fill="#fca5a5">问题</text>
      <text x="42" y="236" font-size="18" font-weight="700" fill="#cbd5e1">没有范围</text>
      <text x="42" y="270" font-size="18" font-weight="700" fill="#cbd5e1">没有禁区</text>
      <text x="42" y="304" font-size="18" font-weight="700" fill="#cbd5e1">没有验收标准</text>
    </g>
    <g transform="translate(638 190)">
      <rect width="470" height="340" rx="28" fill="#0b1220" stroke="#2563eb"/>
      <rect x="28" y="26" width="100" height="34" rx="17" fill="#14532d"/>
      <text x="78" y="49" text-anchor="middle" font-size="16" font-weight="900" fill="#bbf7d0">好写法</text>
      <text x="42" y="104" font-size="22" font-weight="900" fill="#f8fafc">只调整视觉层。</text>
      <text x="42" y="150" font-size="18" font-weight="700" fill="#bfdbfe">不改字段、路由、接口请求和校验逻辑。</text>
      <text x="42" y="194" font-size="18" font-weight="700" fill="#bfdbfe">先列计划，等我确认后再改。</text>
      <text x="42" y="238" font-size="18" font-weight="700" fill="#bfdbfe">改完告诉我哪些文件变了。</text>
      <text x="42" y="282" font-size="18" font-weight="700" fill="#bfdbfe">给出验证方法。</text>
    </g>
  </g>
  <text x="600" y="628" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24" font-weight="900" fill="#e0f2fe">越小的任务，越需要说清“不做什么”</text>
</svg>
