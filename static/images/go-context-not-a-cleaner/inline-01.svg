<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f97316"/>
    </marker>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="600" y="92" text-anchor="middle" fill="#f8fafc" font-size="42" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">cancelCtx 是一棵取消树</text>
  <text x="600" y="135" text-anchor="middle" fill="#94a3b8" font-size="22" font-family="Arial, 'PingFang SC', sans-serif">父节点向下通知所有子节点；子节点取消，不反向取消父节点</text>

  <g font-family="Arial, 'PingFang SC', sans-serif">
    <rect x="455" y="190" width="290" height="86" rx="22" fill="#1e293b" stroke="#38bdf8" stroke-width="3"/>
    <text x="600" y="244" text-anchor="middle" fill="#e0f2fe" font-size="28" font-weight="700">parent context</text>

    <path d="M600 278 C600 330 355 328 355 385" stroke="#f97316" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
    <path d="M600 278 C600 330 600 328 600 385" stroke="#f97316" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
    <path d="M600 278 C600 330 845 328 845 385" stroke="#f97316" stroke-width="5" fill="none" marker-end="url(#arrow)"/>

    <rect x="205" y="390" width="300" height="92" rx="20" fill="#020617" stroke="#475569" stroke-width="2"/>
    <text x="355" y="430" text-anchor="middle" fill="#f8fafc" font-size="24" font-weight="700">child A</text>
    <text x="355" y="462" text-anchor="middle" fill="#94a3b8" font-size="18">监听 Done，正常退出</text>

    <rect x="450" y="390" width="300" height="92" rx="20" fill="#020617" stroke="#475569" stroke-width="2"/>
    <text x="600" y="430" text-anchor="middle" fill="#f8fafc" font-size="24" font-weight="700">child B</text>
    <text x="600" y="462" text-anchor="middle" fill="#94a3b8" font-size="18">没有监听，继续阻塞</text>

    <rect x="695" y="390" width="300" height="92" rx="20" fill="#020617" stroke="#475569" stroke-width="2"/>
    <text x="845" y="430" text-anchor="middle" fill="#f8fafc" font-size="24" font-weight="700">child C</text>
    <text x="845" y="462" text-anchor="middle" fill="#94a3b8" font-size="18">超时后记录原因</text>

    <path d="M355 486 C355 538 600 530 600 580" stroke="#64748b" stroke-width="4" fill="none" stroke-dasharray="8 10"/>
    <path d="M845 486 C845 538 600 530 600 580" stroke="#64748b" stroke-width="4" fill="none" stroke-dasharray="8 10"/>
    <rect x="350" y="585" width="500" height="86" rx="22" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <text x="600" y="624" text-anchor="middle" fill="#f8fafc" font-size="24" font-weight="700">业务代码决定是否退场</text>
    <text x="600" y="656" text-anchor="middle" fill="#94a3b8" font-size="18">通知已经到达，不等于 goroutine 已经退出</text>
  </g>
</svg>
