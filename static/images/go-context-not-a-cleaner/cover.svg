<svg xmlns="http://www.w3.org/2000/svg" width="900" height="383" viewBox="0 0 900 383">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.55" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>
  <rect width="900" height="383" fill="url(#bg)"/>
  <circle cx="118" cy="88" r="70" fill="#38bdf8" opacity="0.12" filter="url(#soft)"/>
  <circle cx="778" cy="292" r="90" fill="#f97316" opacity="0.10" filter="url(#soft)"/>

  <g transform="translate(62 68)">
    <rect x="0" y="0" width="352" height="234" rx="24" fill="#020617" opacity="0.72" stroke="#334155" stroke-width="2"/>
    <text x="28" y="44" fill="#cbd5e1" font-size="18" font-family="Arial, 'PingFang SC', sans-serif">goroutine monitor</text>
    <polyline points="30,176 74,162 118,167 162,126 206,118 250,82 308,58" fill="none" stroke="url(#line)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">
      <text x="30" y="206">timeout happened</text>
      <text x="206" y="206">still rising</text>
    </g>
    <line x1="30" y1="184" x2="316" y2="184" stroke="#1e293b" stroke-width="2"/>
    <line x1="30" y1="66" x2="30" y2="184" stroke="#1e293b" stroke-width="2"/>
  </g>

  <g transform="translate(500 70)">
    <rect x="0" y="0" width="300" height="76" rx="18" fill="#f97316" opacity="0.92"/>
    <text x="150" y="47" text-anchor="middle" fill="#111827" font-size="30" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">cancel</text>
    <path d="M150 78 C150 118 124 130 96 150" stroke="#f97316" stroke-width="4" fill="none" stroke-dasharray="10 10" stroke-linecap="round"/>
    <path d="M150 78 C150 124 174 136 206 154" stroke="#f97316" stroke-width="4" fill="none" stroke-dasharray="10 10" stroke-linecap="round"/>
    <rect x="32" y="151" width="126" height="52" rx="14" fill="#0f172a" stroke="#334155" stroke-width="2"/>
    <rect x="172" y="151" width="126" height="52" rx="14" fill="#0f172a" stroke="#334155" stroke-width="2"/>
    <text x="95" y="184" text-anchor="middle" fill="#e5e7eb" font-size="18" font-family="Arial, 'PingFang SC', sans-serif">听见就退</text>
    <text x="235" y="184" text-anchor="middle" fill="#e5e7eb" font-size="18" font-family="Arial, 'PingFang SC', sans-serif">不听还等</text>
  </g>

  <g font-family="Arial, 'PingFang SC', sans-serif">
    <text x="62" y="338" fill="#f8fafc" font-size="34" font-weight="700">context 不是清洁工</text>
    <text x="62" y="366" fill="#94a3b8" font-size="18">它只负责通知“该停了”，不负责替 goroutine 退场</text>
  </g>
</svg>
