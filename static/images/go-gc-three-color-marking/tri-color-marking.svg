<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="三色标记示意图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#111827"/><stop offset="1" stop-color="#020617"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#94a3b8"/></marker>
  </defs>
  <rect width="1200" height="760" rx="34" fill="url(#bg)"/>
  <text x="80" y="88" fill="#f8fafc" font-size="42" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">三色标记：先别急着回收</text>
  <text x="80" y="130" fill="#94a3b8" font-size="22" font-family="Arial, 'PingFang SC', sans-serif">白色不一定是垃圾；只有标记结束还没被触达，才会被清扫</text>

  <g filter="url(#shadow)">
    <rect x="90" y="210" width="260" height="300" rx="28" fill="#f8fafc" stroke="#cbd5e1" stroke-width="3"/>
    <text x="220" y="270" text-anchor="middle" fill="#0f172a" font-size="34" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">白色</text>
    <text x="220" y="320" text-anchor="middle" fill="#334155" font-size="21" font-family="Arial, 'PingFang SC', sans-serif">还没确认可达</text>
    <text x="220" y="358" text-anchor="middle" fill="#334155" font-size="21" font-family="Arial, 'PingFang SC', sans-serif">标记结束仍是白色</text>
    <text x="220" y="396" text-anchor="middle" fill="#334155" font-size="21" font-family="Arial, 'PingFang SC', sans-serif">才会被清扫</text>

    <rect x="470" y="210" width="260" height="300" rx="28" fill="#475569" stroke="#94a3b8" stroke-width="3"/>
    <text x="600" y="270" text-anchor="middle" fill="#f8fafc" font-size="34" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">灰色</text>
    <text x="600" y="320" text-anchor="middle" fill="#e2e8f0" font-size="21" font-family="Arial, 'PingFang SC', sans-serif">已经确认可达</text>
    <text x="600" y="358" text-anchor="middle" fill="#e2e8f0" font-size="21" font-family="Arial, 'PingFang SC', sans-serif">但子对象还没扫完</text>
    <text x="600" y="396" text-anchor="middle" fill="#e2e8f0" font-size="21" font-family="Arial, 'PingFang SC', sans-serif">它是待办队列</text>

    <rect x="850" y="210" width="260" height="300" rx="28" fill="#020617" stroke="#38bdf8" stroke-width="3"/>
    <text x="980" y="270" text-anchor="middle" fill="#f8fafc" font-size="34" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">黑色</text>
    <text x="980" y="320" text-anchor="middle" fill="#cbd5e1" font-size="21" font-family="Arial, 'PingFang SC', sans-serif">已经确认可达</text>
    <text x="980" y="358" text-anchor="middle" fill="#cbd5e1" font-size="21" font-family="Arial, 'PingFang SC', sans-serif">子对象也扫过</text>
    <text x="980" y="396" text-anchor="middle" fill="#cbd5e1" font-size="21" font-family="Arial, 'PingFang SC', sans-serif">暂时安全</text>
  </g>

  <path d="M360 360 H455" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M740 360 H835" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="410" y="330" text-anchor="middle" fill="#cbd5e1" font-size="18" font-family="Arial, 'PingFang SC', sans-serif">被根触达</text>
  <text x="790" y="330" text-anchor="middle" fill="#cbd5e1" font-size="18" font-family="Arial, 'PingFang SC', sans-serif">扫描完成</text>

  <g>
    <rect x="150" y="585" width="900" height="82" rx="22" fill="#0f766e" opacity="0.92"/>
    <text x="600" y="635" text-anchor="middle" fill="#ecfeff" font-size="25" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">并发标记最怕：黑对象偷偷指向白对象。写屏障就是为这件事补保险。</text>
  </g>
</svg>
