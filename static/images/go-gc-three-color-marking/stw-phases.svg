<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="Go GC STW 阶段图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0b1120"/><stop offset="1" stop-color="#111827"/></linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity="0.45"/></filter>
  </defs>
  <rect width="1200" height="680" rx="34" fill="url(#bg)"/>
  <text x="80" y="92" fill="#f8fafc" font-size="42" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">STW 不是一整轮 GC 都停</text>
  <text x="80" y="134" fill="#94a3b8" font-size="22" font-family="Arial, 'PingFang SC', sans-serif">Go 的主要标记工作并发执行，停顿集中在阶段切换与收尾</text>

  <line x1="120" y1="345" x2="1080" y2="345" stroke="#334155" stroke-width="8" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="120" y="265" width="150" height="160" rx="24" fill="#7f1d1d" stroke="#f87171" stroke-width="3"/>
    <text x="195" y="320" text-anchor="middle" fill="#fff" font-size="23" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">STW</text>
    <text x="195" y="360" text-anchor="middle" fill="#fecaca" font-size="18" font-family="Arial, 'PingFang SC', sans-serif">Mark Setup</text>
    <text x="195" y="390" text-anchor="middle" fill="#fecaca" font-size="16" font-family="Arial, 'PingFang SC', sans-serif">打开写屏障</text>

    <rect x="340" y="245" width="360" height="200" rx="28" fill="#0f172a" stroke="#38bdf8" stroke-width="3"/>
    <text x="520" y="310" text-anchor="middle" fill="#f8fafc" font-size="28" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">Concurrent Mark</text>
    <text x="520" y="352" text-anchor="middle" fill="#cbd5e1" font-size="20" font-family="Arial, 'PingFang SC', sans-serif">应用继续跑，GC 同时扫描</text>
    <text x="520" y="388" text-anchor="middle" fill="#cbd5e1" font-size="20" font-family="Arial, 'PingFang SC', sans-serif">分配太快时会触发 assist</text>

    <rect x="770" y="265" width="180" height="160" rx="24" fill="#7f1d1d" stroke="#f87171" stroke-width="3"/>
    <text x="860" y="320" text-anchor="middle" fill="#fff" font-size="23" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">STW</text>
    <text x="860" y="360" text-anchor="middle" fill="#fecaca" font-size="18" font-family="Arial, 'PingFang SC', sans-serif">Mark Termination</text>
    <text x="860" y="390" text-anchor="middle" fill="#fecaca" font-size="16" font-family="Arial, 'PingFang SC', sans-serif">收尾并关屏障</text>

    <rect x="1000" y="265" width="130" height="160" rx="24" fill="#0f172a" stroke="#64748b" stroke-width="3"/>
    <text x="1065" y="330" text-anchor="middle" fill="#f8fafc" font-size="24" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">Sweep</text>
    <text x="1065" y="370" text-anchor="middle" fill="#cbd5e1" font-size="17" font-family="Arial, 'PingFang SC', sans-serif">并发清扫</text>
  </g>

  <path d="M280 345 H325" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M710 345 H755" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M960 345 H985" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="170" y="525" width="860" height="78" rx="22" fill="#1e293b" stroke="#334155"/>
  <text x="600" y="574" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">要盯的不只是 pause，还有 GC CPU、assist、分配速率和 live heap</text>
</svg>
