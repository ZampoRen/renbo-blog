<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="Go GC 流程图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/><stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="1200" height="680" rx="34" fill="url(#bg)"/>
  <circle cx="1040" cy="110" r="170" fill="#1d4ed8" opacity="0.10"/>
  <circle cx="160" cy="610" r="210" fill="#14b8a6" opacity="0.08"/>

  <text x="80" y="92" fill="#f8fafc" font-size="42" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Go GC 的一轮循环</text>
  <text x="80" y="134" fill="#94a3b8" font-size="22" font-family="Arial, 'PingFang SC', sans-serif">不是等内存满了才动手，而是在 CPU 与内存之间不断做预算</text>

  <g filter="url(#shadow)">
    <rect x="86" y="250" width="190" height="130" rx="24" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="181" y="300" text-anchor="middle" fill="#f8fafc" font-size="26" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">Sweep</text>
    <text x="181" y="338" text-anchor="middle" fill="#cbd5e1" font-size="18" font-family="Arial, 'PingFang SC', sans-serif">清扫上一轮垃圾</text>

    <rect x="365" y="250" width="190" height="130" rx="24" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="460" y="300" text-anchor="middle" fill="#f8fafc" font-size="26" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">Off</text>
    <text x="460" y="338" text-anchor="middle" fill="#cbd5e1" font-size="18" font-family="Arial, 'PingFang SC', sans-serif">应用继续分配</text>

    <rect x="644" y="250" width="190" height="130" rx="24" fill="#111827" stroke="#38bdf8" stroke-width="3"/>
    <text x="739" y="300" text-anchor="middle" fill="#f8fafc" font-size="26" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">Mark</text>
    <text x="739" y="338" text-anchor="middle" fill="#cbd5e1" font-size="18" font-family="Arial, 'PingFang SC', sans-serif">并发标记存活对象</text>

    <rect x="923" y="250" width="190" height="130" rx="24" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="1018" y="300" text-anchor="middle" fill="#f8fafc" font-size="26" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">Next Goal</text>
    <text x="1018" y="338" text-anchor="middle" fill="#cbd5e1" font-size="18" font-family="Arial, 'PingFang SC', sans-serif">计算下一轮目标</text>
  </g>

  <path d="M286 315 H350" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M565 315 H629" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M844 315 H908" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1018 392 C1018 520 181 520 181 395" fill="none" stroke="#475569" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"/>

  <g>
    <rect x="250" y="470" width="700" height="78" rx="20" fill="url(#blue)" opacity="0.95"/>
    <text x="600" y="518" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">GOGC 决定下一轮允许堆增长多少；GOMEMLIMIT 给运行时一个软上限</text>
  </g>
</svg>
