<svg xmlns="http://www.w3.org/2000/svg" width="900" height="383" viewBox="0 0 900 383">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#bc8cff"/>
    </linearGradient>
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1c2333"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="383" fill="url(#bg)" rx="12"/>

  <!-- 左侧：节点连线抽象图 -->
  <g transform="translate(120, 192)">
    <!-- 中心节点 -->
    <circle cx="0" cy="0" r="28" fill="url(#accent)" opacity="0.9"/>
    <text x="0" y="5" text-anchor="middle" fill="#fff" font-size="13" font-weight="600" font-family="system-ui, -apple-system, sans-serif">Agent</text>

    <!-- 外围节点 -->
    <circle cx="-90" cy="-70" r="20" fill="#1c2333" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="-90" y="-66" text-anchor="middle" fill="#58a6ff" font-size="11" font-family="system-ui, -apple-system, sans-serif">研究</text>

    <circle cx="90" cy="-70" r="20" fill="#1c2333" stroke="#bc8cff" stroke-width="1.5"/>
    <text x="90" y="-66" text-anchor="middle" fill="#bc8cff" font-size="11" font-family="system-ui, -apple-system, sans-serif">写作</text>

    <circle cx="-90" cy="70" r="20" fill="#1c2333" stroke="#3fb950" stroke-width="1.5"/>
    <text x="-90" y="74" text-anchor="middle" fill="#3fb950" font-size="11" font-family="system-ui, -apple-system, sans-serif">编码</text>

    <circle cx="90" cy="70" r="20" fill="#1c2333" stroke="#f0883a" stroke-width="1.5"/>
    <text x="90" y="74" text-anchor="middle" fill="#f0883a" font-size="11" font-family="system-ui, -apple-system, sans-serif">审核</text>

    <!-- 连线 -->
    <line x1="-15" y1="-50" x2="-70" y2="-55" stroke="#58a6ff" stroke-width="1" opacity="0.4"/>
    <line x1="15" y1="-50" x2="70" y2="-55" stroke="#bc8cff" stroke-width="1" opacity="0.4"/>
    <line x1="-15" y1="50" x2="-70" y2="55" stroke="#3fb950" stroke-width="1" opacity="0.4"/>
    <line x1="15" y1="50" x2="70" y2="55" stroke="#f0883a" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- 右侧：标题区 -->
  <g transform="translate(480, 100)">
    <text x="0" y="0" fill="#58a6ff" font-size="14" font-weight="500" font-family="system-ui, -apple-system, sans-serif" letter-spacing="2">AI AGENT 工作流</text>
    <text x="0" y="50" fill="#e6edf3" font-size="32" font-weight="700" font-family="system-ui, -apple-system, sans-serif">别为了 Agent</text>
    <text x="0" y="90" fill="#e6edf3" font-size="32" font-weight="700" font-family="system-ui, -apple-system, sans-serif">而 Agent</text>
    <line x1="0" y1="110" x2="80" y2="110" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
    <text x="0" y="140" fill="#8b949e" font-size="15" font-family="system-ui, -apple-system, sans-serif">2026 年多 Agent 框架实战指南</text>
  </g>

  <!-- 底部装饰线 -->
  <rect x="0" y="370" width="900" height="13" fill="url(#accent)" opacity="0.15" rx="0"/>
</svg>
