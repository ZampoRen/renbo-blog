  <rect x="248" y="610" width="704" height="62" rx="31" fill="#111f30" stroke="#365a78"/>
  <text x="600" y="650" text-anchor="middle" font-family="PingFang SC, Hiragino Sans GB, Arial" font-size="24" font-weight="700" fill="#dbe8f4">不要全听。带着问题，按角色调用。</text>
