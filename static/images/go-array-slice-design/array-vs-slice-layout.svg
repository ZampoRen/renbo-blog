<svg xmlns="http://www.w3.org/2000/svg" width="900" height="383" viewBox="0 0 900 383">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="900" height="383" rx="0" fill="url(#bg)"/>
  
  <text x="58" y="72" fill="#e5e7eb" font-family="Arial, 'PingFang SC', sans-serif" font-size="28" font-weight="700">Go 数组与 Slice：谁真正拥有数据</text>
  <text x="58" y="106" fill="#94a3b8" font-family="Arial, 'PingFang SC', sans-serif" font-size="15">数组是一整块连续内存；slice 只是指向其中一段的描述符</text>

  <rect x="58" y="152" width="340" height="96" rx="18" fill="#172554" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="82" y="184" fill="#bfdbfe" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" font-weight="700">array: [5]string</text>
  <g font-family="Arial" font-size="16" fill="#e0f2fe" text-anchor="middle">
    <rect x="82" y="202" width="52" height="30" rx="6" fill="#1d4ed8"/><text x="108" y="223">a</text>
    <rect x="142" y="202" width="52" height="30" rx="6" fill="#1d4ed8"/><text x="168" y="223">b</text>
    <rect x="202" y="202" width="52" height="30" rx="6" fill="#1d4ed8"/><text x="228" y="223">c</text>
    <rect x="262" y="202" width="52" height="30" rx="6" fill="#1d4ed8"/><text x="288" y="223">d</text>
    <rect x="322" y="202" width="52" height="30" rx="6" fill="#1d4ed8"/><text x="348" y="223">e</text>
  </g>
  <text x="82" y="278" fill="#93c5fd" font-family="Arial, 'PingFang SC', sans-serif" font-size="14">值语义 · 长度进类型 · 连续排列</text>

  <rect x="502" y="138" width="310" height="132" rx="18" fill="#064e3b" stroke="#34d399" stroke-width="2" filter="url(#shadow)"/>
  <text x="526" y="170" fill="#bbf7d0" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" font-weight="700">slice header</text>
  <text x="526" y="202" fill="#d1fae5" font-family="Arial, 'PingFang SC', sans-serif" font-size="16">ptr → array[1]</text>
  <text x="526" y="229" fill="#d1fae5" font-family="Arial, 'PingFang SC', sans-serif" font-size="16">len = 2</text>
  <text x="526" y="256" fill="#d1fae5" font-family="Arial, 'PingFang SC', sans-serif" font-size="16">cap = 4</text>
  <path d="M502 196 C445 196, 445 216, 194 216" fill="none" stroke="#34d399" stroke-width="3" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#34d399"/></marker></defs>
  <text x="452" y="326" fill="#cbd5e1" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" text-anchor="middle">slice header 是值，底层数组可以共享</text>

</svg>
