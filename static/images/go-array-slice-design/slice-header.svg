<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="760" rx="0" fill="url(#bg)"/>
  
  <text x="80" y="92" fill="#e5e7eb" font-family="Arial, 'PingFang SC', sans-serif" font-size="34" font-weight="700">Slice Header：三字段描述符</text>
  <text x="80" y="132" fill="#94a3b8" font-family="Arial, 'PingFang SC', sans-serif" font-size="18">复制 slice，只是复制这三个字段；底层数组不会跟着复制</text>

  <rect x="90" y="210" width="330" height="310" rx="24" fill="#052e2b" stroke="#2dd4bf" stroke-width="2" filter="url(#shadow)"/>
  <text x="125" y="260" fill="#ccfbf1" font-family="Arial, 'PingFang SC', sans-serif" font-size="24" font-weight="700">s := a[1:3]</text>
  <rect x="125" y="300" width="250" height="50" rx="12" fill="#0f766e"/><text x="150" y="332" fill="#ecfeff" font-family="Arial" font-size="20">array pointer</text>
  <rect x="125" y="370" width="250" height="50" rx="12" fill="#0f766e"/><text x="150" y="402" fill="#ecfeff" font-family="Arial" font-size="20">len = 2</text>
  <rect x="125" y="440" width="250" height="50" rx="12" fill="#0f766e"/><text x="150" y="472" fill="#ecfeff" font-family="Arial" font-size="20">cap = 4</text>

  <rect x="620" y="245" width="430" height="118" rx="20" fill="#172554" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/>
  <text x="650" y="292" fill="#bfdbfe" font-family="Arial, 'PingFang SC', sans-serif" font-size="23" font-weight="700">backing array</text>
  <g font-family="Arial" font-size="22" fill="#e0f2fe" text-anchor="middle">
    <rect x="650" y="315" width="62" height="38" rx="8" fill="#1d4ed8"/><text x="681" y="342">a</text>
    <rect x="724" y="315" width="62" height="38" rx="8" fill="#16a34a"/><text x="755" y="342">b</text>
    <rect x="798" y="315" width="62" height="38" rx="8" fill="#16a34a"/><text x="829" y="342">c</text>
    <rect x="872" y="315" width="62" height="38" rx="8" fill="#1d4ed8"/><text x="903" y="342">d</text>
    <rect x="946" y="315" width="62" height="38" rx="8" fill="#1d4ed8"/><text x="977" y="342">e</text>
  </g>
  <path d="M420 326 C500 326, 520 334, 724 334" fill="none" stroke="#2dd4bf" stroke-width="4" marker-end="url(#arrow2)"/>
  <defs><marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto"><path d="M0,0 L0,8 L11,4 z" fill="#2dd4bf"/></marker></defs>

  <rect x="620" y="430" width="430" height="120" rx="20" fill="#3b1d0f" stroke="#fb923c" stroke-width="2"/>
  <text x="650" y="475" fill="#fed7aa" font-family="Arial, 'PingFang SC', sans-serif" font-size="21" font-weight="700">append 是否搬家，看 cap</text>
  <text x="650" y="512" fill="#ffedd5" font-family="Arial, 'PingFang SC', sans-serif" font-size="18">容量够：原地写，父 slice 可能被影响</text>
  <text x="650" y="540" fill="#ffedd5" font-family="Arial, 'PingFang SC', sans-serif" font-size="18">容量不够：分配新数组，再复制旧元素</text>

  <text x="600" y="660" fill="#e5e7eb" font-family="Arial, 'PingFang SC', sans-serif" font-size="24" font-weight="700" text-anchor="middle">不要只记“引用类型”，要看 header 和 backing array 的关系</text>

</svg>
