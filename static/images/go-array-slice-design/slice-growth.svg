<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="760" rx="0" fill="url(#bg)"/>
  
  <text x="80" y="92" fill="#e5e7eb" font-family="Arial, 'PingFang SC', sans-serif" font-size="34" font-weight="700">Go 1.25 Slice 扩容：从 2x 平滑变慢</text>
  <text x="80" y="132" fill="#94a3b8" font-family="Arial, 'PingFang SC', sans-serif" font-size="18">阈值是 256；实际 cap 还会被 allocator size class 向上取整</text>

  <line x1="130" y1="610" x2="1060" y2="610" stroke="#64748b" stroke-width="2"/>
  <line x1="130" y1="200" x2="130" y2="610" stroke="#64748b" stroke-width="2"/>
  <text x="132" y="655" fill="#94a3b8" font-family="Arial" font-size="15">old cap</text>
  <text x="70" y="205" fill="#94a3b8" font-family="Arial" font-size="15">growth</text>

  <polyline points="170,520 270,440 370,360 470,280 570,230" fill="none" stroke="#60a5fa" stroke-width="5"/>
  <circle cx="570" cy="230" r="7" fill="#60a5fa"/>
  <text x="520" y="205" fill="#bfdbfe" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" font-weight="700">oldCap &lt; 256：约 2x</text>

  <polyline points="570,230 670,300 770,365 870,420 970,465 1040,492" fill="none" stroke="#34d399" stroke-width="5"/>
  <text x="760" y="300" fill="#bbf7d0" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" font-weight="700">oldCap ≥ 256：平滑过渡到约 1.25x</text>

  <line x1="570" y1="190" x2="570" y2="610" stroke="#f97316" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="590" y="590" fill="#fed7aa" font-family="Arial" font-size="18">threshold = 256</text>

  <rect x="160" y="515" width="110" height="34" rx="8" fill="#1e293b" stroke="#475569"/><text x="215" y="538" fill="#e2e8f0" font-family="Arial" font-size="15" text-anchor="middle">256 → 512</text>
  <rect x="675" y="390" width="120" height="34" rx="8" fill="#1e293b" stroke="#475569"/><text x="735" y="413" fill="#e2e8f0" font-family="Arial" font-size="15" text-anchor="middle">512 → 848</text>
  <rect x="860" y="470" width="130" height="34" rx="8" fill="#1e293b" stroke="#475569"/><text x="925" y="493" fill="#e2e8f0" font-family="Arial" font-size="15" text-anchor="middle">848 → 1280</text>

  <text x="600" y="690" fill="#e5e7eb" font-family="Arial, 'PingFang SC', sans-serif" font-size="24" font-weight="700" text-anchor="middle">提前知道规模，就预分配；别让 runtime 一边跑一边猜</text>

</svg>
