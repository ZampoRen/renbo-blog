{{ define "main" }}
<main class="tags-list-main">
    <div class="container">
        <div class="page-header">
            <p class="page-kicker">Tag Globe</p>
            <h1 class="page-title">标签地球</h1>
            <p class="page-subtitle">像看一颗慢慢自转的知识星球。标签越常出现，字越大，越靠近球体前景越明亮。</p>
            <div class="page-stats">
                <span class="stat-item">🏷️ {{ len .Site.Taxonomies.tags }} 个标签</span>
                <span class="stat-item">📝 {{ len (where .Site.RegularPages "Type" "posts") }} 篇文章</span>
            </div>
        </div>

        <section class="tag-globe-section">
            <div class="tag-globe-copy">
                <h2>这不是普通标签云。</h2>
                <p>它更像一颗由主题构成的地球。标签沿球面分布，前景更亮，后景更淡，文章越多的标签会占据更大的视觉权重。</p>
                <ul class="tag-globe-meta">
                    <li>默认缓慢自转</li>
                    <li>鼠标拖动可换视角</li>
                    <li>标签大小跟文章数量联动</li>
                </ul>
            </div>

            <div class="tag-globe-panel">
                <div class="tag-globe-stage" id="tagGlobeStage">
                    <div class="tag-globe-aurora"></div>
                    <div class="tag-globe-atmosphere"></div>
                    <canvas class="tag-globe-canvas" id="tagGlobeCanvas" width="860" height="860"></canvas>
                    <div class="tag-globe-labels" id="tagGlobeLabels"></div>
                    <div class="tag-globe-hint">拖动地球</div>
                </div>
            </div>

            <script type="application/json" id="tags-data">
            [
                {{ $sortedTags := slice }}
                {{ range $name, $taxonomy := .Site.Taxonomies.tags }}
                {{ $count := len $taxonomy }}
                {{ $sortedTags = $sortedTags | append (dict "name" $name "count" $count "url" (printf "/tags/%s" ($name | urlize))) }}
                {{ end }}
                {{ $sortedTags = sort $sortedTags "count" "desc" }}
                {{ range $index, $tag := $sortedTags }}
                {
                    "text": "{{ $tag.name }}",
                    "count": {{ $tag.count }},
                    "url": "{{ $tag.url }}"
                }{{ if ne $index (sub (len $sortedTags) 1) }},{{ end }}
                {{ end }}
            ]
            </script>
        </section>
    </div>
</main>

<style>
.tags-list-main {
    min-height: 100vh;
    background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.12), transparent 22%),
        radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.08), transparent 20%),
        linear-gradient(180deg, #04111f 0%, #081a2e 48%, #0b2035 100%);
    padding: 1rem 0 3rem;
}

.tags-list-main .container {
    max-width: 1320px !important;
    padding: 0 1.5rem !important;
}

.page-header {
    max-width: 760px;
    margin: 0 auto 2.5rem;
    text-align: center;
}

.page-kicker {
    display: inline-flex;
    padding: 0.38rem 0.82rem;
    border-radius: 999px;
    background: rgba(125, 211, 252, 0.1);
    color: #7dd3fc;
    border: 1px solid rgba(125, 211, 252, 0.18);
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 0.95rem;
}

.page-title {
    font-size: clamp(2.8rem, 7vw, 5.3rem);
    line-height: 0.95;
    letter-spacing: -0.06em;
    color: #eff6ff;
    margin-bottom: 1rem;
}

.page-subtitle {
    color: #a8bfd7;
    font-size: 1.08rem;
    line-height: 1.8;
    margin: 0 auto 1.35rem;
}

.page-stats {
    display: flex;
    justify-content: center;
    gap: 0.8rem;
    flex-wrap: wrap;
}

.stat-item {
    padding: 0.72rem 1.1rem;
    border-radius: 999px;
    background: rgba(10, 27, 46, 0.72);
    color: #dbeafe;
    border: 1px solid rgba(148, 163, 184, 0.16);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    font-weight: 600;
}

.tag-globe-section {
    display: grid;
    grid-template-columns: minmax(260px, 340px) minmax(0, 1fr);
    gap: 2rem;
    align-items: center;
    background: linear-gradient(180deg, rgba(7, 20, 35, 0.68), rgba(7, 20, 35, 0.46));
    border: 1px solid rgba(148, 163, 184, 0.12);
    border-radius: 32px;
    padding: 2rem;
    box-shadow: 0 40px 80px rgba(2, 8, 23, 0.35);
    backdrop-filter: blur(12px);
}

.tag-globe-copy h2 {
    color: #f8fbff;
    font-size: clamp(1.6rem, 3vw, 2.4rem);
    line-height: 1.05;
    letter-spacing: -0.04em;
    margin-bottom: 1rem;
}

.tag-globe-copy p {
    color: #b8c9da;
    line-height: 1.85;
    margin-bottom: 1.1rem;
}

.tag-globe-meta {
    list-style: none;
    padding: 0;
    margin: 0;
    display: grid;
    gap: 0.75rem;
}

.tag-globe-meta li {
    color: #d9e8f6;
    font-weight: 600;
    padding-left: 1rem;
    position: relative;
}

.tag-globe-meta li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0.58rem;
    width: 0.42rem;
    height: 0.42rem;
    border-radius: 999px;
    background: linear-gradient(135deg, #38bdf8, #60a5fa);
    box-shadow: 0 0 14px rgba(56, 189, 248, 0.5);
}

.tag-globe-panel {
    min-width: 0;
}

.tag-globe-stage {
    position: relative;
    min-height: 760px;
    border-radius: 28px;
    overflow: hidden;
    background:
        radial-gradient(circle at 50% 50%, rgba(37, 99, 235, 0.12), transparent 26%),
        radial-gradient(circle at 50% 88%, rgba(15, 23, 42, 0.4), transparent 28%),
        linear-gradient(180deg, #06111d 0%, #0a1525 100%);
    border: 1px solid rgba(148, 163, 184, 0.12);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    cursor: grab;
}

.tag-globe-stage.is-dragging {
    cursor: grabbing;
}

.tag-globe-aurora {
    position: absolute;
    inset: 8% 10%;
    background:
        radial-gradient(circle at 50% 45%, rgba(56, 189, 248, 0.16), transparent 26%),
        radial-gradient(circle at 50% 35%, rgba(59, 130, 246, 0.12), transparent 35%);
    filter: blur(30px);
    pointer-events: none;
}

.tag-globe-atmosphere {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 470px;
    height: 470px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    box-shadow:
        0 0 0 1px rgba(125, 211, 252, 0.1),
        0 0 60px rgba(56, 189, 248, 0.14),
        inset 0 0 80px rgba(255,255,255,0.04);
    pointer-events: none;
}

.tag-globe-canvas,
.tag-globe-labels {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
}

.tag-globe-labels {
    pointer-events: none;
}

.tag-globe-label {
    position: absolute;
    top: 50%;
    left: 50%;
    display: inline-flex;
    align-items: center;
    gap: 0.38rem;
    white-space: nowrap;
    text-decoration: none;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #eff6ff;
    text-shadow: 0 2px 16px rgba(15, 23, 42, 0.8);
    pointer-events: auto;
    transform: translate(-50%, -50%);
    transition: transform 0.16s ease, opacity 0.16s ease;
}

.tag-globe-label:hover {
    transform: translate(-50%, -50%) scale(1.08) !important;
}

.tag-globe-label-count {
    display: inline-flex;
    min-width: 1.5rem;
    height: 1.5rem;
    align-items: center;
    justify-content: center;
    border-radius: 999px;
    background: rgba(125, 211, 252, 0.12);
    color: #bfdbfe;
    border: 1px solid rgba(125, 211, 252, 0.14);
    font-size: 0.72em;
    font-weight: 800;
}

.tag-globe-hint {
    position: absolute;
    left: 50%;
    bottom: 1.2rem;
    transform: translateX(-50%);
    padding: 0.48rem 0.8rem;
    border-radius: 999px;
    background: rgba(7, 20, 35, 0.72);
    color: #bfd4ea;
    border: 1px solid rgba(148, 163, 184, 0.14);
    font-size: 0.8rem;
    font-weight: 700;
}

@media (max-width: 1024px) {
    .tag-globe-section {
        grid-template-columns: 1fr;
    }

    .tag-globe-stage {
        min-height: 660px;
    }
}

@media (max-width: 640px) {
    .tags-list-main .container {
        padding: 0 1rem !important;
    }

    .tag-globe-section {
        padding: 1.25rem;
        border-radius: 24px;
    }

    .tag-globe-stage {
        min-height: 520px;
    }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const dataEl = document.getElementById('tags-data');
    const stage = document.getElementById('tagGlobeStage');
    const canvas = document.getElementById('tagGlobeCanvas');
    const labelsLayer = document.getElementById('tagGlobeLabels');
    if (!dataEl || !stage || !canvas || !labelsLayer) return;

    let tags = [];
    try {
        tags = JSON.parse(dataEl.textContent.trim());
    } catch (error) {
        console.error('标签数据解析失败', error);
        return;
    }
    if (!tags.length) return;

    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const maxCount = Math.max(...tags.map(t => t.count));
    const minCount = Math.min(...tags.map(t => t.count));
    const countRange = Math.max(1, maxCount - minCount);

    const state = {
        width: 0,
        height: 0,
        cx: 0,
        cy: 0,
        radius: 0,
        rotationX: -0.22,
        rotationY: 0,
        velocityX: 0.0008,
        velocityY: 0.0024,
        autoRotate: true,
        dragging: false,
        moved: false,
        pointerX: 0,
        pointerY: 0,
        lastMoveAt: 0
    };

    const nodes = tags.map((tag, index) => {
        const anchor = document.createElement('a');
        anchor.className = 'tag-globe-label';
        anchor.href = tag.url;
        anchor.innerHTML = `<span class="tag-globe-label-text">${tag.text}</span><span class="tag-globe-label-count">${tag.count}</span>`;
        anchor.addEventListener('mouseenter', () => {
            state.autoRotate = false;
        });
        anchor.addEventListener('mouseleave', () => {
            if (!state.dragging) state.autoRotate = true;
        });
        anchor.addEventListener('pointerdown', event => {
            event.stopPropagation();
            state.autoRotate = false;
            state.dragging = false;
            state.moved = false;
        });
        anchor.addEventListener('pointerup', event => {
            event.stopPropagation();
        });
        anchor.addEventListener('click', event => {
            event.preventDefault();
            event.stopPropagation();
            window.location.assign(tag.url);
        });
        labelsLayer.appendChild(anchor);

        const ratio = (tag.count - minCount) / countRange;
        const phi = Math.acos(1 - 2 * ((index + 0.5) / tags.length));
        const theta = Math.PI * (3 - Math.sqrt(5)) * index;

        return {
            tag,
            ratio,
            anchor,
            base: {
                x: Math.cos(theta) * Math.sin(phi),
                y: Math.cos(phi),
                z: Math.sin(theta) * Math.sin(phi)
            },
            projected: { x: 0, y: 0, z: 0 }
        };
    });

    function resize() {
        const rect = stage.getBoundingClientRect();
        state.width = rect.width;
        state.height = rect.height;
        state.cx = rect.width / 2;
        state.cy = rect.height / 2;
        state.radius = Math.min(rect.width, rect.height) * (window.innerWidth < 640 ? 0.28 : 0.31);

        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function rotatePoint(point, rotX, rotY) {
        const cosY = Math.cos(rotY);
        const sinY = Math.sin(rotY);
        const x1 = point.x * cosY - point.z * sinY;
        const z1 = point.x * sinY + point.z * cosY;

        const cosX = Math.cos(rotX);
        const sinX = Math.sin(rotX);
        const y2 = point.y * cosX - z1 * sinX;
        const z2 = point.y * sinX + z1 * cosX;

        return { x: x1, y: y2, z: z2 };
    }

    function drawGlobeGrid() {
        ctx.clearRect(0, 0, state.width, state.height);

        const sphereGradient = ctx.createRadialGradient(
            state.cx - state.radius * 0.25,
            state.cy - state.radius * 0.3,
            state.radius * 0.08,
            state.cx,
            state.cy,
            state.radius
        );
        sphereGradient.addColorStop(0, 'rgba(190, 242, 255, 0.18)');
        sphereGradient.addColorStop(0.28, 'rgba(37, 99, 235, 0.16)');
        sphereGradient.addColorStop(0.62, 'rgba(9, 29, 53, 0.42)');
        sphereGradient.addColorStop(1, 'rgba(2, 10, 24, 0.88)');

        ctx.beginPath();
        ctx.arc(state.cx, state.cy, state.radius, 0, Math.PI * 2);
        ctx.fillStyle = sphereGradient;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(state.cx, state.cy, state.radius + 10, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(125, 211, 252, 0.16)';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        ctx.save();
        ctx.beginPath();
        ctx.arc(state.cx, state.cy, state.radius, 0, Math.PI * 2);
        ctx.clip();

        const latitudes = 7;
        const longitudes = 9;

        ctx.strokeStyle = 'rgba(148, 163, 184, 0.16)';
        ctx.lineWidth = 1;

        for (let i = 1; i <= latitudes; i++) {
            const lat = -Math.PI / 2 + (Math.PI / (latitudes + 1)) * i;
            ctx.beginPath();
            let started = false;
            for (let j = 0; j <= 180; j++) {
                const lon = (j / 180) * Math.PI * 2;
                const p = rotatePoint({
                    x: Math.cos(lat) * Math.cos(lon),
                    y: Math.sin(lat),
                    z: Math.cos(lat) * Math.sin(lon)
                }, state.rotationX, state.rotationY);

                const perspective = 1.8 / (1.8 - p.z);
                const x = state.cx + p.x * state.radius * perspective;
                const y = state.cy + p.y * state.radius * perspective;

                if (!started) {
                    ctx.moveTo(x, y);
                    started = true;
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.stroke();
        }

        for (let i = 0; i < longitudes; i++) {
            const baseLon = (Math.PI * 2 / longitudes) * i;
            ctx.beginPath();
            let started = false;
            for (let j = -90; j <= 90; j++) {
                const lat = (j / 90) * (Math.PI / 2);
                const p = rotatePoint({
                    x: Math.cos(lat) * Math.cos(baseLon),
                    y: Math.sin(lat),
                    z: Math.cos(lat) * Math.sin(baseLon)
                }, state.rotationX, state.rotationY);

                const perspective = 1.8 / (1.8 - p.z);
                const x = state.cx + p.x * state.radius * perspective;
                const y = state.cy + p.y * state.radius * perspective;

                if (!started) {
                    ctx.moveTo(x, y);
                    started = true;
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.stroke();
        }

        ctx.restore();
    }

    function renderLabels() {
        const sortedNodes = [];

        nodes.forEach(node => {
            const p = rotatePoint(node.base, state.rotationX, state.rotationY);
            node.projected = p;

            const perspective = 1.9 / (1.9 - p.z);
            const x = state.cx + p.x * state.radius * perspective;
            const y = state.cy + p.y * state.radius * perspective;
            const depth = (p.z + 1) / 2;
            const scale = 0.62 + depth * 0.48 + node.ratio * 0.22;
            const fontSize = 0.86 + node.ratio * 0.92;
            const opacity = 0.18 + depth * 0.92;
            const hueLight = 80 + depth * 15;
            const blur = Math.max(0, (0.42 - depth) * 6);

            node.anchor.style.left = `${x}px`;
            node.anchor.style.top = `${y}px`;
            node.anchor.style.opacity = opacity.toFixed(3);
            node.anchor.style.fontSize = `${fontSize}rem`;
            node.anchor.style.filter = `blur(${blur.toFixed(2)}px)`;
            node.anchor.style.transform = `translate(-50%, -50%) scale(${scale.toFixed(3)})`;
            node.anchor.style.color = `hsl(205 85% ${hueLight.toFixed(1)}%)`;
            node.anchor.style.zIndex = `${Math.round(depth * 1000)}`;

            sortedNodes.push(node);
        });

        sortedNodes.sort((a, b) => a.projected.z - b.projected.z);
        sortedNodes.forEach(node => labelsLayer.appendChild(node.anchor));
    }

    function animate() {
        if (!state.dragging && state.autoRotate) {
            state.rotationX += state.velocityX;
            state.rotationY += state.velocityY;

            if (Date.now() - state.lastMoveAt > 140) {
                state.velocityX += (0.0008 - state.velocityX) * 0.04;
                state.velocityY += (0.0024 - state.velocityY) * 0.04;
            }
        }

        drawGlobeGrid();
        renderLabels();
        requestAnimationFrame(animate);
    }

    stage.addEventListener('pointerdown', event => {
        if (event.target.closest('.tag-globe-label')) return;
        state.dragging = true;
        state.moved = false;
        state.autoRotate = false;
        state.pointerX = event.clientX;
        state.pointerY = event.clientY;
        stage.classList.add('is-dragging');
    });

    window.addEventListener('pointermove', event => {
        if (!state.dragging) return;
        const dx = event.clientX - state.pointerX;
        const dy = event.clientY - state.pointerY;
        if (Math.abs(dx) > 2 || Math.abs(dy) > 2) {
            state.moved = true;
        }
        state.pointerX = event.clientX;
        state.pointerY = event.clientY;
        state.rotationY += dx * 0.0052;
        state.rotationX += dy * 0.0042;
        state.velocityY = dx * 0.00016;
        state.velocityX = dy * 0.00012;
        state.lastMoveAt = Date.now();
    });

    window.addEventListener('pointerup', () => {
        const wasDragging = state.dragging;
        state.dragging = false;
        stage.classList.remove('is-dragging');
        if (wasDragging) {
            state.autoRotate = true;
        }
    });

    window.addEventListener('resize', resize);

    resize();
    animate();
});
</script>
{{ end }}
